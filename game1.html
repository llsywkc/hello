<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識科：外星人迎擊大挑戰 🛸</title>
    <style>
        body {
            font-family: '微軟正黑體', 'Comic Sans MS', sans-serif;
            background-color: #0d1b2a; /* 改為太空深藍色背景 */
            background-image: radial-gradient(circle, #1b263b 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            color: #333;
            overflow: hidden;
        }
        
        /* 點綴星星背景 */
        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        #game-container {
            background-color: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 550px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.2);
            border: 5px solid #41ead4;
            position: relative;
            z-index: 1;
        }
        
        h1 { color: #011627; font-size: 26px; margin-bottom: 5px; }
        .subtitle { font-size: 16px; color: #555; margin-bottom: 20px; }
        
        .btn {
            color: #000;
            font-weight: bold;
            border: none;
            padding: 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn:active { transform: translateY(3px); }
        
        /* 答題按鈕 */
        .btn-choice { background-color: #4dd0e1; box-shadow: 0 5px 0 #00acc1; }
        .btn-choice:hover { background-color: #26c6da; color: white; transform: translateY(-2px); }
        .btn-choice:active { box-shadow: 0 2px 0 #00acc1; }

        /* 難度按鈕 */
        .btn-easy { background-color: #a5d6a7; box-shadow: 0 5px 0 #66bb6a; font-size: 20px; }
        .btn-easy:hover { background-color: #81c784; color: white; transform: translateY(-2px); }
        .btn-medium { background-color: #fff59d; box-shadow: 0 5px 0 #fbc02d; font-size: 20px; }
        .btn-medium:hover { background-color: #fff176; transform: translateY(-2px); }
        .btn-hard { background-color: #ffcc80; box-shadow: 0 5px 0 #f57c00; font-size: 20px; }
        .btn-hard:hover { background-color: #ffb74d; transform: translateY(-2px); }
        .btn-extreme { background-color: #ef9a9a; box-shadow: 0 5px 0 #e53935; font-size: 20px; color: white; }
        .btn-extreme:hover { background-color: #e57373; transform: translateY(-2px); }
        
        #mute-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f1f2f6;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .hidden { display: none !important; }
        
        #info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background-color: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            margin-top: 10px;
            border: 2px solid #ddd;
        }
        #question-text { font-size: 20px; color: #1565c0; text-align: left; line-height: 1.4; margin-bottom: 20px; font-weight: bold; }
        
        /* UFO 戰鬥區域動畫設定 */
        #battle-area {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        #ufo-sprite {
            font-size: 60px;
            display: inline-block;
        }
        
        /* 浮動動畫 (等待答題) */
        .floating { animation: float 2s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        /* 爆炸動畫 (答對) */
        .hit { animation: explode 0.6s forwards; }
        @keyframes explode {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px red); }
            50% { transform: scale(1.5); filter: drop-shadow(0 0 20px orange); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* 閃避動畫 (答錯) */
        .shake { animation: dodge 0.6s forwards; }
        @keyframes dodge {
            0% { transform: translateX(0); }
            20% { transform: translateX(-30px) rotate(-15deg); }
            40% { transform: translateX(30px) rotate(15deg); }
            60% { transform: translateX(-30px) rotate(-15deg); }
            100% { transform: translateX(200px); opacity: 0; } /* 飛走逃跑 */
        }
        
        #progress-bg {
            width: 100%;
            background-color: #eee;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 15px;
        }
        #progress-fill {
            height: 100%;
            background-color: #41ead4;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<audio id="bgm" loop>
    <source src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" type="audio/mpeg">
</audio>

<div id="game-container">
    <button id="mute-btn" onclick="toggleMute()">🔊</button>

    <div id="start-screen">
        <div style="font-size: 60px; margin-bottom: 10px;">🚀🛸</div>
        <h1>常識科：外星人迎擊戰</h1>
        <p class="subtitle">答對問題，發射激光擊落 UFO！(共40題)</p>
        <p style="font-weight: bold; color: #ff0054; margin-top: 20px;">👇 選擇難度，開始作戰 👇</p>
        <button class="btn btn-easy" onclick="startGame('easy')">🟢 簡單 (無時限瞄準)</button>
        <button class="btn btn-medium" onclick="startGame('medium')">🟡 中等 (40 秒迎擊)</button>
        <button class="btn btn-hard" onclick="startGame('hard')">🟠 困難 (20 秒迎擊)</button>
        <button class="btn btn-extreme" onclick="startGame('extreme')">🔴 地獄 (10 秒迎擊)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        
        <div id="battle-area">
            <div id="ufo-sprite" class="floating">🛸</div>
        </div>
        
        <div id="info-bar">
            <div style="color: #2e7d32;">🎯 擊落: <span id="score">0</span>架</div>
            <div style="color: #c62828;" id="timer-display">⏳ 時間: <span id="time-left">--</span> 秒</div>
        </div>
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <p style="text-align:left; color:#757575; font-size:15px; margin-bottom:10px; font-weight:bold;">
            任務進度: <span id="current-q-num">1</span> / 40
        </p>
        <h2 id="question-text">雷達掃描中...</h2>
        <div id="choices-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="emoji" id="result-emoji" style="font-size: 60px;">🎉</div>
        <h1>戰鬥結束！</h1>
        <p>你的總擊落得分是：<br><strong id="final-score" style="font-size:40px; color:#d32f2f;">0</strong> / 400 分</p>
        <p id="result-message" style="font-size: 18px; font-weight: bold;"></p>
        <button class="btn btn-easy" onclick="location.reload()" style="margin-top: 15px;">🚀 重新開始任務 🔄</button>
    </div>
</div>

<script>
    // 原始 40 條題庫
    const originalQuestions = [
        { q: "廣州有甚麼著名景點？", c: ["天安門廣場", "鎮海樓", "外灘"], a: 1 }, 
        { q: "對待珍貴的自然和文化遺產，我們應該怎樣做？", c: ["好好愛護", "隨意破壞", "不用理會"], a: 0 },
        { q: "遇到中國不同民族的人，我們應該認識和尊重他們的甚麼？", c: ["只有服裝", "風俗習慣", "財富"], a: 1 },
        { q: "上海和廣州是中國的甚麼？", c: ["著名城市", "現今首都", "古代首都"], a: 0 },
        { q: "以下哪一個是保育「古蹟」的方法？", c: ["好好愛護", "在牆上刻字", "帶走石頭留念"], a: 0 },
        { q: "中國有多少個民族？", c: ["56個", "50個", "100個"], a: 0 },
        { q: "如果想了解歷史文物，我們最適合去哪類旅遊地點？", c: ["自然風景", "博物館", "遊樂公園"], a: 1 },
        { q: "去遊樂公園或自然風景遊玩，最重要是注意甚麼？", c: ["買很多紀念品", "注意安全和遵守規則", "只顧著拍照"], a: 1 },
        { q: "香港的「大館」是一個怎樣的地方？", c: ["有歷史的古蹟和博物館", "售賣貨品的超級市場", "只有自然風光的地方"], a: 0 },
        { q: "簡稱「滬」的上海有甚麼著名的名勝？", c: ["土樓和博物館", "外灘和豫園", "港鐵和渡輪"], a: 1 },
        { q: "北京有甚麼著名景點？", c: ["天安門廣場", "紅樹林", "大館"], a: 0 }, 
        { q: "「購物場所」除了提供不同的服務，還會怎樣？", c: ["售賣不同的貨品", "提供免費午餐", "只供參觀"], a: 0 },
        { q: "現代人除了親身前往店鋪購物，還可以通過甚麼途徑？", c: ["只有寫信", "電話和互聯網", "只有飛鴿傳書"], a: 1 },
        { q: "為了善用金錢，我們應該抱持甚麼態度？", c: ["有需要時才購物", "看到喜歡就買", "每天都購物"], a: 0 },
        { q: "使用「八達通卡」時，除了要妥善保管，還要注意甚麼？", c: ["卡片的顏色", "卡片的重量", "餘額"], a: 2 },
        { q: "消費時，我們要考慮甚麼因素？", c: ["個人的需要、貨品質素、價錢", "包裝是否漂亮", "朋友有沒有買"], a: 0 },
        { q: "「精明的消費者」需要認識消費者的甚麼？", c: ["身高和體重", "權益和責任", "喜好和習慣"], a: 1 },
        { q: "我們應該因應甚麼來選擇合適的交通工具？", c: ["個人的需要", "天氣的好壞", "車身的顏色"], a: 0 },
        { q: "乘搭公共交通工具時，我們必須遵守甚麼？", c: ["自己的心情", "規則", "別人的要求"], a: 1 },
        { q: "乘搭公共交通工具時，最重要的是甚麼？", c: ["注意安全", "爭奪座位", "吃東西"], a: 0 },
        { q: "港鐵提供了甚麼安全設備？", c: ["緊急出口", "安全帶", "安全氣囊"], a: 0 },
        { q: "現代交通工具為人們帶來甚麼好處？", c: ["使生活變得便利", "增加步行時間", "減少出門"], a: 0 },
        { q: "診所看醫生和理髮店剪頭髮，主要是提供甚麼？", c: ["售賣貨品", "提供不同的服務", "免費體驗"], a: 1 },
        { q: "若貨品的品質不好，精明的消費者會怎樣做？", c: ["照樣購買", "考慮清楚或不購買", "買更多"], a: 1 },
        { q: "如果買回來「貨不對辦」，我們需要憑甚麼去「更換貨品」？", c: ["收據", "信用卡", "隔熱手套"], a: 0 },
        { q: "熱力可以由甚麼方式產生？", c: ["燃燒、摩擦、電", "吹風、淋雨", "結冰、冷卻"], a: 0 },
        { q: "熱的用途包括煮食、取暖和甚麼？", c: ["結冰", "消毒", "照明"], a: 1 },
        { q: "我們應該使用甚麼工具來準確測量溫度？", c: ["間尺", "磅秤", "溫度計"], a: 2 },
        { q: "溫度單位F和C的中文分別是？", c: ["華氏，攝氏", "厘米，寸", "公斤，克"], a: 0 },
        { q: "物體「受熱」時，它的溫度會怎樣？", c: ["上升", "下降", "不變"], a: 0 },
        { q: "物體「遇冷」時，它的溫度會怎樣？", c: ["上升", "下降", "不變"], a: 1 },
        { q: "「熱」的傳遞方向是怎樣的？", c: ["從較冷傳到較熱", "從較熱傳到較冷", "不會傳遞"], a: 1 },
        { q: "金屬是以下哪一種物料？", c: ["優良導熱體", "不良導熱體", "絕緣體"], a: 0 },
        { q: "非金屬是不良導熱體，它有甚麼功用？", c: ["能傳熱", "能隔熱", "能發光"], a: 1 },
        { q: "金屬受熱時，它的體積會產生甚麼變化？", c: ["收縮", "膨脹", "消失"], a: 1 },
        { q: "空氣和液體遇冷時，體積會產生甚麼變化？", c: ["收縮", "膨脹", "變重"], a: 0 },
        { q: "以下哪一款是不良導熱體？", c: ["金屬", "木頭", "鐵"], a: 1 },
        { q: "以下哪一款工具可以用來拿熱的東西？", c: ["隔熱手套", "膠手套", "保暖手套"], a: 0 },
        { q: "除了金屬，還有甚麼狀態的物質受熱時會「膨脹」？", c: ["空氣和液體", "只有石頭", "只有玻璃"], a: 0 },
        { q: "我們可以用沸水來為餐具做甚麼？", c: ["消毒", "冷凍", "清洗"], a: 0 }
    ];

    let gameQuestions = []; // 存放洗牌後的題目
    let current = 0, score = 0;
    let timeLimitSetting = 0; 
    let timeLeft = 0, timerInterval;
    let isMuted = false;
    let audioCtx = null; 

    // 洗牌函數 (隨機打亂題目次序)
    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    // 超級安全的音效播放器
    function playSfx(type) {
        if (isMuted) return;
        try {
            const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtxClass) return; 
            if (!audioCtx) { audioCtx = new AudioCtxClass(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'laser') {
                // 發射激光音效 (高音急降)
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                // 答錯/逃跑音效 (低音)
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.4);
            }
        } catch (e) { console.log("SFX disabled", e); }
    }

    function toggleMute() {
        try {
            const bgm = document.getElementById('bgm');
            isMuted = !isMuted;
            bgm.muted = isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊";
            if (!isMuted && current > 0) {
                let playPromise = bgm.play();
                if (playPromise !== undefined) playPromise.catch(e => {});
            }
        } catch(e) {}
    }

    // 遊戲開始邏輯
    function startGame(difficulty) {
        try {
            // 每次開始遊戲前，重新隨機洗牌題目！
            gameQuestions = shuffleArray(originalQuestions);
            current = 0;
            score = 0;

            if (difficulty === 'easy') timeLimitSetting = 0;
            if (difficulty === 'medium') timeLimitSetting = 40;
            if (difficulty === 'hard') timeLimitSetting = 20;
            if (difficulty === 'extreme') timeLimitSetting = 10;

            try {
                if (!isMuted) {
                    const bgm = document.getElementById('bgm');
                    bgm.volume = 0.2;
                    let playPromise = bgm.play();
                    if (playPromise !== undefined) playPromise.catch(e => {});
                }
            } catch(e) {}
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            if (timeLimitSetting === 0) {
                document.getElementById('timer-display').innerHTML = "🟢 <span style='color:#2e7d32;'>無時限</span>";
            }
            
            loadQuestion();
        } catch(error) {
            alert("系統啟動異常：" + error.message);
        }
    }

    function loadQuestion() {
        try {
            clearInterval(timerInterval);
            
            // 重置 UFO 狀態
            const ufo = document.getElementById('ufo-sprite');
            ufo.innerText = '🛸';
            ufo.className = 'floating';

            if (timeLimitSetting > 0) {
                timeLeft = timeLimitSetting;
                document.getElementById('time-left').innerText = timeLeft;
                timerInterval = setInterval(updateTimer, 1000);
            }

            document.getElementById('current-q-num').innerText = current + 1;
            document.getElementById('progress-fill').style.width = ((current) / gameQuestions.length * 100) + "%";
            
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            document.getElementById('question-text').innerText = "❓ " + gameQuestions[current].q;

            // 顯示選項
            gameQuestions[current].c.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.innerText = choice;
                btn.className = 'btn btn-choice';
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        } catch(e) {
            alert("載入題目錯誤：" + e.message);
        }
    }

    function updateTimer() {
        if (timeLimitSetting === 0) return; 
        timeLeft--;
        document.getElementById('time-left').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            
            // 超時 = 攻擊失敗，UFO 逃跑
            playSfx('wrong');
            const ufo = document.getElementById('ufo-sprite');
            ufo.innerText = '🛸💨';
            ufo.className = 'shake';
            
            setTimeout(() => {
                alert('⏱️ 瞄準超時，UFO逃跑了！\n正確答案是：' + gameQuestions[current].c[gameQuestions[current].a]);
                nextQuestion();
            }, 600);
        }
    }

    function checkAnswer(index) {
        clearInterval(timerInterval);
        const ufo = document.getElementById('ufo-sprite');
        
        try {
            if (index === gameQuestions[current].a) {
                // 答對！發射激光，UFO爆炸
                score += 10;
                document.getElementById('score').innerText = (score/10); // 顯示擊落架數
                playSfx('laser');
                ufo.innerText = '💥';
                ufo.className = 'hit';
                
                setTimeout(() => { nextQuestion(); }, 700); // 留時間播爆炸動畫
            } else {
                // 答錯！UFO閃避逃跑
                playSfx('wrong');
                ufo.innerText = '🛸💨';
                ufo.className = 'shake';
                
                setTimeout(() => { 
                    alert('❌ 攻擊落空，UFO逃跑了！\n正確答案是：' + gameQuestions[current].c[gameQuestions[current].a]); 
                    nextQuestion(); 
                }, 600);
            }
        } catch (e) {
            nextQuestion(); 
        }
    }

    function nextQuestion() {
        current++;
        if (current < gameQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        try {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            try { document.getElementById('bgm').pause(); } catch(e){}

            let msg = "";
            let emoji = "";
            if (score === 400) {
                msg = "地球的救星！你完美擊落了所有 UFO！";
                emoji = "🏆👑🥇";
            } else if (score >= 320) {
                msg = "戰績彪炳！大部份的 UFO 都被你消滅了！";
                emoji = "🌟👏";
            } else if (score >= 200) {
                msg = "表現不錯，再重溫一下知識，下次一定能擊落更多！";
                emoji = "📚💪";
            } else {
                msg = "不要灰心，拿出溫習表修煉一下，下次再來挑戰吧！";
                emoji = "🌱📖";
            }
            
            document.getElementById('result-message').innerText = msg;
            document.getElementById('result-emoji').innerText = emoji;
        } catch(e) {}
    }
</script>
