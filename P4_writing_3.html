<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🖊️ 記敍文闖關遊戲</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;
  background:#eef1ff;color:#1e2340;min-height:100vh;
  background-image:
    radial-gradient(circle at 8% 15%,rgba(147,114,255,.13) 0%,transparent 45%),
    radial-gradient(circle at 92% 85%,rgba(99,179,255,.13) 0%,transparent 45%);
}
button,input{font-family:inherit}
.app{max-width:1400px;margin:0 auto;padding:16px 16px 100px}

/* ── Hero topbar ── */
.topbar{
  background:linear-gradient(135deg,#6c63ff 0%,#4facfe 100%);
  border-radius:26px;padding:22px 26px 18px;margin-bottom:14px;
  color:#fff;position:relative;overflow:hidden;
  box-shadow:0 18px 54px rgba(108,99,255,.32);
}
.topbar::before{content:"";position:absolute;top:-50px;right:-50px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07)}
.topbar::after{content:"";position:absolute;bottom:-70px;right:90px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.title-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;position:relative;z-index:1}
.title-wrap h1{font-size:clamp(1.4rem,2.3vw,2rem);font-weight:900;letter-spacing:.04em;margin-bottom:5px}
.school-name{font-size:.88rem;opacity:.82;margin-bottom:10px}
.subtitle{display:flex;flex-wrap:wrap;gap:7px}
.subtitle .pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:4px 11px;font-size:.8rem;backdrop-filter:blur(6px);color:#fff}

/* ── Switcher toolbar ── */
.toolbar{display:flex;flex-direction:column;gap:9px;position:relative;z-index:1}
.sw-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sw-label{font-size:.78rem;opacity:.82;margin-right:2px;white-space:nowrap;color:#fff}

/* Colour circles for theme */
.theme-circle{
  width:28px;height:28px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.38);
  cursor:pointer;transition:.2s;padding:0;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.theme-circle:hover{transform:scale(1.18)}
.theme-circle.on{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.55),0 2px 10px rgba(0,0,0,.2);transform:scale(1.18)}
.tc-sky{background:linear-gradient(135deg,#6c63ff,#4facfe)}
.tc-forest{background:linear-gradient(135deg,#1fa86a,#38f9d7)}
.tc-sunset{background:linear-gradient(135deg,#ff6b35,#f9c74f)}

/* Mode toggles */
.tgl{
  padding:7px 14px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.38);
  background:rgba(255,255,255,.15);color:#fff;
  cursor:pointer;font-size:.82rem;transition:.2s;backdrop-filter:blur(4px);
}
.tgl:hover{background:rgba(255,255,255,.28)}
.tgl.on{background:rgba(255,255,255,.92);color:#5b4de8;font-weight:700;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.14)}

/* ── Progress ── */
.progress-wrap{margin-top:16px;position:relative;z-index:1}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:.87rem;color:rgba(255,255,255,.9)}
.prog-bar{height:13px;border-radius:999px;background:rgba(255,255,255,.2);overflow:hidden;border:1px solid rgba(255,255,255,.22)}
.prog-fill{
  height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,#ffe55a,#ff9a3c);
  transition:width .4s cubic-bezier(.4,0,.2,1);position:relative;
}
.prog-fill::after{
  content:"";position:absolute;inset:0;border-radius:999px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  animation:shimmer 2.2s linear infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ── Stage nav ── */
.stage-nav{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;position:relative;z-index:1}
.s-tab{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 13px;border-radius:14px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.14);
  color:rgba(255,255,255,.88);font-size:.8rem;transition:.2s;min-width:70px;
  backdrop-filter:blur(4px);
}
.s-tab strong{font-size:.86rem}
.s-tab:hover{background:rgba(255,255,255,.27);transform:translateY(-1px)}
.s-tab.act{
  background:#fff;color:#5b4de8;border-color:transparent;
  box-shadow:0 6px 18px rgba(0,0,0,.18);transform:translateY(-2px);font-weight:700;
}
.s-tab.dn{background:rgba(90,255,170,.22);border-color:rgba(90,255,170,.45);color:#e0fff0}
.s-tab.act.dn{background:#fff;color:#1a8f5a}
.s-mini{font-size:.74rem}

/* ── Main layout ── */
.main{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(340px,.95fr);gap:14px;align-items:start}

/* ── Panel ── */
.panel{background:#fff;border-radius:22px;box-shadow:0 8px 30px rgba(30,35,80,.08);overflow:hidden;border:1.5px solid rgba(200,210,255,.5)}

/* ── Panel head ── */
.p-head{
  padding:18px 20px 12px;border-bottom:2px solid #f0f2ff;
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;
}
.p-head h2{margin:0;font-size:1.12rem;font-weight:800;color:#2d2060}
.p-sub{color:#7a82b0;font-size:.87rem;margin-top:4px;line-height:1.5}
.p-body{padding:20px}

/* Preview panel pills */
.pill{background:#f0f2ff;border:1.5px solid #dde3ff;border-radius:999px;padding:5px 12px;font-size:.82rem;color:#5b4de8;font-weight:600}
.ctr{display:flex;gap:8px;flex-wrap:wrap}
.ctr .pill{background:#fff}

/* Goal pill */
.goal-pill{background:#eff0ff;color:#5b4de8;border-radius:999px;padding:5px 12px;font-size:.79rem;font-weight:600;white-space:nowrap;border:1.5px solid #dde3ff}

/* ── Stage content elements ── */
.tgt{background:linear-gradient(135deg,#f6f8ff,#edf0ff);border:1.5px solid #dde3ff;border-radius:16px;padding:14px;margin-bottom:16px}
.tgt h3{font-size:.93rem;font-weight:700;color:#4a4480;margin-bottom:6px}
.tgt p{font-size:.87rem;color:#6870a8;line-height:1.65;margin:0}

.frame{background:linear-gradient(135deg,#fffcee,#fff8dc);border:1.5px solid #eedd88;border-radius:16px;padding:13px 15px;margin-bottom:16px}
.frame-ttl{font-size:.82rem;font-weight:700;color:#9a7800;margin-bottom:8px}
.frame-ln{font-size:.93rem;color:#7a6200;line-height:1.9;border-bottom:1px dashed rgba(154,120,0,.18);padding-bottom:3px;margin-bottom:3px}
.frame-ln:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}

.fg{margin-bottom:16px}
.flbl{display:block;font-weight:700;margin-bottom:9px;font-size:.93rem;color:#2d2060}
.fhelp{font-size:.81rem;color:#9098c0;margin-top:7px;line-height:1.5}

.choices{display:flex;flex-wrap:wrap;gap:7px}
.c-btn{
  border:1.5px solid #dde3ff;background:#f6f8ff;color:#4a4a70;
  border-radius:13px;padding:9px 13px;cursor:pointer;font-size:.88rem;
  transition:.18s;font-weight:500;
}
.c-btn:hover{border-color:#6c63ff;background:#eeecff;color:#5b4de8;transform:translateY(-1px)}
.c-btn.on{
  background:linear-gradient(135deg,#6c63ff,#4facfe);color:#fff;
  border-color:transparent;box-shadow:0 6px 16px rgba(108,99,255,.28);
  transform:translateY(-1px);font-weight:700;
}

.t-in{
  width:100%;min-height:48px;border:1.5px solid #dde3ff;border-radius:14px;
  background:#f6f8ff;padding:12px 15px;font-size:.93rem;color:#2d2060;
  outline:none;transition:.2s;
}
.t-in:focus{border-color:#6c63ff;background:#fff;box-shadow:0 0 0 4px rgba(108,99,255,.1)}
.t-in::placeholder{color:#b4bcd8}

.h-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.h-chip{
  border:1px solid #d5daff;background:#eef0ff;color:#5558a8;
  border-radius:999px;padding:6px 11px;cursor:pointer;font-size:.82rem;transition:.15s;
}
.h-chip:hover{background:#6c63ff;color:#fff;border-color:transparent;transform:translateY(-1px)}

.sp2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.act-bar{
  display:flex;flex-wrap:wrap;gap:9px;justify-content:space-between;align-items:center;
  margin-top:22px;padding-top:16px;border-top:2px dashed #e6eaff;
}
.s-btns{display:flex;gap:8px;flex-wrap:wrap}
.s-txt{color:#9098c0;font-size:.82rem}

/* ── Buttons ── */
.btn{
  border:none;border-radius:13px;padding:10px 17px;cursor:pointer;
  font-size:.9rem;font-weight:700;transition:.18s;
  box-shadow:0 6px 16px rgba(108,99,255,.22);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(108,99,255,.3)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
/* default = primary gradient */
.btn{background:linear-gradient(135deg,#6c63ff,#4facfe);color:#fff}
.btn.sec{background:#f0f2ff;color:#5b4de8;border:1.5px solid #dde3ff;box-shadow:none}
.btn.sec:hover{background:#e8ebff;box-shadow:none}
.btn.wrn{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;box-shadow:0 6px 16px rgba(255,107,107,.28)}
.btn.gd{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a5c3a;box-shadow:0 6px 16px rgba(67,233,123,.25)}

/* ── Preview tools ── */
.prev-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}

/* ── Paper ── */
.paper{
  background:
    linear-gradient(transparent 31px,rgba(170,195,255,.28) 32px),
    linear-gradient(90deg,rgba(255,140,140,.35) 0,rgba(255,140,140,.35) 1px,transparent 1px);
  background-size:100% 32px,42px 100%;
  background-position:0 0,26px 0;
  background-color:#fffef9;
  border-radius:20px;border:1.5px solid #ede8d0;min-height:660px;
  padding:24px 24px 28px 54px;position:relative;overflow:hidden;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.03);
}
.paper::before{content:"";position:absolute;top:0;left:36px;width:2px;height:100%;background:rgba(255,140,140,.4)}
.e-title{text-align:center;font-size:1.38rem;font-weight:900;margin:4px 0 14px;letter-spacing:.07em;color:#2d2060}
.e-meta{text-align:center;color:#9098c0;font-size:.82rem;margin-bottom:14px}
.placeholder{color:#b8bede;line-height:2.2;font-size:.93rem;text-align:center;padding-top:28px}
.e-para{text-indent:2em;line-height:2.2;margin:0 0 14px;font-size:.97rem;word-break:break-word;color:#2a2f50}
.hl{background:linear-gradient(135deg,#fff176,#ffee58);border-radius:5px;padding:1px 5px;color:#5a4200;font-weight:700}

/* ── Checklist ── */
.chklist{margin-top:14px;background:#f6f8ff;border:1.5px solid #e4e8ff;border-radius:18px;padding:14px}
.chklist h3{margin:0 0 10px;font-size:.9rem;font-weight:800;color:#4a4480}
.chklist ul{list-style:none;display:grid;gap:7px}
.ci{
  display:flex;gap:9px;align-items:center;padding:9px 12px;
  border-radius:11px;background:#fff;border:1.5px solid #e4e8ff;
  font-size:.87rem;color:#7a82b0;transition:.2s;
}
.ci.dn{color:#1a7a50;border-color:#b8f0d4;background:#eafff4}
.ci-ico{
  width:24px;height:24px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;font-size:.78rem;
  background:#e4e8ff;color:#9098c0;font-weight:900;
}
.ci.dn .ci-ico{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff}

/* ── Alert ── */
.alert-bx{background:linear-gradient(135deg,#fff0f0,#fff8ff);border:1.5px solid #ffd0d0;border-radius:16px;padding:22px;text-align:center}
.alert-bx p{font-size:.93rem;color:#c05050;line-height:1.65;margin:0 0 14px}

/* ── Mini note ── */
.mini-note{background:#fffbee;border:1px solid #f0d98a;border-radius:11px;padding:10px 13px;font-size:.81rem;color:#8a6f00;margin-top:10px;line-height:1.5}
.mini-note::before{content:"💡  "}

/* ── Legend ── */
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.leg span{background:#f6f8ff;border:1px solid #dde3ff;border-radius:999px;padding:5px 11px;font-size:.81rem;color:#6870a8}

/* ── Helper sprite ── */
.hlp-box{position:fixed;right:18px;bottom:18px;z-index:50;display:flex;align-items:flex-end;gap:10px;max-width:min(92vw,360px)}
.hlp-bbl{
  background:#fff;border:1.5px solid #dde3ff;border-radius:18px 18px 4px 18px;
  box-shadow:0 12px 40px rgba(30,35,80,.15);
  padding:13px 15px;line-height:1.65;color:#2d2060;
  min-width:190px;opacity:0;transform:translateY(12px);
  pointer-events:none;transition:.25s;font-size:.9rem;
}
.hlp-bbl.show{opacity:1;transform:translateY(0);pointer-events:auto}
.hlp-btn{
  width:72px;height:72px;border:none;border-radius:50%;cursor:pointer;
  background:linear-gradient(135deg,#ffe55a,#ffb347);
  box-shadow:0 12px 30px rgba(255,180,50,.38);
  font-size:2.1rem;display:grid;place-items:center;
  animation:bob 3s ease-in-out infinite;transition:.2s;
}
.hlp-btn:hover{transform:scale(1.1)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* ── Toast ── */
.toast{
  position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(18px);
  opacity:0;pointer-events:none;background:rgba(28,33,64,.94);color:#fff;
  border-radius:14px;padding:11px 18px;z-index:100;transition:.25s;
  max-width:min(92vw,580px);text-align:center;line-height:1.5;font-size:.9rem;
  box-shadow:0 18px 36px rgba(0,0,0,.18);backdrop-filter:blur(8px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Theme: forest (green) ── */
body.theme-forest{
  background:#edfff6;
  background-image:radial-gradient(circle at 8% 15%,rgba(67,233,123,.13) 0%,transparent 45%),
    radial-gradient(circle at 92% 85%,rgba(56,249,215,.12) 0%,transparent 45%);
}
body.theme-forest .topbar{background:linear-gradient(135deg,#1fa86a 0%,#38f9d7 100%);box-shadow:0 18px 54px rgba(31,168,106,.3)}
body.theme-forest .s-tab.act{color:#1fa86a}
body.theme-forest .tgl.on{color:#1fa86a}
body.theme-forest .c-btn.on{background:linear-gradient(135deg,#1fa86a,#38f9d7);box-shadow:0 6px 16px rgba(31,168,106,.28)}
body.theme-forest .prog-fill{background:linear-gradient(90deg,#43e97b,#38f9d7)}
body.theme-forest .btn:not(.sec):not(.wrn):not(.gd){background:linear-gradient(135deg,#1fa86a,#38f9d7);box-shadow:0 8px 20px rgba(31,168,106,.28)}
body.theme-forest .goal-pill{background:#e0fff2;color:#1a7a50;border-color:#b8f0d4}
body.theme-forest .p-head{border-color:#d8f5e8}
body.theme-forest .p-head h2{color:#0d4a2e}
body.theme-forest .tgt{background:linear-gradient(135deg,#f0fff8,#e0fff2);border-color:#b8f0d4}
body.theme-forest .tgt h3{color:#1a5c3a}

/* ── Theme: sunset (orange) ── */
body.theme-sunset{
  background:#fff8f0;
  background-image:radial-gradient(circle at 8% 15%,rgba(255,154,58,.13) 0%,transparent 45%),
    radial-gradient(circle at 92% 85%,rgba(255,200,100,.12) 0%,transparent 45%);
}
body.theme-sunset .topbar{background:linear-gradient(135deg,#ff6b35 0%,#f9c74f 100%);box-shadow:0 18px 54px rgba(255,107,53,.3)}
body.theme-sunset .s-tab.act{color:#c04a00}
body.theme-sunset .tgl.on{color:#c04a00}
body.theme-sunset .c-btn.on{background:linear-gradient(135deg,#ff6b35,#f9c74f);box-shadow:0 6px 16px rgba(255,107,53,.28)}
body.theme-sunset .prog-fill{background:linear-gradient(90deg,#ff6b35,#f9c74f)}
body.theme-sunset .btn:not(.sec):not(.wrn):not(.gd){background:linear-gradient(135deg,#ff6b35,#f9c74f);box-shadow:0 8px 20px rgba(255,107,53,.28)}
body.theme-sunset .goal-pill{background:#fff0e8;color:#c04a00;border-color:#ffd0a8}
body.theme-sunset .p-head{border-color:#ffe8d6}
body.theme-sunset .p-head h2{color:#7a2e00}
body.theme-sunset .tgt{background:linear-gradient(135deg,#fff8f0,#fff0e0);border-color:#ffd0a0}
body.theme-sunset .tgt h3{color:#7a2e00}

/* ── Responsive ── */
@media(max-width:1100px){.main{grid-template-columns:1fr}.paper{min-height:500px}}
@media(max-width:820px){
  .stage-nav{gap:5px}
  .s-tab{min-width:62px;padding:7px 9px}
  .sp2{grid-template-columns:1fr}
  .p-body{padding:15px}
}
@media(max-width:520px){
  .app{padding:10px 10px 90px}
  .topbar{padding:15px 16px;border-radius:20px}
  .title-wrap h1{font-size:1.28rem}
  .stage-nav{display:grid;grid-template-columns:repeat(4,1fr)}
  .s-tab{min-width:0;font-size:.75rem}
  .paper{border-radius:16px;padding:20px 14px 22px 40px}
  .paper::before{left:28px}
  .e-title{font-size:1.2rem}
  .btn{font-size:.85rem;padding:9px 13px}
  .c-btn{font-size:.84rem}
  .tgl{font-size:.78rem;padding:6px 11px}
}
@media print{
  body{background:#fff}
  .no-print,.hlp-box,.toast{display:none !important}
  .app{max-width:none;padding:0}
  .topbar,.left-panel,.prev-tools,.chklist{display:none !important}
  .main{display:block}
  .panel{border:none;box-shadow:none}
  .p-head{display:none}
  .p-body{padding:0}
  .paper{border:none;box-shadow:none;min-height:auto;padding:18px 20px 22px 44px;background-color:#fff}
  .paper::before{display:none}
  .e-title{margin-top:0}
}
</style>
</head>
<body class="theme-sky">
<div class="app">

  <!-- ── TOPBAR ── -->
  <header class="topbar no-print">
    <div class="title-row">
      <div class="title-wrap">
        <h1>🖊️ 中文記敍文互動闖關遊戲</h1>
        <div class="school-name">勵志會梁李秀娛紀念小學</div>
        <div class="subtitle">
          <span class="pill">📖 三段式記敍文</span>
          <span class="pill">🏆 7 關完成作文</span>
          <span class="pill">🛟 高支援句框</span>
          <span class="pill">👁️ 即時作文預覽</span>
        </div>
      </div>
      <div class="toolbar">
        <div class="sw-group" id="themeSwitch">
          <div class="sw-label">🎨 主題色</div>
          <button class="theme-circle tc-sky on" data-theme="sky" type="button" title="天空藍"></button>
          <button class="theme-circle tc-forest" data-theme="forest" type="button" title="森林綠"></button>
          <button class="theme-circle tc-sunset" data-theme="sunset" type="button" title="暖日橙"></button>
        </div>
        <div class="sw-group" id="modeSwitch">
          <div class="sw-label">⚡ 難度</div>
          <button class="tgl on" data-mode="basic" type="button">基礎版</button>
          <button class="tgl" data-mode="standard" type="button">標準版</button>
          <button class="tgl" data-mode="challenge" type="button">挑戰版</button>
        </div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="prog-head">
        <div id="stageLabel">第 1 關 / 共 7 關</div>
        <div id="saveStatus">草稿未儲存</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="stage-nav" id="stageNav"></div>
  </header>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- LEFT panel -->
    <section class="panel left-panel no-print">
      <div class="p-head">
        <div>
          <h2 id="leftTitle">第 1 關：選題型</h2>
          <div class="p-sub" id="leftSub">先選一個寫作方向，系統會按題型提供不同提示。</div>
        </div>
        <span class="goal-pill" id="goalPill">學習重點：先定題型</span>
      </div>
      <div class="p-body" id="stageContent"></div>
    </section>

    <!-- RIGHT panel -->
    <section class="panel right-panel">
      <div class="p-head">
        <div>
          <h2>📄 作文預覽區</h2>
          <div class="p-sub">你的作文會在這裏一步一步完成。</div>

function bindStage(){ const box = document.getElementById('stageContent');
box.querySelectorAll('.c-btn[data-path][data-val]').forEach(btn=>{ btn.addEventListener('click', ()=>{ setByPath(btn.dataset.path, btn.dataset.val);
if(btn.dataset.path === 'category'){ const pk = PACKS[btn.dataset.val]; if(pk){ if(!pk.scenes.includes(ST.s2.place)) ST.s2.place = ''; if(!pk.people.includes(ST.s2.people)) ST.s2.people = ''; if(!pk.actions.includes(ST.s3.action1)) ST.s3.action1 = ''; if(!pk.actions.includes(ST.s4.action2)) ST.s4.action2 = ''; if(!pk.actions.includes(ST.s4.action3)) ST.s4.action3 = ''; if(!pk.climaxes.includes(ST.s5.climax)) ST.s5.climax = ''; if(!pk.results.includes(ST.s6.result)) ST.s6.result = ''; if(!pk.meanings.includes(ST.s7.idea)) ST.s7.idea = ''; } }
renderAll(); saveState(); }); });
box.querySelectorAll('.j-in').forEach(inp=>{ inp.addEventListener('input', ()=>{ setByPath(inp.dataset.path, inp.value); renderPreview(); renderChecklist(); updateTop(); saveState(); }); });
box.querySelectorAll('.h-chip[data-ipath]').forEach(btn=>{ btn.addEventListener('click', ()=>{ setByPath(btn.dataset.ipath, btn.dataset.ival); renderAll(); saveState(); }); });
const prevBtn = document.getElementById('prevBtn'); const nextBtn = document.getElementById('nextBtn');
if(prevBtn){ prevBtn.addEventListener('click', ()=>{ if(ST.currentStage > 1){ ST.currentStage--; renderAll(); saveState(); } }); }
if(nextBtn){ nextBtn.addEventListener('click', ()=>{ if(!validate(ST.currentStage,true)) return; if(ST.currentStage < 7){ ST.currentStage++; renderAll(); saveState(); }else{ showToast('🎉 恭喜你！7 關全部完成，作文大功告成！'); renderAll(); saveState(); } }); } }
function renderPreview(){ const pk = getPack(); document.getElementById('essayTitle').textContent = pk ? pk.topic : '未選擇題目'; document.getElementById('essayMeta').textContent = '模式：' + DIFF_TXT[ST.difficulty] + '　｜　類別：' + (pk ? pk.short : '未選擇'); document.getElementById('topicTag').textContent = '題目：' + (pk ? pk.topic : '未選擇');
const paras = buildParas(); const ec = document.getElementById('essayContent');
if(!paras.length){ ec.innerHTML = '<div class="placeholder">你的作文會在這裏一步一步完成。先到左邊開始闖關吧！</div>'; }else{ ec.innerHTML = paras.map(p=>'<p class="e-para">'+p+'</p>').join(''); }
document.getElementById('wcTag').textContent = '字數：' + wordCount(stripHtml(paras.join(''))); }
function buildParas(){ const pk = getPack(); if(!pk) return []; const out = []; if(hasAny(ST.s2)) out.push(buildP1(pk)); if(hasAny(ST.s3) || hasAny(ST.s4) || hasAny(ST.s5)) out.push(buildP2(pk)); if(hasAny(ST.s6) || hasAny(ST.s7)) out.push(buildP3(pk)); return out.filter(Boolean); }
function buildP1(pk){ const s = ST.s2; const t = esc(s.time), pe = esc(s.people), pl = esc(s.place), ac = esc(s.activity), mo = esc(s.mood); const tpls = [ 上星期${t||'＿＿'}，我和${pe||'＿＿'}到${pl||'＿＿'}，準備${ac||'＿＿'}。那天，我感到很${mo||'＿＿'}。, 上星期${t||'＿＿'}，我跟${pe||'＿＿'}一起去了${pl||'＿＿'}，想去${ac||'＿＿'}。開始的時候，我的心情很${mo||'＿＿'}。, 上星期${t||'＿＿'}，我和${pe||'＿＿'}來到${pl||'＿＿'}，打算${ac||'＿＿'}。那一天，我覺得十分${mo||'＿＿'}。 ]; return pickTemplate(tpls, pk.key); }
function buildP2(pk){ const s3 = ST.s3, s4 = ST.s4, s5 = ST.s5; const t1 = highlight(esc(s3.transition||'首先')); const t2 = highlight(esc(s4.transition||'接着')); const t3 = highlight('然後'); const t4 = highlight('最後'); const a1 = esc(s3.action1)||'＿＿'; const ex = esc(s3.extra)||'＿＿'; const a2 = esc(s4.action2)||'＿＿'; const a3 = esc(s4.action3)||'＿＿'; const dt = esc(s4.detail)||'＿＿'; const cl = esc(s5.climax)||'＿＿'; const fl = esc(s5.feeling)||'＿＿'; const th = esc(s5.thought)||'＿＿';
const sentA = ST.difficulty==='basic' ? ${t1}，我們${a1}，然後${ex}。 : ${t1}，我先${a1}，準備${ex}。;
const tpls = [ ${sentA}${t2}，我${a2}。${t3}，我看見${dt}。${t4}，我們${a3}。最令我難忘的是${cl}。當時，我感到十分${fl}。我心想：「${th}。」, ${sentA}${t2}，我們繼續${a2}。${t3}，我看見${dt}。${t4}，大家一起${a3}。其中，最令我難忘的是${cl}。那一刻，我感到十分${fl}，心裏想：「${th}。」, ${sentA}${t2}，我接着${a2}。${t3}，耳邊傳來${dt}。${t4}，我們便${a3}。最深刻的一刻是${cl}。當時，我十分${fl}，我心想：「${th}。」 ]; return pickTemplate(tpls, pk.key + ST.difficulty); }
function buildP3(pk){ const s6 = ST.s6, s7 = ST.s7; const rs = esc(s6.result)||'＿＿'; const fl = esc(s6.feeling)||'＿＿'; const re = esc(s6.reason)||'＿＿'; const echoRaw = (s7.echoTpl || ECHO_TPLS[0]).replace('[ECHO]', s7.echoContent || '＿＿'); const echoSent = esc(echoRaw); const idea = esc(s7.idea)||'＿＿';
const tpls = [ 最後，${rs}。我感到很${fl}，因為${re}。${echoSent}${idea}, 事情結束後，${rs}。我覺得很${fl}，因為${re}。${echoSent}${idea}, 到了最後，${rs}。我心裏感到很${fl}，因為${re}。${echoSent}${idea} ]; return pickTemplate(tpls, pk.key + 'end'); }
function renderChecklist(){ const paras = buildParas(); const count = wordCount(stripHtml(paras.join(''))); const goal = wordGoal(); const items = [ {t:'我有選擇題目。', d:!!ST.category}, {t:'我有交代時間、地點、人物。', d:!!(ST.s2.time&&ST.s2.place&&ST.s2.people)}, {t:'我有按次序寫事情經過。', d:!!(ST.s3.action1&&ST.s4.action2&&ST.s4.action3)}, {t:'我有使用過渡詞。', d:!!(ST.s3.transition&&ST.s4.transition)}, {t:'我有寫最難忘的一刻。', d:!!(ST.s5.climax&&ST.s5.thought)}, {t:'我有寫結果和感受。', d:!!(ST.s6.result&&ST.s6.feeling&&ST.s6.reason)}, {t:'我有做到首尾呼應。', d:!!(ST.s7.echoTpl&&ST.s7.echoContent)}, {t:'我有寫出立意。', d:!!ST.s7.idea}, {t:我的文章已有一定字數。（目標：約 ${goal} 字）, d:count>=goal} ]; document.getElementById('checklist').innerHTML = items.map(item=>` <li class="ci ${item.d?'dn':''}"> <span class="ci-ico">${item.d?'✓':'○'}</span> <span>${item.t}</span> </li> `).join(''); }
function updateTop(){ const done =.filter(isComplete).length;tutorialspoint+6 document.getElementById('progFill').style.width = Math.round(done / 7 * 100) + '%'; document.getElementById('stageLabel').textContent = 第 ${ST.currentStage} 關 / 共 7 關; document.getElementById('saveStatus').textContent = ST.savedAt ? 已自動儲存 ${ST.savedAt} : '草稿未儲存'; }
function isComplete(n){ return validate(n,false); }
function validate(n, showMsg){ const msg = { 1: !ST.category ? '請先選擇一個題型。' : '', 2: (!(ST.s2.time&&ST.s2.place&&ST.s2.people&&ST.s2.activity&&ST.s2.mood)) ? '請完成時間、地點、人物、活動和心情。' : '', 3: (!(ST.s3.transition&&ST.s3.action1&&ST.s3.extra)) ? '請選起首過渡詞、第一個大動作，並輸入補充短語。' : '', 4: (!(ST.s4.transition&&ST.s4.action2&&ST.s4.action3&&ST.s4.detail)) ? '請完成過渡詞、動作和細節。' : '', 5: (!(ST.s5.climax&&ST.s5.feeling&&ST.s5.thought)) ? '請完成最難忘的一刻、感受詞和內心想法。' : '', 6: (!(ST.s6.result&&ST.s6.feeling&&ST.s6.reason)) ? '請完成結果、感受和原因。' : '', 7: (!(ST.s7.echoTpl&&ST.s7.idea&&ST.s7.echoContent)) ? '第 7 關必須完成首尾呼應和立意內容。' : '' }[n] || '';
if(msg && showMsg) showToast(msg); return !msg; }
function resetStage(){ if(!confirm(要重設第 ${ST.currentStage} 關的內容嗎？)) return; const d = defState(); const map = { 1:()=>{ ST.category=''; }, 2:()=>{ ST.s2={...d.s2}; }, 3:()=>{ ST.s3={...d.s3}; }, 4:()=>{ ST.s4={...d.s4}; }, 5:()=>{ ST.s5={...d.s5}; }, 6:()=>{ ST.s6={...d.s6}; }, 7:()=>{ ST.s7={...d.s7}; } }; mapST.currentStage; renderAll(); saveState(); showToast(第 ${ST.currentStage} 關已重設。); }
function resetAll(){ if(!confirm('要重設全文嗎？所有關卡內容都會清除。')) return; ST = defState(); applyTheme(ST.theme); syncToggle('themeSwitch','data-theme',ST.theme); syncToggle('modeSwitch','data-mode',ST.difficulty); renderAll(); localStorage.removeItem(STORAGE_KEY); saveState(); showToast('全文已重設。'); }
async function copyEssay(){ const paras = buildParas(); if(!paras.length){ showToast('請先完成一些內容，才可以複製全文。'); return; } const text = document.getElementById('essayTitle').textContent + '\n\n' + paras.map(stripHtml).join('\n\n'); try{ await navigator.clipboard.writeText(text); showToast('作文全文已複製。'); }catch(e){ const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); showToast('作文全文已複製。'); }catch(err){ showToast('未能複製，請手動選取文字。'); } ta.remove(); } }
function saveState(){ ST.savedAt = formatTime(new Date()); localStorage.setItem(STORAGE_KEY, JSON.stringify(ST)); updateTop(); }
function loadState(){ try{ const raw = localStorage.getItem(STORAGE_KEY); if(!raw) return defState(); const p = JSON.parse(raw); const d = defState(); return { ...d,...p, s2:{...d.s2,...(p.s2||{})}, s3:{...d.s3,...(p.s3||{})}, s4:{...d.s4,...(p.s4||{})}, s5:{...d.s5,...(p.s5||{})}, s6:{...d.s6,...(p.s6||{})}, s7:{...d.s7,...(p.s7||{})} }; }catch(e){ return defState(); } }
function getPack(){ return PACKS[ST.category] || null; }
function getByPath(path){ return path.split('.').reduce((obj,key)=>obj!=null?obj[key]:undefined, ST); }
function setByPath(path, value){ const keys = path.split('.'); let obj = ST; for(let i=0;i<keys.length-1;i++) obj = obj[keys[i]]; obj[keys[keys.length-1]] = value; }
function pickTemplate(arr, seed){ return arr[Math.abs(hashCode(seed)) % arr.length]; }
function hashCode(str){ let h = 0; for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; } return h; }
function hasAny(obj){ return Object.values(obj).some(v => String(v||'').trim() !== ''); }
function stripHtml(html){ const div = document.createElement('div'); div.innerHTML = html; return div.textContent || ''; }
function wordCount(text){ return (text || '').replace(/\s+/g,'').length; }
function esc(str){ return escHtml(String(str || '').trim()); }
function escHtml(str){ return String(str) .replace(/&/g,'&amp;') .replace(/</g,'&lt;') .replace(/>/g,'&gt;') .replace(/"/g,'&quot;') .replace(/'/g,'&#39;'); }
function escAttr(str){ return escHtml(String(str || '')); }
function highlight(str){ return <span class="hl">${str}</span>; }
function applyTheme(theme){ document.body.classList.remove('theme-sky','theme-forest','theme-sunset'); document.body.classList.add('theme-' + theme); }
function syncToggle(id, attr, val){ document.getElementById(id).querySelectorAll('['+attr+']').forEach(btn=>{ btn.classList.toggle('on', btn.getAttribute(attr) === val); }); }
function wordGoal(){ return {basic:60,standard:80,challenge:100}[ST.difficulty] || 60; }
function formatTime(d){ return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function showToast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(window._toastTimer); window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600); }
function phActivity(){ return {basic:'例如：野餐',standard:'輸入活動名稱，1 至 4 字',challenge:'輸入事情名稱，盡量準確'}[ST.difficulty]; } function phExtra(){ return {basic:'例如：準備野餐',standard:'例如：找位置坐下',challenge:'請寫較完整短語，例如：準備開始活動'}[ST.difficulty]; } function phDetail(){ return {basic:'例如：很多人歡笑',standard:'例如：藍藍的天空',challenge:'請寫 3 至 8 字細節，例如：同學大聲為我打氣'}[ST.difficulty]; } function phThought(){ return {basic:'例如：我要加油',standard:'例如：原來我做得到',challenge:'請輸入完整短句，例如：只要再試一次，我一定做得到'}[ST.difficulty]; } function phReason(){ return {basic:'例如：大家都很照顧我',standard:'例如：我學會了合作',challenge:'請寫清楚原因，例如：我終於克服了原本害怕的事情'}[ST.difficulty]; } function phEcho(){ return {basic:'例如：很開心',standard:'例如：這天很難忘',challenge:'請輸入完整短句，例如：那份溫暖一直留在我心中'}[ST.difficulty]; } function helpThought(){ return ST.difficulty==='challenge' ? '挑戰版：請盡量輸入完整短句。' : '可按提示帶入，也可自己輸入。'; } function helpEcho(){ return ST.difficulty==='challenge' ? '挑戰版：這裏建議輸入完整短句，讓結尾更完整。' : '可先寫心情或回想，也可按提示字詞。'; } 
</script>
