
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>中文記敍文互動闖關遊戲</title>
  <style>
    :root{
      --bg:#f5f7ff;--card:#fff;--card-soft:#f8fbff;--text:#2f3552;--sub:#66708f;
      --line:#dbe3ff;--primary:#6b8cff;--primary-2:#89a5ff;--accent:#ffb86b;
      --good:#31b77a;--warn:#ff8b78;--shadow:0 12px 30px rgba(65,88,160,.12);
      --paper-line:#d9e4ff;--hl:#fff1a8;
    }
    body.theme-forest{
      --bg:#f4fbf7;--card:#fff;--card-soft:#f6fffa;--text:#29443a;--sub:#5f7c72;
      --line:#d7efe3;--primary:#4db27e;--primary-2:#7fd0a9;--accent:#f4b860;
      --good:#24956a;--warn:#ef8b7b;--shadow:0 12px 30px rgba(44,105,76,.12);
      --paper-line:#dcefe6;--hl:#fff1a8;
    }
    body.theme-sunset{
      --bg:#fff8f4;--card:#fff;--card-soft:#fffaf7;--text:#5b3c36;--sub:#8a655c;
      --line:#f0ddd7;--primary:#ef8e72;--primary-2:#f5ac95;--accent:#6f9dfc;
      --good:#47a86d;--warn:#ff7d6d;--shadow:0 12px 30px rgba(145,84,66,.12);
      --paper-line:#f1e1da;--hl:#fff1a8;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;
      background:radial-gradient(circle at top right,rgba(255,255,255,.85),transparent 28%),
        linear-gradient(180deg,#fff 0%,var(--bg) 100%);
      color:var(--text);min-height:100vh;
    }
    .app{max-width:1380px;margin:0 auto;padding:18px 18px 90px}
    .topbar{
      background:var(--card);border:1px solid var(--line);border-radius:24px;
      box-shadow:var(--shadow);padding:18px;margin-bottom:16px;
      position:sticky;top:8px;z-index:30;
    }
    .title-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .title-wrap h1{margin:0 0 6px;font-size:clamp(1.4rem,2vw,1.9rem);letter-spacing:.03em}
    .school-name{color:var(--sub);font-size:.97rem;margin-bottom:8px}
    .subtitle{display:flex;flex-wrap:wrap;gap:8px;color:var(--sub);font-size:.93rem}
    .pill{background:var(--card-soft);border:1px solid var(--line);border-radius:999px;padding:5px 10px}
    .toolbar{display:flex;flex-direction:column;gap:10px;align-items:flex-end;min-width:300px;flex:1}
    .sw-group{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
    .sw-label{width:100%;text-align:right;color:var(--sub);font-size:.88rem;margin-bottom:-2px}
    button,input{font-family:inherit}
    .btn{
      border:none;background:var(--primary);color:#fff;border-radius:14px;
      padding:9px 13px;cursor:pointer;transition:.18s;
      box-shadow:0 8px 16px rgba(89,114,205,.15);font-size:.94rem;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(1px)}
    .btn.sec{background:var(--card-soft);color:var(--text);border:1px solid var(--line);box-shadow:none}
    .btn.wrn{background:var(--warn);color:#fff}
    .btn.gd{background:var(--good);color:#fff}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .tgl{
      padding:8px 12px;border-radius:999px;border:1px solid var(--line);
      background:var(--card-soft);color:var(--text);cursor:pointer;transition:.18s;font-size:.9rem;
    }
    .tgl.on{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(90,110,190,.18);
    }
    .progress-wrap{margin-top:14px}
    .prog-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px;font-size:.93rem;color:var(--sub)}
    .prog-bar{height:15px;border-radius:999px;background:var(--card-soft);border:1px solid var(--line);overflow:hidden}
    .prog-fill{
      height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--accent));
      border-radius:999px;transition:width .35s ease;position:relative;
    }
    .prog-fill::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
      animation:shine 2.8s linear infinite;
    }
    @keyframes shine{from{transform:translateX(-120%)}to{transform:translateX(120%)}}
    .stage-nav{margin-top:14px;display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
    .s-tab{
      border:1px solid var(--line);background:var(--card-soft);color:var(--sub);
      border-radius:14px;padding:9px 7px;cursor:pointer;text-align:center;transition:.18s;
      min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    }
    .s-tab strong{color:inherit;font-size:.95rem}
    .s-tab.act{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;border-color:transparent;box-shadow:0 10px 20px rgba(89,114,205,.18);transform:translateY(-1px);
    }
    .s-tab.dn{
      border-color:rgba(49,183,122,.35);
      background:linear-gradient(180deg,rgba(49,183,122,.12),rgba(49,183,122,.04));color:var(--good);
    }
    .s-tab.act.dn{color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2))}
    .s-mini{font-size:.75rem}
    .main{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(330px,.95fr);gap:15px;align-items:start}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .p-head{
      padding:16px 16px 8px;border-bottom:1px solid rgba(0,0,0,.03);
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;
    }
    .p-head h2{margin:0;font-size:1.15rem}
    .p-sub{color:var(--sub);font-size:.93rem;margin-top:5px;line-height:1.5}
    .p-body{padding:16px}
    .tgt{background:linear-gradient(180deg,var(--card-soft),transparent);border:1px dashed var(--line);border-radius:16px;padding:13px;margin-bottom:13px}
    .tgt h3{margin:0 0 7px;font-size:.98rem}
    .tgt p{margin:0;color:var(--sub);line-height:1.6;font-size:.93rem}
    .frame{background:#fffefb;border:1px solid #f0e8d0;border-radius:16px;padding:11px 13px;margin-bottom:14px}
    .frame-ttl{font-size:.9rem;color:#8a7243;margin-bottom:7px}
    .frame-ln{line-height:1.8;font-size:.97rem;color:#6f5c34}
    .fg{margin-bottom:14px}
    .flbl{display:block;font-weight:700;margin-bottom:7px;font-size:.97rem}
    .fhelp{font-size:.86rem;color:var(--sub);margin-top:5px;line-height:1.5}
    .choices{display:flex;flex-wrap:wrap;gap:7px}
    .c-btn{
      border:1px solid var(--line);background:var(--card-soft);color:var(--text);
      border-radius:999px;padding:9px 12px;cursor:pointer;font-size:.93rem;transition:.18s;
    }
    .c-btn:hover{transform:translateY(-1px);border-color:var(--primary)}
    .c-btn.on{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(89,114,205,.18);
    }
    .t-in{
      width:100%;min-height:46px;border:1px solid var(--line);border-radius:14px;
      background:#fff;padding:11px 13px;font-size:.97rem;color:var(--text);outline:none;transition:.18s;
    }
    .t-in:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(106,140,255,.1)}
    .h-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
    .h-chip{
      border:none;background:#eef3ff;color:#4760b8;border-radius:999px;
      padding:7px 10px;cursor:pointer;font-size:.86rem;transition:.16s;
    }
    .h-chip:hover{transform:translateY(-1px)}
    body.theme-forest .h-chip{background:#eaf8f1;color:#34795b}
    body.theme-sunset .h-chip{background:#fff0ea;color:#b0644d}
    .sp2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .act-bar{
      display:flex;flex-wrap:wrap;gap:9px;justify-content:space-between;
      align-items:center;margin-top:20px;padding-top:14px;border-top:1px dashed var(--line);
    }
    .s-btns{display:flex;gap:9px;flex-wrap:wrap}
    .s-txt{color:var(--sub);font-size:.9rem}
    .paper{
      background:
        linear-gradient(transparent 31px,var(--paper-line) 32px),
        linear-gradient(90deg,rgba(255,153,153,.35) 0,rgba(255,153,153,.35) 1px,transparent 1px);
      background-size:100% 32px,42px 100%;
      background-position:0 0,26px 0;
      background-color:#fffefc;
      border-radius:20px;border:1px solid #efe9dc;min-height:660px;
      padding:22px 24px 26px 52px;position:relative;overflow:hidden;
    }
    .paper::before{content:"";position:absolute;top:0;left:34px;width:2px;height:100%;background:rgba(255,153,153,.4)}
    .e-title{text-align:center;font-size:1.4rem;margin:5px 0 15px;letter-spacing:.06em}
    .e-meta{text-align:center;color:var(--sub);font-size:.9rem;margin-bottom:13px}
    .placeholder{color:#98a1bf;line-height:2;padding-top:14px;font-size:1rem}
    .e-para{text-indent:2em;line-height:2;margin:0 0 13px;font-size:1.02rem;word-break:break-word}
    .hl{background:var(--hl);border-radius:5px;padding:0 3px}
    .prev-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px}
    .ctr{display:flex;gap:9px;flex-wrap:wrap}
    .ctr .pill{background:#fff}
    .chklist{margin-top:14px;background:var(--card-soft);border:1px solid var(--line);border-radius:18px;padding:13px}
    .chklist h3{margin:0 0 9px;font-size:.97rem}
    .chklist ul{list-style:none;margin:0;padding:0;display:grid;gap:9px}
    .ci{display:flex;gap:9px;align-items:flex-start;color:var(--sub);line-height:1.5;font-size:.93rem;transition:.18s}
    .ci-ico{
      width:22px;height:22px;flex:0 0 22px;border-radius:50%;display:grid;place-items:center;
      background:#fff;border:1px solid var(--line);color:#a0a8c2;font-weight:700;margin-top:1px;font-size:.8rem;
    }
    .ci.dn{color:var(--text)}
    .ci.dn .ci-ico{background:rgba(49,183,122,.12);color:var(--good);border-color:rgba(49,183,122,.25)}
    .hlp-box{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;align-items:flex-end;gap:9px;max-width:min(92vw,340px)}
    .hlp-bbl{
      background:#fff;border:1px solid var(--line);border-radius:18px 18px 5px 18px;
      box-shadow:var(--shadow);padding:11px 13px;line-height:1.6;color:var(--text);
      min-width:180px;opacity:0;transform:translateY(8px);pointer-events:none;transition:.22s;font-size:.93rem;
    }
    .hlp-bbl.show{opacity:1;transform:translateY(0);pointer-events:auto}
    .hlp-btn{
      width:70px;height:70px;border:none;border-radius:50%;cursor:pointer;
      box-shadow:0 14px 26px rgba(80,98,170,.18);
      background:radial-gradient(circle at 30% 30%,#fff,#fff8d8 22%,#ffe27a 48%,#ffcf49 70%,#f4bb1f 100%);
      color:#7a5600;display:grid;place-items:center;font-size:1.9rem;
      animation:floaty 2.6s ease-in-out infinite;
    }
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .toast{
      position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(14px);
      opacity:0;pointer-events:none;background:rgba(48,57,93,.93);color:#fff;
      border-radius:13px;padding:10px 14px;z-index:100;transition:.22s;
      max-width:min(92vw,540px);text-align:center;line-height:1.5;
      box-shadow:0 16px 24px rgba(0,0,0,.16);font-size:.93rem;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .mini-note{color:var(--sub);font-size:.88rem;line-height:1.5;margin-top:7px}
    .leg{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;font-size:.88rem;color:var(--sub)}
    .leg span{background:var(--card-soft);border:1px solid var(--line);border-radius:999px;padding:5px 9px}
    .alert-bx{background:linear-gradient(135deg,#fff7f5,#fff);border:1px solid #ffd4c8;border-radius:16px;padding:16px;text-align:center;color:#b04030}
    .alert-bx p{margin:0 0 12px;font-size:.97rem;line-height:1.6}
    @media(max-width:1100px){.main{grid-template-columns:1fr}.paper{min-height:520px}}
    @media(max-width:820px){
      .stage-nav{grid-template-columns:repeat(4,1fr)}
      .sp2{grid-template-columns:1fr}
      .toolbar{align-items:flex-start;min-width:auto}
      .sw-group{justify-content:flex-start}
      .sw-label{text-align:left}
      .paper{padding:20px 16px 22px 42px}
      .paper::before{left:28px}
    }
    @media(max-width:520px){
      .app{padding:10px 10px 80px}
      .topbar,.panel{border-radius:16px}
      .p-head,.p-body{padding:13px}
      .stage-nav{grid-template-columns:repeat(2,1fr)}
      .paper{border-radius:16px;padding:18px 12px 20px 36px}
      .paper::before{left:22px}
      .e-title{font-size:1.2rem}
      .s-tab{min-height:54px}
    }
    @media print{
      body{background:#fff}
      .no-print,.hlp-box,.toast{display:none !important}
      .app{max-width:none;padding:0}
      .topbar,.left-panel,.prev-tools,.chklist{display:none !important}
      .main{display:block}
      .panel{border:none;box-shadow:none}
      .p-head{display:none}
      .p-body{padding:0}
      .paper{border:none;box-shadow:none;min-height:auto;padding:16px 22px 22px 42px}
      .e-title{margin-top:0}
    }
  </style>
</head>
<body class="theme-sky">
<div class="app">
  <header class="topbar no-print">
    <div class="title-row">
      <div class="title-wrap">
        <h1>中文記敍文互動闖關遊戲</h1>
        <div class="school-name">勵志會梁李秀娛紀念小學</div>
        <div class="subtitle">
          <span class="pill">三段式記敍文</span>
          <span class="pill">7 關完成作文</span>
          <span class="pill">高支援句框</span>
          <span class="pill">即時作文預覽</span>
        </div>
      </div>
      <div class="toolbar">
        <div class="sw-group" id="themeSwitch">
          <div class="sw-label">主題色切換</div>
          <button class="tgl on" data-theme="sky" type="button">天空藍</button>
          <button class="tgl" data-theme="forest" type="button">森林綠</button>
          <button class="tgl" data-theme="sunset" type="button">暖日橙</button>
        </div>
        <div class="sw-group" id="modeSwitch">
          <div class="sw-label">難度模式</div>
          <button class="tgl on" data-mode="basic" type="button">基礎版</button>
          <button class="tgl" data-mode="standard" type="button">標準版</button>
          <button class="tgl" data-mode="challenge" type="button">挑戰版</button>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="prog-head">
        <div id="stageLabel">第 1 關 / 共 7 關</div>
        <div id="saveStatus">草稿未儲存</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="stage-nav" id="stageNav"></div>
  </header>

  <main class="main">
    <section class="panel left-panel no-print">
      <div class="p-head">
        <div>
          <h2 id="leftTitle">第 1 關：選題型</h2>
          <div class="p-sub" id="leftSub">先選一個寫作方向，系統會按題型提供不同提示。</div>
        </div>
        <div class="pill" id="goalPill">學習重點：段落過渡詞、首尾呼應、尾段立意</div>
      </div>
      <div class="p-body" id="stageContent"></div>
    </section>

    <section class="panel right-panel">
      <div class="p-head">
        <div>
          <h2>作文預覽區</h2>
          <div class="p-sub">你的作文會在這裏一步一步完成。</div>
        </div>
        <div class="ctr">
          <span class="pill" id="topicTag">題目：未選擇</span>
          <span class="pill" id="wcTag">字數：0</span>
        </div>
      </div>
      <div class="p-body">
        <div class="prev-tools no-print">
          <div class="s-btns">
            <button class="btn sec" id="resetStageBtn" type="button">重設單關</button>
            <button class="btn wrn" id="resetAllBtn" type="button">重設全文</button>
          </div>
          <div class="s-btns">
            <button class="btn sec" id="copyBtn" type="button">複製全文</button>
            <button class="btn gd" id="printBtn" type="button">列印作文</button>
          </div>
        </div>
        <article class="paper">
          <div class="e-title" id="essayTitle">未選擇題目</div>
          <div class="e-meta" id="essayMeta">模式：基礎版</div>
          <div id="essayContent"><div class="placeholder">你的作文會在這裏一步一步完成。先到左邊開始闖關吧！</div></div>
        </article>
        <section class="chklist no-print">
          <h3>完成檢查清單</h3>
          <ul id="checklist"></ul>
        </section>
      </div>
    </section>
  </main>
</div>

<div class="hlp-box no-print">
  <div class="hlp-bbl" id="hlpBbl"></div>
  <button class="hlp-btn" id="hlpBtn" type="button" aria-label="小精靈提示">✨</button>
</div>
<div class="toast" id="toast"></div>

// ─── BIND (called after each render) ────────────────────────────────────────
function bind() {
  const sc = document.getElementById('stageContent');

  // Choice buttons
  sc.querySelectorAll('.c-btn[data-path][data-val]').forEach(b => {
    b.addEventListener('click', () => {
      setP(b.dataset.path, b.dataset.val);
      // When category changes, reset pack-dependent selections
      if (b.dataset.path === 'category') {
        const pk = PACKS[b.dataset.val];
        if (pk) {
          if (!pk.scenes.includes(ST.s2.place))    ST.s2.place  = '';
          if (!pk.people.includes(ST.s2.people))   ST.s2.people = '';
          if (!pk.actions.includes(ST.s3.action1)) ST.s3.action1= '';
          if (!pk.actions.includes(ST.s4.action2)) ST.s4.action2= '';
          if (!pk.actions.includes(ST.s4.action3)) ST.s4.action3= '';
          if (!pk.climaxes.includes(ST.s5.climax)) ST.s5.climax = '';
          if (!pk.results.includes(ST.s6.result))  ST.s6.result = '';
          if (!pk.meanings.includes(ST.s7.idea))   ST.s7.idea   = '';
        }
      }
      renderAll(); saveSt();
    });
  });

  // Text inputs
  sc.querySelectorAll('.j-in').forEach(inp => {
    inp.addEventListener('input', () => {
      setP(inp.dataset.path, inp.value);
      renderPreview(); renderChecklist(); updateTop(); saveSt();
    });
  });

  // Hint chips
  sc.querySelectorAll('.h-chip[data-ipath]').forEach(b => {
    b.addEventListener('click', () => {
      setP(b.dataset.ipath, b.dataset.ival);
      renderAll(); saveSt();
    });
  });

  // Nav buttons
  const prevB = document.getElementById('prevBtn');
  const nextB = document.getElementById('nextBtn');
  if (prevB) {
    prevB.addEventListener('click', () => {
      if (ST.currentStage > 1) { ST.currentStage--; renderAll(); saveSt(); }
    });
  }
  if (nextB) {
    nextB.addEventListener('click', () => {
      if (!validate(ST.currentStage, true)) return;
      if (ST.currentStage < 7) { ST.currentStage++; renderAll(); saveSt(); }
      else { showToast('🎉 恭喜你！7 關全部完成，作文大功告成！'); renderAll(); saveSt(); }
    });
  }
}

    <div class="choices">
      ${opts.map(o=>`<button class="c-btn ${cur===o?'on':''}" type="button" data-path="${eA(path)}" data-val="${eA(o)}">${eH(o)}</button>`).join('')}

}

function tf(label, path, ph, hints, help='') {
  const val = getP(path)||'';
  return `<div class="fg">
    <label class="flbl">${label}</label>
    <input class="t-in j-in" type="text" data-path="${eA(path)}" value="${eA(val)}" placeholder="${eA(ph)}"/>

      ${hints.slice(0,6).map(h=>`<button class="h-chip" type="button" data-ipath="${eA(path)}" data-ival="${eA(h)}">${eH(h)}</button>`).join('')}

}

// ─── PREVIEW ────────────────────────────────────────────────────────────────
function renderPreview() {
  const pk = getPack();
  document.getElementById('essayTitle').textContent =
    pk ? pk.topic : '未選擇題目';
  document.getElementById('essayMeta').textContent =
    '模式：' + DIFF_TXT[ST.difficulty] + '　｜　類別：' + (pk ? pk.short : '未選擇');
  document.getElementById('topicTag').textContent =
    '題目：' + (pk ? pk.topic : '未選擇');

  const paras = buildParas();
  const ec = document.getElementById('essayContent');
  if (!paras.length) {
    ec.innerHTML = '<div class="placeholder">你的作文會在這裏一步一步完成。先到左邊開始闖關吧！</div>';
  } else {
    ec.innerHTML = paras.map(p => '<p class="e-para">'+p+'</p>').join('');
  }
  document.getElementById('wcTag').textContent = '字數：' + wc(stripH(paras.join('')));
}

function buildParas() {
  const pk = getPack();
  if (!pk) return [];
  const out = [];
  if (anyVal(ST.s2)) out.push(buildP1(pk));
  if (anyVal(ST.s3)||anyVal(ST.s4)||anyVal(ST.s5)) out.push(buildP2(pk));
  if (anyVal(ST.s6)||anyVal(ST.s7)) out.push(buildP3(pk));
  return out.filter(Boolean);
}

function buildP1(pk) {
  const s = ST.s2;
  const t=e(s.time),pe=e(s.people),pl=e(s.place),ac=e(s.activity),mo=e(s.mood);
  const tpls = [
    `上星期${t||'＿＿'}，我和${pe||'＿＿'}到${pl||'＿＿'}，準備${ac||'＿＿'}。那天，我感到很${mo||'＿＿'}。`,
    `上星期${t||'＿＿'}，我跟${pe||'＿＿'}一起去了${pl||'＿＿'}，想去${ac||'＿＿'}。開始的時候，我的心情很${mo||'＿＿'}。`,
    `上星期${t||'＿＿'}，我和${pe||'＿＿'}來到${pl||'＿＿'}，打算${ac||'＿＿'}。那一天，我覺得十分${mo||'＿＿'}。`
  ];
  return pickT(tpls, pk.key);
}

function buildP2(pk) {
  const s3=ST.s3, s4=ST.s4, s5=ST.s5;
  const t1=h(e(s3.transition||'首先')), t2=h(e(s4.transition||'接着'));
  const hThen=h('然後'), hLast=h('最後');
  const a1=e(s3.action1)||'＿＿', ex=e(s3.extra)||'＿＿';
  const a2=e(s4.action2)||'＿＿', a3=e(s4.action3)||'＿＿', dt=e(s4.detail)||'＿＿';
  const cl=e(s5.climax)||'＿＿', fl=e(s5.feeling)||'＿＿', th=e(s5.thought)||'＿＿';
  const sentA = ST.difficulty==='basic'
    ? `${t1}，我們${a1}，然後${ex}。`
    : `${t1}，我先${a1}，準備${ex}。`;
  const tpls = [
    `${sentA}${t2}，我${a2}。${hThen}，我看見${dt}。${hLast}，我們${a3}。最令我難忘的是${cl}。當時，我感到十分${fl}。我心想：「${th}。」`,
    `${sentA}${t2}，我們繼續${a2}。${hThen}，我看見${dt}。${hLast}，大家一起${a3}。其中，最令我難忘的是${cl}。那一刻，我感到十分${fl}，心裏想：「${th}。」`,
    `${sentA}${t2}，我接着${a2}。${hThen}，耳邊傳來${dt}。${hLast}，我們便${a3}。最深刻的一刻是${cl}。當時，我十分${fl}，我心想：「${th}。」`
  ];
  return pickT(tpls, pk.key+ST.difficulty);
}

function buildP3(pk) {
  const s6=ST.s6, s7=ST.s7;
  const rs=e(s6.result)||'＿＿', fl=e(s6.feeling)||'＿＿', re=e(s6.reason)||'＿＿';
  // FIX: use plain ECHO_TPLS token [ECHO], replace THEN escape result
  const echoRaw  = (s7.echoTpl || ECHO_TPLS).replace('[ECHO]', s7.echoContent || '＿＿');
  const echoSent = e(echoRaw);   // escape the whole assembled sentence
  const idea     = e(s7.idea) || '＿＿';
  const tpls = [
    `最後，${rs}。我感到很${fl}，因為${re}。${echoSent}${idea}`,
    `事情結束後，${rs}。我覺得很${fl}，因為${re}。${echoSent}${idea}`,
    `到了最後，${rs}。我心裏感到很${fl}，因為${re}。${echoSent}${idea}`
  ];
  return pickT(tpls, pk.key+'end');
}

// ─── CHECKLIST ──────────────────────────────────────────────────────────────
function renderChecklist() {
  const paras = buildParas();
  const count = wc(stripH(paras.join('')));
  const goal  = wordGoal();
  const items = [
    {t:'我有選擇題目。',                  d:!!ST.category},
    {t:'我有交代時間、地點、人物。',       d:!!(ST.s2.time&&ST.s2.place&&ST.s2.people)},
    {t:'我有按次序寫事情經過。',           d:!!(ST.s3.action1&&ST.s4.action2&&ST.s4.action3)},
    {t:'我有使用過渡詞。',                d:!!(ST.s3.transition&&ST.s4.transition)},
    {t:'我有寫最難忘的一刻。',            d:!!(ST.s5.climax&&ST.s5.thought)},
    {t:'我有寫結果和感受。',              d:!!(ST.s6.result&&ST.s6.feeling&&ST.s6.reason)},
    {t:'我有做到首尾呼應。',              d:!!(ST.s7.echoTpl&&ST.s7.echoContent)},
    {t:'我有寫出立意。',                  d:!!ST.s7.idea},
    {t:`我的文章已有一定字數。（目標：約 ${goal} 字）`, d:count>=goal}
  ];
  document.getElementById('checklist').innerHTML = items.map(item=>`
    <li class="ci${item.d?' dn':''}">
      <span class="ci-ico">${item.d?'✓':'○'}</span>
      <span>${item.t}</span>
    </li>`).join('');
}

// ─── TOP STATUS ─────────────────────────────────────────────────────────────
function updateTop() {
  const done =.filter(isComplete).length; [telerik](https://www.telerik.com/blogs/save-for-later-feature-in-forms-using-localstorage)
  document.getElementById('progFill').style.width = Math.round(done/7*100)+'%';
  document.getElementById('stageLabel').textContent = '第 '+ST.currentStage+' 關 / 共 7 關';
  document.getElementById('saveStatus').textContent = ST.savedAt ? '已自動儲存 '+ST.savedAt : '草稿未儲存';
}

// ─── VALIDATE ───────────────────────────────────────────────────────────────
function isComplete(n) { return validate(n, false); }

function validate(n, msg) {
  const m = {
    1: !ST.category ? '請先選擇一個題型。' : '',
    2: (!(ST.s2.time&&ST.s2.place&&ST.s2.people&&ST.s2.activity&&ST.s2.mood)) ? '請完成時間、地點、人物、活動和心情。' : '',
    3: (!(ST.s3.transition&&ST.s3.action1&&ST.s3.extra)) ? '請選起首過渡詞、第一個大動作，並輸入補充短語。' : '',
    4: (!(ST.s4.transition&&ST.s4.action2&&ST.s4.action3&&ST.s4.detail)) ? '請完成過渡詞、動作和細節。' : '',
    5: (!(ST.s5.climax&&ST.s5.feeling&&ST.s5.thought)) ? '請完成最難忘的一刻、感受詞和內心想法。' : '',
    6: (!(ST.s6.result&&ST.s6.feeling&&ST.s6.reason)) ? '請完成結果、感受和原因。' : '',
    7: (!(ST.s7.echoTpl&&ST.s7.idea&&ST.s7.echoContent)) ? '第 7 關必須完成首尾呼應和立意內容。' : ''
  }[n] || '';
  if (m && msg) showToast(m);
  return !m;
}

// ─── RESET ──────────────────────────────────────────────────────────────────
function resetStage() {
  if (!confirm('要重設第 '+ST.currentStage+' 關的內容嗎？')) return;
  const d = defState();
  ({
    1:()=>{ ST.category=''; },
    2:()=>{ ST.s2={...d.s2}; },
    3:()=>{ ST.s3={...d.s3}; },
    4:()=>{ ST.s4={...d.s4}; },
    5:()=>{ ST.s5={...d.s5}; },
    6:()=>{ ST.s6={...d.s6}; },
    7:()=>{ ST.s7={...d.s7}; }
  })[ST.currentStage]();
  renderAll(); saveSt(); showToast('第 '+ST.currentStage+' 關已重設。');
}

function resetAll() {
  if (!confirm('要重設全文嗎？所有關卡內容都會清除。')) return;
  ST = defState();
  applyTheme(ST.theme);
  syncTgl('themeSwitch','data-theme',ST.theme);
  syncTgl('modeSwitch','data-mode',ST.difficulty);
  renderAll(); localStorage.removeItem(SK); saveSt(true);
  showToast('全文已重設。');
}

// ─── COPY ───────────────────────────────────────────────────────────────────
async function copyEssay() {
  const paras = buildParas();
  if (!paras.length) { showToast('請先完成一些內容，才可以複製全文。'); return; }
  const txt = document.getElementById('essayTitle').textContent + '\n\n' + paras.map(stripH).join('\n\n');
  try { await navigator.clipboard.writeText(txt); showToast('作文全文已複製。'); }
  catch(_) {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('作文全文已複製。'); }
    catch(_2) { showToast('未能複製，請手動選取文字。'); }
    ta.remove();
  }
}

// ─── STORAGE ────────────────────────────────────────────────────────────────
function saveSt(reset=false) {
  ST.savedAt = fmtTime(new Date());
  localStorage.setItem(SK, JSON.stringify(ST));
  updateTop();
}

function loadSt() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return defState();
    const p = JSON.parse(raw);
    const d = defState();
    return {
      ...d, ...p,
      s2:{...d.s2,...(p.s2||{})},
      s3:{...d.s3,...(p.s3||{})},
      s4:{...d.s4,...(p.s4||{})},
      s5:{...d.s5,...(p.s5||{})},
      s6:{...d.s6,...(p.s6||{})},
      s7:{...d.s7,...(p.s7||{})}
    };
  } catch(_) { return defState(); }
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getPack()  { return PACKS[ST.category] || null; }
function getP(path) { return path.split('.').reduce((o,k)=>o!=null?o[k]:undefined, ST); }
function setP(path, val) {
  const keys=path.split('.'); let o=ST;
  for(let i=0;i<keys.length-1;i++) o=o[keys[i]];
  o[keys[keys.length-1]]=val;
}
function pickT(arr, seed) { return arr[Math.abs(hash(seed)) % arr.length]; }
function hash(s)   { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h; }
function stripH(s) { const d=document.createElement('div'); d.innerHTML=s; return d.textContent||''; }
function wc(s)     { return (s||'').replace(/\s+/g,'').length; }
function anyVal(o) { return Object.values(o).some(v=>String(v||'').trim()!==''); }
// e() = escapeHtml for display in innerHTML
function e(s)  { return eH(String(s||'').trim()); }
function eH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// eA() = escape for HTML attribute
function eA(s) { return eH(String(s||'')); }
// h() = wrap in highlight span (accepts already-escaped string)
function h(w)  { return '<span class="hl">'+w+'</span>'; }

function applyTheme(t) {
  document.body.classList.remove('theme-sky','theme-forest','theme-sunset');
  document.body.classList.add('theme-'+t);
}
function syncTgl(id, attr, val) {
  document.getElementById(id).querySelectorAll('['+attr+']').forEach(b=>{
    b.classList.toggle('on', b.getAttribute(attr)===val);
  });
}
function wordGoal() { return {basic:60,standard:80,challenge:100}[ST.difficulty]||60; }
function fmtTime(d) { return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove('show'), 2700);
}

// Placeholder & help text functions
function phActivity() { return {basic:'例如：野餐',standard:'輸入活動名稱，1 至 4 字',challenge:'輸入事情名稱，盡量準確'}[ST.difficulty]; }
function phExtra()    { return {basic:'例如：準備野餐',standard:'例如：找位置坐下',challenge:'請寫較完整短語，例如：準備開始活動'}[ST.difficulty]; }
function phDetail()   { return {basic:'例如：很多人歡笑',standard:'例如：藍藍的天空',challenge:'請寫 3 至 8 字細節，例如：同學大聲為我打氣'}[ST.difficulty]; }
function phThought()  { return {basic:'例如：我要加油',standard:'例如：原來我做得到',challenge:'請輸入完整短句，例如：只要再試一次，我一定做得到'}[ST.difficulty]; }
function phReason()   { return {basic:'例如：大家都很照顧我',standard:'例如：我學會了合作',challenge:'請寫清楚原因，例如：我終於克服了原本害怕的事情'}[ST.difficulty]; }
function phEcho()     { return {basic:'例如：很開心',standard:'例如：這天很難忘',challenge:'請輸入完整短句，例如：那份溫暖一直留在我心中'}[ST.difficulty]; }
function helpThought(){ return ST.difficulty==='challenge' ? '挑戰版：請盡量輸入完整短句。' : '可按提示帶入，也可自己輸入。'; }
function helpEcho()   { return ST.difficulty==='challenge' ? '挑戰版：這裏建議輸入完整短句，讓結尾更完整。' : '可先寫心情或回想，也可按提示字詞。'; }
