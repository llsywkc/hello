
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中文記敍文互動闖關遊戲</title>
  <style>
    :root{
      --bg:#f5f7ff;--card:#ffffff;--card-soft:#f8fbff;--text:#2f3552;--sub:#66708f;
      --line:#dbe3ff;--primary:#6b8cff;--primary-2:#89a5ff;--accent:#ffb86b;
      --good:#31b77a;--warn:#ff8b78;--shadow:0 12px 30px rgba(65,88,160,.12);
      --paper-line:#d9e4ff;--highlight:#fff1a8;
    }
    body.theme-forest{
      --bg:#f4fbf7;--card:#ffffff;--card-soft:#f6fffa;--text:#29443a;--sub:#5f7c72;
      --line:#d7efe3;--primary:#4db27e;--primary-2:#7fd0a9;--accent:#f4b860;
      --good:#24956a;--warn:#ef8b7b;--shadow:0 12px 30px rgba(44,105,76,.12);
      --paper-line:#dcefe6;--highlight:#fff1a8;
    }
    body.theme-sunset{
      --bg:#fff8f4;--card:#ffffff;--card-soft:#fffaf7;--text:#5b3c36;--sub:#8a655c;
      --line:#f0ddd7;--primary:#ef8e72;--primary-2:#f5ac95;--accent:#6f9dfc;
      --good:#47a86d;--warn:#ff7d6d;--shadow:0 12px 30px rgba(145,84,66,.12);
      --paper-line:#f1e1da;--highlight:#fff1a8;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;
      background:radial-gradient(circle at top right,rgba(255,255,255,.85),transparent 28%),
        linear-gradient(180deg,#ffffff 0%,var(--bg) 100%);
      color:var(--text);min-height:100vh;
    }
    .app{max-width:1380px;margin:0 auto;padding:18px 18px 90px}
    .topbar{
      background:var(--card);border:1px solid var(--line);border-radius:24px;
      box-shadow:var(--shadow);padding:18px;margin-bottom:16px;
      position:sticky;top:8px;z-index:30;
    }
    .title-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .title-wrap h1{margin:0 0 6px;font-size:clamp(1.45rem,2vw,2rem);letter-spacing:.03em}
    .school-name{color:var(--sub);font-size:.98rem;margin-bottom:10px}
    .subtitle{display:flex;flex-wrap:wrap;gap:10px;color:var(--sub);font-size:.95rem}
    .pill{background:var(--card-soft);border:1px solid var(--line);border-radius:999px;padding:6px 10px}
    .toolbar{display:flex;flex-direction:column;gap:10px;align-items:flex-end;min-width:320px;flex:1}
    .switch-group{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .switch-group .group-label{width:100%;text-align:right;color:var(--sub);font-size:.9rem;margin-bottom:-2px}
    button,input{font-family:inherit}
    .btn{
      border:none;background:var(--primary);color:#fff;border-radius:14px;padding:10px 14px;
      cursor:pointer;transition:.2s transform,.2s opacity,.2s background,.2s box-shadow;
      box-shadow:0 10px 18px rgba(89,114,205,.15);font-size:.96rem;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{background:var(--card-soft);color:var(--text);border:1px solid var(--line);box-shadow:none}
    .btn.ghost{background:transparent;color:var(--primary);border:1px dashed var(--primary);box-shadow:none}
    .btn.warn{background:var(--warn)}
    .btn.good{background:var(--good)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .toggle-btn{
      padding:9px 12px;border-radius:999px;border:1px solid var(--line);
      background:var(--card-soft);color:var(--text);cursor:pointer;transition:.2s;font-size:.92rem;
    }
    .toggle-btn.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;border-color:transparent;box-shadow:0 10px 20px rgba(90,110,190,.18);
    }
    .progress-wrap{margin-top:16px}
    .progress-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;font-size:.95rem;color:var(--sub)}
    .progress-bar{height:16px;border-radius:999px;background:var(--card-soft);border:1px solid var(--line);overflow:hidden;position:relative}
    .progress-fill{
      height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--accent));
      border-radius:999px;transition:width .35s ease;position:relative;
    }
    .progress-fill::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
      animation:shine 2.8s linear infinite;
    }
    @keyframes shine{from{transform:translateX(-120%)}to{transform:translateX(120%)}}
    .stage-nav{margin-top:16px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .stage-tab{
      border:1px solid var(--line);background:var(--card-soft);color:var(--sub);
      border-radius:16px;padding:10px 8px;cursor:pointer;text-align:center;transition:.2s;
      min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    }
    .stage-tab strong{color:inherit;font-size:1rem}
    .stage-tab.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;border-color:transparent;box-shadow:0 12px 22px rgba(89,114,205,.18);transform:translateY(-1px);
    }
    .stage-tab.done{
      border-color:rgba(49,183,122,.35);
      background:linear-gradient(180deg,rgba(49,183,122,.14),rgba(49,183,122,.06));color:var(--good);
    }
    .stage-tab.active.done{color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2))}
    .stage-mini{font-size:.78rem}
    .main{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(340px,.95fr);gap:16px;align-items:start}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
    .panel-head{
      padding:18px 18px 8px;border-bottom:1px solid rgba(0,0,0,.03);
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;
    }
    .panel-head h2{margin:0;font-size:1.2rem}
    .panel-sub{color:var(--sub);font-size:.95rem;margin-top:6px;line-height:1.5}
    .panel-body{padding:18px}
    .target-box{
      background:linear-gradient(180deg,var(--card-soft),transparent);
      border:1px dashed var(--line);border-radius:18px;padding:14px 14px 12px;margin-bottom:14px;
    }
    .target-box h3{margin:0 0 8px;font-size:1rem}
    .target-box p{margin:0;color:var(--sub);line-height:1.65;font-size:.95rem}
    .frame-box{background:#fffefb;border:1px solid #f0e8d0;border-radius:18px;padding:12px 14px;margin-bottom:16px}
    .frame-title{font-size:.92rem;color:#8a7243;margin-bottom:8px}
    .frame-line{line-height:1.8;font-size:1rem;color:#6f5c34}
    .field-group{margin-bottom:16px}
    .field-label{display:block;font-weight:700;margin-bottom:8px;font-size:1rem}
    .field-help{font-size:.88rem;color:var(--sub);margin-top:6px;line-height:1.5}
    .choices{display:flex;flex-wrap:wrap;gap:8px}
    .choice-btn{
      border:1px solid var(--line);background:var(--card-soft);color:var(--text);
      border-radius:999px;padding:10px 12px;cursor:pointer;font-size:.95rem;transition:.2s;
    }
    .choice-btn:hover{transform:translateY(-1px);border-color:var(--primary)}
    .choice-btn.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(89,114,205,.18);
    }
    .input-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .text-input{
      width:100%;min-height:48px;border:1px solid var(--line);border-radius:16px;
      background:#fff;padding:12px 14px;font-size:1rem;color:var(--text);outline:none;transition:.2s;
    }
    .text-input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(106,140,255,.12)}
    .hint-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .hint-chip{
      border:none;background:#eef3ff;color:#4760b8;border-radius:999px;
      padding:8px 10px;cursor:pointer;font-size:.88rem;transition:.18s;
    }
    .hint-chip:hover{transform:translateY(-1px)}
    body.theme-forest .hint-chip{background:#eaf8f1;color:#34795b}
    body.theme-sunset .hint-chip{background:#fff0ea;color:#b0644d}
    .split-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .action-bar{
      display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;
      align-items:center;margin-top:22px;padding-top:16px;border-top:1px dashed var(--line);
    }
    .stage-btns{display:flex;gap:10px;flex-wrap:wrap}
    .status-text{color:var(--sub);font-size:.92rem}
    .paper{
      background:
        linear-gradient(transparent 31px,var(--paper-line) 32px),
        linear-gradient(90deg,rgba(255,153,153,.38) 0,rgba(255,153,153,.38) 1px,transparent 1px);
      background-size:100% 32px,42px 100%;
      background-position:0 0,26px 0;
      background-color:#fffefc;
      border-radius:22px;border:1px solid #efe9dc;min-height:680px;
      padding:24px 26px 28px 54px;position:relative;overflow:hidden;
    }
    .paper::before{
      content:"";position:absolute;top:0;left:36px;width:2px;height:100%;
      background:rgba(255,153,153,.45);
    }
    .essay-title{text-align:center;font-size:1.45rem;margin:6px 0 16px;letter-spacing:.06em}
    .essay-meta{text-align:center;color:var(--sub);font-size:.92rem;margin-bottom:14px}
    .placeholder{color:#98a1bf;line-height:2;padding-top:16px;font-size:1.02rem}
    .essay-paragraph{text-indent:2em;line-height:2;margin:0 0 14px;font-size:1.04rem;word-break:break-word}
    .hl-transition{background:var(--highlight);border-radius:6px;padding:0 4px}
    .preview-tools{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;flex-wrap:wrap;margin-bottom:12px;
    }
    .counter{display:flex;gap:10px;flex-wrap:wrap}
    .counter .pill{background:#fff}
    .checklist{margin-top:16px;background:var(--card-soft);border:1px solid var(--line);border-radius:20px;padding:14px}
    .checklist h3{margin:0 0 10px;font-size:1rem}
    .checklist ul{list-style:none;margin:0;padding:0;display:grid;gap:10px}
    .check-item{display:flex;gap:10px;align-items:flex-start;color:var(--sub);line-height:1.5;font-size:.95rem;transition:.2s}
    .check-icon{
      width:24px;height:24px;flex:0 0 24px;border-radius:50%;display:grid;place-items:center;
      background:#fff;border:1px solid var(--line);color:#a0a8c2;font-weight:700;margin-top:1px;
    }
    .check-item.done{color:var(--text)}
    .check-item.done .check-icon{background:rgba(49,183,122,.14);color:var(--good);border-color:rgba(49,183,122,.28)}
    .helper-box{position:fixed;right:18px;bottom:18px;z-index:40;display:flex;align-items:flex-end;gap:10px;max-width:min(92vw,350px)}
    .helper-bubble{
      background:#fff;border:1px solid var(--line);border-radius:20px 20px 6px 20px;
      box-shadow:var(--shadow);padding:12px 14px;line-height:1.6;color:var(--text);
      min-width:200px;opacity:0;transform:translateY(10px);pointer-events:none;transition:.25s;
    }
    .helper-bubble.show{opacity:1;transform:translateY(0);pointer-events:auto}
    .helper-btn{
      width:74px;height:74px;border:none;border-radius:50%;cursor:pointer;
      box-shadow:0 16px 28px rgba(80,98,170,.18);
      background:radial-gradient(circle at 30% 30%,#fff,#fff8d8 22%,#ffe27a 48%,#ffcf49 70%,#f4bb1f 100%);
      color:#7a5600;display:grid;place-items:center;font-size:2rem;
      animation:floaty 2.6s ease-in-out infinite;
    }
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(16px);
      opacity:0;pointer-events:none;background:rgba(48,57,93,.94);color:#fff;
      border-radius:14px;padding:11px 14px;z-index:100;transition:.25s;
      max-width:min(92vw,560px);text-align:center;line-height:1.5;
      box-shadow:0 18px 26px rgba(0,0,0,.18);font-size:.95rem;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .mini-note{color:var(--sub);font-size:.9rem;line-height:1.5;margin-top:8px}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:.9rem;color:var(--sub)}
    .legend span{background:var(--card-soft);border:1px solid var(--line);border-radius:999px;padding:6px 10px}
    .alert-box{
      background:linear-gradient(135deg,#fff7f5,#fff);border:1px solid #ffd4c8;
      border-radius:18px;padding:18px;text-align:center;color:#b04030;
    }
    .alert-box p{margin:0 0 14px;font-size:1rem;line-height:1.65}
    @media(max-width:1100px){.main{grid-template-columns:1fr}.paper{min-height:540px}}
    @media(max-width:820px){
      .stage-nav{grid-template-columns:repeat(4,1fr)}
      .split-2{grid-template-columns:1fr}
      .toolbar{align-items:flex-start;min-width:auto}
      .switch-group{justify-content:flex-start}
      .switch-group .group-label{text-align:left}
      .paper{padding:22px 18px 24px 44px}
      .helper-box{right:12px;bottom:12px}
      .helper-btn{width:66px;height:66px}
    }
    @media(max-width:520px){
      .app{padding:12px 12px 90px}
      .topbar,.panel{border-radius:18px}
      .panel-head,.panel-body{padding:14px}
      .stage-nav{grid-template-columns:repeat(2,1fr)}
      .paper{border-radius:18px;padding:20px 14px 20px 38px}
      .paper::before{left:26px}
      .essay-title{font-size:1.25rem}
      .stage-tab{min-height:58px}
      .choice-btn,.toggle-btn,.btn{font-size:.92rem}
    }
    @media print{
      body{background:#fff}
      .no-print,.helper-box,.toast{display:none !important}
      .app{max-width:none;padding:0}
      .topbar,.left-panel,.preview-tools,.checklist{display:none !important}
      .main{display:block}
      .right-panel{border:none;box-shadow:none}
      .panel{border:none;box-shadow:none}
      .panel-head{display:none}
      .panel-body{padding:0}
      .paper{border:none;box-shadow:none;min-height:auto;padding:18px 24px 24px 44px}
      .essay-title{margin-top:0}
    }
  </style>
</head>
<body class="theme-sky">
<div class="app">
  <header class="topbar no-print">
    <div class="title-row">
      <div class="title-wrap">
        <h1>中文記敍文互動闖關遊戲</h1>
        <div class="school-name">勵志會梁李秀娛紀念小學</div>
        <div class="subtitle">
          <span class="pill">三段式記敍文</span>
          <span class="pill">7 關完成作文</span>
          <span class="pill">高支援句框</span>
          <span class="pill">即時作文預覽</span>
        </div>
      </div>
      <div class="toolbar">
        <div class="switch-group" id="themeSwitch">
          <div class="group-label">主題色切換</div>
          <button class="toggle-btn active" data-theme="sky" type="button">天空藍</button>
          <button class="toggle-btn" data-theme="forest" type="button">森林綠</button>
          <button class="toggle-btn" data-theme="sunset" type="button">暖日橙</button>
        </div>
        <div class="switch-group" id="modeSwitch">
          <div class="group-label">難度模式</div>
          <button class="toggle-btn active" data-mode="basic" type="button">基礎版</button>
          <button class="toggle-btn" data-mode="standard" type="button">標準版</button>
          <button class="toggle-btn" data-mode="challenge" type="button">挑戰版</button>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-head">
        <div id="stageLabel">第 1 關 / 共 7 關</div>
        <div id="saveStatus">草稿未儲存</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="stage-nav" id="stageNav"></div>
  </header>

  <main class="main">
    <section class="panel left-panel no-print">
      <div class="panel-head">
        <div>
          <h2 id="leftTitle">第 1 關：選題型</h2>
          <div class="panel-sub" id="leftSub">先選一個寫作方向，系統會按題型提供不同提示。</div>
        </div>
        <div class="pill" id="goalPill">學習重點：段落過渡詞、首尾呼應、尾段立意</div>
      </div>
      <div class="panel-body" id="stageContent"></div>
    </section>

    <section class="panel right-panel">
      <div class="panel-head">
        <div>
          <h2>作文預覽區</h2>
          <div class="panel-sub">你的作文會在這裏一步一步完成。</div>
        </div>
        <div class="counter">
          <span class="pill" id="selectedTopicTag">題目：未選擇</span>
          <span class="pill" id="wordCountTag">字數：0</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="preview-tools no-print">
          <div class="stage-btns">
            <button class="btn secondary" id="resetStageBtn" type="button">重設單關</button>
            <button class="btn warn" id="resetAllBtn" type="button">重設全文</button>
          </div>
          <div class="stage-btns">
            <button class="btn secondary" id="copyBtn" type="button">複製全文</button>
            <button class="btn good" id="printBtn" type="button">列印作文</button>
          </div>
        </div>
        <article class="paper" id="paper">
          <div class="essay-title" id="essayTitle">未選擇題目</div>
          <div class="essay-meta" id="essayMeta">模式：基礎版</div>
          <div id="essayContent">
            <div class="placeholder">你的作文會在這裏一步一步完成。先到左邊開始闖關吧！</div>
          </div>
        </article>
        <section class="checklist no-print">
          <h3>完成檢查清單</h3>
          <ul id="checklist"></ul>
        </section>
      </div>
    </section>
  </main>
</div>

<div class="helper-box no-print">
  <div class="helper-bubble" id="helperBubble">先想清楚事情發生的先後次序！</div>
  <button class="helper-btn" id="helperBtn" type="button" aria-label="小精靈提示">✨</button>
</div>
<div class="toast" id="toast"></div>

function renderStage(){
  const info=stageInfo[state.currentStage-1];
  leftTitle.textContent=`第 ${state.currentStage} 關：${info.title}`;
  leftSub.textContent=info.sub;
  goalPill.textContent=getGoalText(state.currentStage);

  // Guard: stages 2-7 require a category to be selected first
  if(state.currentStage>1 && !state.category){
    stageContent.innerHTML=`
      <div class="alert-box">
        <p>請先完成<strong>第 1 關</strong>，選擇一個寫作題型，系統才可以顯示相關提示。</p>

      </div>`;
    document.getElementById('goStage1Btn').addEventListener('click',()=>{
      state.currentStage=1;renderAll();saveState();
    });
    return;
  }

  if(state.currentStage===1)return renderStage1();
  if(state.currentStage===2)return renderStage2();
  if(state.currentStage===3)return renderStage3();
  if(state.currentStage===4)return renderStage4();
  if(state.currentStage===5)return renderStage5();
  if(state.currentStage===6)return renderStage6();
  if(state.currentStage===7)return renderStage7();
}

    <div class="status-text">可自由返回前面修改，資料不會消失。</div>

}

function renderChoiceGroup(label,path,options,help=''){
  const cur=getByPath(path);
  return `<div class="field-group">
    <label class="field-label">${label}</label>
    <div class="choices">
      ${options.map(item=>`
        <button class="choice-btn${cur===item?' active':''}" type="button" data-path="${escAttr(path)}" data-value="${escAttr(item)}">${item}</button>
      `).join('')}
    </div>
    ${help?`<div class="field-help">${help}</div>`:''}
  </div>`;
}

function renderTextField(label,path,placeholder,hints,help=''){
  const val=getByPath(path)||'';
  return `<div class="field-group">
    <label class="field-label">${label}</label>
    <div class="input-row">
      <input class="text-input js-input" type="text" data-path="${escAttr(path)}" value="${escAttr(val)}" placeholder="${escAttr(placeholder)}" />
    </div>
    <div class="hint-chips">
      ${hints.slice(0,6).map(h=>`<button class="hint-chip" type="button" data-insert-path="${escAttr(path)}" data-insert-value="${escAttr(h)}">${h}</button>`).join('')}
    </div>
    ${help?`<div class="field-help">${help}</div>`:''}
  </div>`;
}

function bindChoiceButtons(){
  [...stageContent.querySelectorAll('.choice-btn[data-path][data-value]')].forEach(btn=>{
    btn.addEventListener('click',()=>{
      setByPath(btn.dataset.path,btn.dataset.value);
      if(btn.dataset.path==='category'){
        // Reset pack-dependent fields when category changes
        const newPack=dataPacks[btn.dataset.value];
        if(newPack){
          if(!newPack.scenes.includes(state.stage2.place))state.stage2.place='';
          if(!newPack.people.includes(state.stage2.people))state.stage2.people='';
          if(!newPack.actions.includes(state.stage3.action1))state.stage3.action1='';
          if(!newPack.actions.includes(state.stage4.action2))state.stage4.action2='';
          if(!newPack.actions.includes(state.stage4.action3))state.stage4.action3='';
          if(!newPack.climaxes.includes(state.stage5.climax))state.stage5.climax='';
          if(!newPack.results.includes(state.stage6.result))state.stage6.result='';
          if(!newPack.meanings.includes(state.stage7.idea))state.stage7.idea='';
        }
      }
      renderAll();saveState();
    });
  });
}

function bindTextFields(){
  [...stageContent.querySelectorAll('.js-input')].forEach(input=>{
    input.addEventListener('input',()=>{
      setByPath(input.dataset.path,input.value);
      renderPreview();renderChecklist();updateTopStatus();saveState();
    });
  });
}

function bindHintButtons(){
  [...stageContent.querySelectorAll('[data-insert-path]')].forEach(btn=>{
    btn.addEventListener('click',()=>{
      setByPath(btn.dataset.insertPath,btn.dataset.insertValue);
      renderAll();saveState();
    });
  });
}

function bindNavButtons(){
  const prevBtn=document.getElementById('prevStageBtn');
  const nextBtn=document.getElementById('nextStageBtn');
  if(prevBtn&&!prevBtn.disabled){
    prevBtn.addEventListener('click',()=>{
      if(state.currentStage>1){state.currentStage-=1;renderAll();saveState();}
    });
  }
  if(nextBtn){
    nextBtn.addEventListener('click',()=>{
      const ok=validateStage(state.currentStage,true);
      if(!ok)return;
      if(state.currentStage<7){state.currentStage+=1;renderAll();saveState();}
      else{showToast('🎉 太好了！你已完成全部 7 關，作文完成！');renderAll();saveState();}
    });
  }
}

function renderPreview(){
  const pack=getPack();
  essayTitle.textContent=pack?pack.topic:'未選擇題目';
  essayMeta.textContent=`模式：${difficultyText[state.difficulty]}　｜　類別：${pack?pack.short:'未選擇'}`;
  selectedTopicTag.textContent=`題目：${pack?pack.topic:'未選擇'}`;
  const paragraphs=buildEssayParagraphs();
  if(paragraphs.length===0){
    essayContent.innerHTML=`<div class="placeholder">你的作文會在這裏一步一步完成。先到左邊開始闖關吧！</div>`;
  }else{
    essayContent.innerHTML=paragraphs.map(p=>`<p class="essay-paragraph">${p}</p>`).join('');
  }
  wordCountTag.textContent=`字數：${countWords(stripHtml(paragraphs.join('')))}`;
}

function buildEssayParagraphs(){
  const pack=getPack();
  if(!pack)return[];
  const parts=[];
  if(hasAny(state.stage2))parts.push(buildP1(pack));
  if(hasAny(state.stage3)||hasAny(state.stage4)||hasAny(state.stage5))parts.push(buildP2(pack));
  if(hasAny(state.stage6)||hasAny(state.stage7))parts.push(buildP3(pack));
  return parts.filter(Boolean);
}

function buildP1(pack){
  const s=state.stage2;
  const t=esc(s.time)||'＿＿',pe=esc(s.people)||'＿＿',pl=esc(s.place)||'＿＿',
        ac=esc(s.activity)||'＿＿',mo=esc(s.mood)||'＿＿';
  const tpls=[
    `上星期${t}，我和${pe}到${pl}，準備${ac}。那天，我感到很${mo}。`,
    `上星期${t}，我跟${pe}一起去了${pl}，想去${ac}。開始的時候，我的心情很${mo}。`,
    `上星期${t}，我和${pe}來到${pl}，打算${ac}。那一天，我覺得十分${mo}。`
  ];
  return pickTpl(tpls,pack.key);
}

function buildP2(pack){
  const s3=state.stage3,s4=state.stage4,s5=state.stage5;
  const t1=hl(esc(s3.transition)||'首先'),t2=hl(esc(s4.transition)||'接着'),
        t3=hl('然後'),t4=hl('最後');
  const a1=esc(s3.action1)||'＿＿',ex=esc(s3.extra)||'＿＿',
        a2=esc(s4.action2)||'＿＿',a3=esc(s4.action3)||'＿＿',
        dt=esc(s4.detail)||'＿＿',cl=esc(s5.climax)||'＿＿',
        fl=esc(s5.feeling)||'＿＿',th=esc(s5.thought)||'＿＿';
  const sentA=state.difficulty==='basic'
    ?`${t1}，我們${a1}，然後${ex}。`
    :`${t1}，我先${a1}，準備${ex}。`;
  const tpls=[
    `${sentA}${t2}，我${a2}。${t3}，我看見${dt}。${t4}，我們${a3}。最令我難忘的是${cl}。當時，我感到十分${fl}。我心想：「${th}。」`,
    `${sentA}${t2}，我們繼續${a2}。${t3}，我看見${dt}。${t4}，大家一起${a3}。其中，最令我難忘的是${cl}。那一刻，我感到十分${fl}，心裏想：「${th}。」`,
    `${sentA}${t2}，我接着${a2}。${t3}，耳邊傳來${dt}。${t4}，我們便${a3}。最深刻的一刻是${cl}。當時，我十分${fl}，我心想：「${th}。」`
  ];
  return pickTpl(tpls,pack.key+state.difficulty);
}

function buildP3(pack){
  const s6=state.stage6,s7=state.stage7;
  const rs=esc(s6.result)||'＿＿',fl=esc(s6.feeling)||'＿＿',re=esc(s6.reason)||'＿＿';
  const ecTpl=s7.echoTemplate||echoTemplates;
  const ec=esc(s7.echoContent)||'＿＿';
  const echoSentence=escHtml(ecTpl).replace('{content}',ec);
  const idea=esc(s7.idea)||'＿＿';
  const tpls=[
    `最後，${rs}。我感到很${fl}，因為${re}。${echoSentence}${idea}`,
    `事情結束後，${rs}。我覺得很${fl}，因為${re}。${echoSentence}${idea}`,
    `到了最後，${rs}。我心裏感到很${fl}，因為${re}。${echoSentence}${idea}`
  ];
  return pickTpl(tpls,pack.key+'end');
}

function renderChecklist(){
  const pars=buildEssayParagraphs();
  const count=countWords(stripHtml(pars.join('')));
  const goal=getWordGoal();
  const items=[
    {text:'我有選擇題目。',done:!!state.category},
    {text:'我有交代時間、地點、人物。',done:!!(state.stage2.time&&state.stage2.place&&state.stage2.people)},
    {text:'我有按次序寫事情經過。',done:!!(state.stage3.action1&&state.stage4.action2&&state.stage4.action3)},
    {text:'我有使用過渡詞。',done:!!(state.stage3.transition&&state.stage4.transition)},
    {text:'我有寫最難忘的一刻。',done:!!(state.stage5.climax&&state.stage5.thought)},
    {text:'我有寫結果和感受。',done:!!(state.stage6.result&&state.stage6.feeling&&state.stage6.reason)},
    {text:'我有做到首尾呼應。',done:!!(state.stage7.echoTemplate&&state.stage7.echoContent)},
    {text:'我有寫出立意。',done:!!state.stage7.idea},
    {text:`我的文章已有一定字數。（目標：約 ${goal} 字）`,done:count>=goal}
  ];
  checklist.innerHTML=items.map(item=>`
    <li class="check-item${item.done?' done':''}">
      <span class="check-icon">${item.done?'✓':'○'}</span>
      <span>${item.text}</span>
    </li>`).join('');
}

function updateTopStatus(){
  const done=.filter(isStageComplete).length; [telerik](https://www.telerik.com/blogs/save-for-later-feature-in-forms-using-localstorage)
  progressFill.style.width=Math.round(done/7*100)+'%';
  stageLabel.textContent=`第 ${state.currentStage} 關 / 共 7 關`;
  saveStatus.textContent=state.savedAt?`已自動儲存 ${state.savedAt}`:'草稿未儲存';
}

function isStageComplete(no){return validateStage(no,false)}

function validateStage(no,msg){
  let m='';
  if(no===1&&!state.category)m='請先選擇一個題型。';
  if(no===2){const s=state.stage2;if(!s.time||!s.place||!s.people||!s.activity||!s.mood)m='請完成時間、地點、人物、活動和心情。';}
  if(no===3){const s=state.stage3;if(!s.transition||!s.action1||!s.extra)m='請選起首過渡詞、第一個大動作，並輸入補充短語。';}
  if(no===4){const s=state.stage4;if(!s.transition||!s.action2||!s.action3||!s.detail)m='請完成過渡詞、第二個動作、第三個動作和細節。';}
  if(no===5){const s=state.stage5;if(!s.climax||!s.feeling||!s.thought)m='請完成最難忘的一刻、感受詞和內心想法。';}
  if(no===6){const s=state.stage6;if(!s.result||!s.feeling||!s.reason)m='請完成結果、感受和原因。';}
  if(no===7){const s=state.stage7;if(!s.echoTemplate||!s.idea||!s.echoContent)m='第 7 關必須完成首尾呼應和立意內容。';}
  if(m&&msg)showToast(m);
  return !m;
}

function getGoalText(s){
  return({1:'學習重點：先定題型',2:'學習重點：時間、地點、人物、起因',3:'學習重點：事情開始的次序',4:'學習重點：過渡詞（高亮顯示）',5:'學習重點：高潮與感受',6:'學習重點：結果與感受',7:'學習重點：首尾呼應、尾段立意'})[s];
}

function getPack(){return dataPacks[state.category]||null}

function getByPath(path){
  return path.split('.').reduce((o,k)=>o!=null?o[k]:undefined,state);
}
function setByPath(path,value){
  const keys=path.split('.');let o=state;
  for(let i=0;i<keys.length-1;i++)o=o[keys[i]];
  o[keys[keys.length-1]]=value;
}

function pickTpl(arr,seed){return arr[Math.abs(hashCode(seed))%arr.length]}
function hashCode(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||''}
function countWords(t){return(t||'').replace(/\s+/g,'').length}
function hasAny(obj){return Object.values(obj).some(v=>String(v||'').trim()!=='')}
function esc(t){return escHtml(String(t||'').trim())}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escAttr(s){return escHtml(s)}
function hl(w){return`<span class="hl-transition">${w}</span>`}
function applyTheme(t){document.body.classList.remove('theme-sky','theme-forest','theme-sunset');document.body.classList.add(`theme-${t}`)}
function syncThemeButtons(){document.querySelectorAll('[data-theme]').forEach(b=>b.classList.toggle('active',b.dataset.theme===state.theme))}
function syncModeButtons(){document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.difficulty))}
function getWordGoal(){return{basic:60,standard:80,challenge:100}[state.difficulty]||60}
function getActivityPlaceholder(){return{basic:'例如：野餐',standard:'輸入活動名稱，1 至 4 字',challenge:'輸入事情名稱，盡量準確'}[state.difficulty]}
function getExtraPlaceholder(){return{basic:'例如：準備野餐',standard:'例如：找位置坐下',challenge:'請寫較完整短語，例如：準備開始活動'}[state.difficulty]}
function getDetailPlaceholder(){return{basic:'例如：很多人歡笑',standard:'例如：藍藍的天空',challenge:'請寫 3 至 8 字細節，例如：同學大聲為我打氣'}[state.difficulty]}
function getThoughtPlaceholder(){return{basic:'例如：我要加油',standard:'例如：原來我做得到',challenge:'請輸入完整短句，例如：只要再試一次，我一定做得到'}[state.difficulty]}
function getThoughtHelp(){return state.difficulty==='challenge'?'挑戰版：請盡量輸入完整短句。':'可按提示帶入，也可自己輸入。'}
function getReasonPlaceholder(){return{basic:'例如：大家都很照顧我',standard:'例如：我學會了合作',challenge:'請寫清楚原因，例如：我終於克服了原本害怕的事情'}[state.difficulty]}
function getEchoPlaceholder(){return{basic:'例如：很開心',standard:'例如：這天很難忘',challenge:'請輸入完整短句，例如：那份溫暖一直留在我心中'}[state.difficulty]}
function getEchoHelp(){return state.difficulty==='challenge'?'挑戰版：這裏建議輸入完整短句，讓結尾更完整。':'可先寫心情或回想，也可按提示字詞。'}

function resetCurrentStage(){
  if(!confirm(`要重設第 ${state.currentStage} 關的內容嗎？`))return;
  const def=defaultState();
  const map={1:()=>{state.category=''},2:()=>{state.stage2={...def.stage2}},3:()=>{state.stage3={...def.stage3}},4:()=>{state.stage4={...def.stage4}},5:()=>{state.stage5={...def.stage5}},6:()=>{state.stage6={...def.stage6}},7:()=>{state.stage7={...def.stage7}}};
  map[state.currentStage]&&map[state.currentStage]();
  renderAll();saveState();showToast(`第 ${state.currentStage} 關已重設。`);
}

function resetAll(){
  if(!confirm('要重設全文嗎？所有關卡內容都會清除。'))return;
  state=defaultState();
  applyTheme(state.theme);syncModeButtons();syncThemeButtons();
  renderAll();localStorage.removeItem(STORAGE_KEY);saveState(true);
  showToast('全文已重設。');
}

async function copyEssay(){
  const pars=buildEssayParagraphs();
  if(pars.length===0){showToast('請先完成一些內容，才可以複製全文。');return;}
  const text=`${essayTitle.textContent}\n\n${pars.map(stripHtml).join('\n\n')}`;
  try{await navigator.clipboard.writeText(text);showToast('作文全文已複製。');}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();try{document.execCommand('copy');showToast('作文全文已複製。');}
    catch(e2){showToast('未能複製，請手動選取文字。');}ta.remove();
  }
}

function showToast(message){
  toast.textContent=message;toast.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>toast.classList.remove('show'),2600);
}

function saveState(resetTime=false){
  if(resetTime){state.savedAt=formatTime(new Date());}
  else{state.savedAt=formatTime(new Date());}
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  updateTopStatus();
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return defaultState();
    const p=JSON.parse(raw);
    const d=defaultState();
    return{...d,...p,stage2:{...d.stage2,...(p.stage2||{})},stage3:{...d.stage3,...(p.stage3||{})},stage4:{...d.stage4,...(p.stage4||{})},stage5:{...d.stage5,...(p.stage5||{})},stage6:{...d.stage6,...(p.stage6||{})},stage7:{...d.stage7,...(p.stage7||{})}};
  }catch(e){return defaultState();}
}

function formatTime(d){return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
</script>
