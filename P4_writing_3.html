<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🖊️ 4A寫作練習：記敍文</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
/* ─── Reset & Base ─── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f0f4ff;color:#1e2340;min-height:100vh;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(147,114,255,.12) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(99,179,255,.12) 0%, transparent 50%);
}
button,input{font-family:inherit}

/* ─── Layout ─── */
.app{max-width:1400px;margin:0 auto;padding:16px 16px 100px}

/* ─── Top Hero Bar ─── */
.hero{
  background:linear-gradient(135deg,#6c63ff 0%,#4facfe 100%);
  border-radius:28px;padding:22px 28px;margin-bottom:16px;
  color:#fff;position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(108,99,255,.35);
}
.hero::before{
  content:"";position:absolute;top:-40px;right:-40px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.hero::after{
  content:"";position:absolute;bottom:-60px;right:80px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.hero-title{position:relative;z-index:1}
.hero-title h1{font-size:clamp(1.5rem,2.5vw,2.1rem);font-weight:900;letter-spacing:.04em;margin-bottom:6px}
.hero-school{font-size:.9rem;opacity:.85;margin-bottom:10px}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px}
.htag{
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);
  border-radius:999px;padding:5px 12px;font-size:.82rem;backdrop-filter:blur(4px);
}

/* ─── Theme + Mode Switchers ─── */
.switches{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
.sw-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sw-lbl{font-size:.78rem;opacity:.8;white-space:nowrap;margin-right:2px}
.sw-btn{
  padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:.82rem;
  transition:.2s;backdrop-filter:blur(4px);
}
.sw-btn:hover{background:rgba(255,255,255,.28)}
.sw-btn.on{background:rgba(255,255,255,.9);color:#5b4de8;font-weight:700;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.15)}

/* ─── Progress ─── */
.prog-wrap{margin-top:18px;position:relative;z-index:1}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.88rem;opacity:.9}
.prog-track{
  height:14px;border-radius:999px;background:rgba(255,255,255,.2);
  overflow:hidden;border:1px solid rgba(255,255,255,.25);
}
.prog-fill{
  height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,#ffe55a,#ff9a3c);
  transition:width .4s cubic-bezier(.4,0,.2,1);position:relative;
}
.prog-fill::after{
  content:"";position:absolute;inset:0;border-radius:999px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.5) 50%,transparent 100%);
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ─── Stage Nav Pills ─── */
.stage-nav{
  display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;position:relative;z-index:1;
}
.sn-pill{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 14px;border-radius:16px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);
  color:rgba(255,255,255,.85);font-size:.82rem;transition:.2s;min-width:72px;
  backdrop-filter:blur(4px);
}
.sn-pill strong{font-size:.88rem}
.sn-pill:hover{background:rgba(255,255,255,.28)}
.sn-pill.act{
  background:#fff;color:#5b4de8;border-color:transparent;
  box-shadow:0 6px 20px rgba(0,0,0,.2);transform:translateY(-2px);font-weight:700;
}
.sn-pill.dn{background:rgba(100,255,170,.25);border-color:rgba(100,255,170,.5);color:#e0fff0}
.sn-pill.act.dn{background:#fff;color:#1a8f5a}

/* ─── Main 2-col layout ─── */
.main{display:grid;grid-template-columns:1fr 440px;gap:16px;align-items:start}

/* ─── Card ─── */
.card{
  background:#fff;border-radius:24px;
  box-shadow:0 8px 32px rgba(30,35,64,.08);overflow:hidden;
}
.card-head{
  padding:20px 22px 14px;
  border-bottom:2px solid #f0f2ff;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;
}
.card-head h2{font-size:1.15rem;font-weight:800;color:#2d2060}
.card-sub{font-size:.88rem;color:#7a82b0;margin-top:5px;line-height:1.5}
.card-body{padding:22px}

/* ─── Stage badge ─── */
.stage-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#6c63ff,#4facfe);
  color:#fff;border-radius:999px;padding:5px 14px;font-size:.82rem;font-weight:700;
}

/* ─── Goal pill ─── */
.goal-pill{
  background:#eff0ff;color:#5b4de8;border-radius:999px;
  padding:5px 12px;font-size:.8rem;font-weight:600;
}

/* ─── Target box ─── */
.tgt-box{
  background:linear-gradient(135deg,#f8f9ff,#eef2ff);
  border:1.5px solid #dde3ff;border-radius:18px;
  padding:16px;margin-bottom:18px;
}
.tgt-box h3{font-size:.95rem;font-weight:700;color:#4a4480;margin-bottom:7px}
.tgt-box p{font-size:.88rem;color:#6870a8;line-height:1.65}

/* ─── Sentence frame ─── */
.frame-box{
  background:linear-gradient(135deg,#fffbee,#fff8dd);
  border:1.5px solid #f0d98a;border-radius:18px;
  padding:14px 16px;margin-bottom:18px;
}
.frame-ttl{
  display:flex;align-items:center;gap:6px;font-size:.82rem;
  font-weight:700;color:#9a7800;margin-bottom:10px;
}
.frame-ttl::before{content:"📋";font-size:.9rem}
.frame-ln{
  font-size:.95rem;color:#7a6200;line-height:1.9;
  border-bottom:1px dashed rgba(154,120,0,.2);padding-bottom:4px;margin-bottom:4px;
}
.frame-ln:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}

/* ─── Field group ─── */
.fg{margin-bottom:18px}
.flbl{
  display:flex;align-items:center;gap:7px;
  font-weight:700;margin-bottom:10px;font-size:.95rem;color:#2d2060;
}
.flbl-num{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,#6c63ff,#4facfe);
  color:#fff;display:inline-flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:900;flex-shrink:0;
}
.fhelp{font-size:.82rem;color:#9098c0;margin-top:8px;line-height:1.5;padding-left:2px}

/* ─── Choice buttons ─── */
.choices{display:flex;flex-wrap:wrap;gap:8px}
.c-btn{
  border:1.5px solid #dde3ff;background:#f8f9ff;color:#4a4a6e;
  border-radius:14px;padding:9px 14px;cursor:pointer;font-size:.88rem;
  transition:.18s;font-weight:500;
}
.c-btn:hover{border-color:#6c63ff;background:#f0eeff;color:#5b4de8;transform:translateY(-1px)}
.c-btn.on{
  background:linear-gradient(135deg,#6c63ff,#4facfe);color:#fff;
  border-color:transparent;box-shadow:0 6px 18px rgba(108,99,255,.3);
  transform:translateY(-1px);font-weight:700;
}

/* ─── Text input ─── */
.t-in{
  width:100%;min-height:50px;border:1.5px solid #dde3ff;border-radius:16px;
  background:#f8f9ff;padding:13px 16px;font-size:.95rem;color:#2d2060;
  outline:none;transition:.2s;
}
.t-in:focus{
  border-color:#6c63ff;background:#fff;
  box-shadow:0 0 0 4px rgba(108,99,255,.1);
}
.t-in::placeholder{color:#b0b8d8}

/* ─── Hint chips ─── */
.h-chips-wrap{margin-top:10px}
.h-chips-lbl{font-size:.78rem;color:#9098c0;margin-bottom:6px}
.h-chips{display:flex;flex-wrap:wrap;gap:6px}
.h-chip{
  border:1px solid #d8ddff;background:#eef0ff;color:#5b5aaa;
  border-radius:999px;padding:6px 12px;cursor:pointer;font-size:.82rem;
  transition:.15s;
}
.h-chip:hover{background:#6c63ff;color:#fff;border-color:transparent;transform:translateY(-1px)}

/* ─── 2-col grid ─── */
.sp2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ─── Action bar ─── */
.act-bar{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;
  align-items:center;margin-top:24px;padding-top:18px;
  border-top:2px dashed #e8ebff;
}
.act-hint{font-size:.82rem;color:#9098c0;display:flex;align-items:center;gap:5px}
.act-hint::before{content:"💡";font-size:.88rem}
.nav-btns{display:flex;gap:10px}

/* ─── Buttons ─── */
.btn{
  border:none;border-radius:14px;padding:11px 18px;cursor:pointer;
  font-size:.9rem;font-weight:700;transition:.18s;
}
.btn-primary{
  background:linear-gradient(135deg,#6c63ff,#4facfe);color:#fff;
  box-shadow:0 8px 20px rgba(108,99,255,.3);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(108,99,255,.4)}
.btn-sec{background:#f0f2ff;color:#5b4de8;border:1.5px solid #dde3ff}
.btn-sec:hover{background:#e8ebff}
.btn-warn{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;box-shadow:0 6px 16px rgba(255,107,107,.3)}
.btn-good{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a5c3a;box-shadow:0 6px 16px rgba(67,233,123,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── Tool row ─── */
.tool-row{
  display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;
  gap:10px;margin-bottom:14px;
}
.tool-grp{display:flex;gap:8px;flex-wrap:wrap}
.tool-btn{
  border:1.5px solid #dde3ff;background:#fff;color:#5b5aaa;
  border-radius:12px;padding:8px 14px;cursor:pointer;font-size:.82rem;
  font-weight:600;transition:.15s;
}
.tool-btn:hover{background:#f0eeff;border-color:#6c63ff;color:#5b4de8}
.tool-btn.danger{border-color:#ffd0d0;color:#e05050}
.tool-btn.danger:hover{background:#fff0f0;border-color:#ff8080}
.tool-btn.success{border-color:#c3f0da;color:#1a7a50}
.tool-btn.success:hover{background:#e8fff2}

/* ─── Paper (essay preview) ─── */
.paper-wrap{
  background:linear-gradient(180deg,#fffdf5 0%,#fffef9 100%);
  border-radius:20px;border:1.5px solid #ede8d0;
  min-height:620px;position:relative;overflow:hidden;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.04);
}
.paper-lines{
  position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    180deg,
    transparent 0px,
    transparent 31px,
    rgba(180,200,255,.35) 32px
  );
}
.paper-margin{
  position:absolute;top:0;left:52px;bottom:0;width:2px;
  background:rgba(255,150,150,.4);pointer-events:none;
}
.paper-inner{padding:28px 24px 32px 66px;position:relative;z-index:1}
.e-title{text-align:center;font-size:1.4rem;font-weight:900;margin:0 0 6px;letter-spacing:.08em;color:#2d2060}
.e-meta{text-align:center;color:#9098c0;font-size:.82rem;margin-bottom:18px}
.placeholder{color:#b8bede;line-height:2.2;font-size:.95rem;text-align:center;padding-top:30px}
.placeholder .ph-emoji{font-size:3rem;display:block;margin-bottom:12px}
.e-para{text-indent:2em;line-height:2.2;margin:0 0 16px;font-size:.98rem;word-break:break-word;color:#2a2f50}
.hl{
  background:linear-gradient(135deg,#fff176,#ffee58);
  border-radius:6px;padding:1px 5px;color:#5a4200;font-weight:700;
}

/* ─── Stats row ─── */
.stats-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.stat-pill{
  background:#f0f2ff;border:1.5px solid #dde3ff;border-radius:999px;
  padding:6px 14px;font-size:.82rem;color:#5b4de8;font-weight:600;
}
.stat-pill.green{background:#eafff4;border-color:#b8f0d4;color:#1a7a50}

/* ─── Checklist ─── */
.chklist{
  margin-top:16px;background:#f8f9ff;
  border:1.5px solid #e8ebff;border-radius:20px;padding:16px;
}
.chklist-ttl{
  font-size:.9rem;font-weight:800;color:#4a4480;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.chklist-ttl::before{content:"✅";font-size:.9rem}
.chklist ul{list-style:none;display:grid;gap:8px}
.ci{
  display:flex;gap:10px;align-items:center;
  padding:9px 12px;border-radius:12px;background:#fff;
  border:1.5px solid #e8ebff;transition:.2s;font-size:.88rem;color:#7a82b0;
}
.ci.dn{color:#1a7a50;border-color:#c3f0da;background:#eafff4}
.ci-ico{
  width:24px;height:24px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;font-size:.8rem;
  background:#e8ebff;color:#9098c0;font-weight:900;
}
.ci.dn .ci-ico{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff}

/* ─── Alert box ─── */
.alert-bx{
  background:linear-gradient(135deg,#fff0f0,#fff8ff);
  border:1.5px solid #ffd0d0;border-radius:18px;
  padding:24px;text-align:center;
}
.alert-bx .alert-emoji{font-size:2.5rem;display:block;margin-bottom:10px}
.alert-bx p{font-size:.95rem;color:#c05050;line-height:1.65;margin-bottom:16px}

/* ─── Mini note ─── */
.mini-note{
  background:#fffbee;border:1px solid #f0d98a;border-radius:12px;
  padding:10px 14px;font-size:.82rem;color:#8a6f00;
  margin-top:10px;line-height:1.5;
}
.mini-note::before{content:"💡 "}

/* ─── Legend ─── */
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.leg-item{
  background:#f8f9ff;border:1px solid #dde3ff;
  border-radius:999px;padding:6px 12px;font-size:.82rem;color:#6870a8;
}

/* ─── Helper sprite ─── */
.hlp-box{
  position:fixed;right:20px;bottom:20px;z-index:50;
  display:flex;align-items:flex-end;gap:10px;
  max-width:min(90vw,360px);
}
.hlp-bbl{
  background:#fff;border:1.5px solid #dde3ff;border-radius:20px 20px 4px 20px;
  box-shadow:0 12px 40px rgba(30,35,64,.15);
  padding:14px 16px;line-height:1.65;color:#2d2060;
  min-width:200px;opacity:0;transform:translateY(12px);
  pointer-events:none;transition:.25s;font-size:.9rem;
}
.hlp-bbl.show{opacity:1;transform:translateY(0);pointer-events:auto}
.hlp-btn{
  width:76px;height:76px;border:none;border-radius:50%;cursor:pointer;
  background:linear-gradient(135deg,#ffe55a,#ffb347);
  box-shadow:0 12px 32px rgba(255,180,50,.4);
  font-size:2.2rem;display:grid;place-items:center;
  animation:bob 3s ease-in-out infinite;
  transition:.2s;
}
.hlp-btn:hover{transform:scale(1.08)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* ─── Toast ─── */
.toast{
  position:fixed;left:50%;bottom:24px;
  transform:translateX(-50%) translateY(20px);
  opacity:0;pointer-events:none;
  background:rgba(30,35,64,.95);color:#fff;
  border-radius:16px;padding:12px 20px;z-index:100;
  transition:.25s cubic-bezier(.4,0,.2,1);
  max-width:min(90vw,580px);text-align:center;
  line-height:1.5;font-size:.9rem;
  box-shadow:0 20px 40px rgba(0,0,0,.2);
  backdrop-filter:blur(8px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Responsive ─── */
@media(max-width:1100px){
  .main{grid-template-columns:1fr}
  .paper-wrap{min-height:480px}
}
@media(max-width:780px){
  .stage-nav{gap:6px}
  .sn-pill{min-width:60px;padding:7px 10px}
  .sp2{grid-template-columns:1fr}
  .main{gap:12px}
  .card-body{padding:16px}
}
@media(max-width:520px){
  .app{padding:10px 10px 90px}
  .hero{padding:16px 18px;border-radius:22px}
  .hero-title h1{font-size:1.3rem}
  .sn-pill{min-width:48px;font-size:.75rem;padding:6px 8px}
  .paper-inner{padding:22px 14px 26px 48px}
  .paper-margin{left:38px}
}

/* ─── Print ─── */
@media print{
  body{background:#fff}
  .no-print,.hlp-box,.toast{display:none !important}
  .app{max-width:none;padding:0}
  .hero,.left-col,.tool-row,.chklist{display:none !important}
  .main{display:block}
  .card{border:none;box-shadow:none}
  .card-head{display:none}
  .card-body{padding:0}
  .paper-wrap{border:none;box-shadow:none;min-height:auto}
  .paper-lines,.paper-margin{display:none}
  .paper-inner{padding:10px 16px 20px 20px}
  .e-title{margin-top:0}
}

/* ─── Theme variants ─── */
body.theme-green{
  background:#f0fff8;
  background-image:radial-gradient(circle at 10% 20%,rgba(67,233,123,.1) 0%,transparent 50%),
    radial-gradient(circle at 90% 80%,rgba(56,249,215,.1) 0%,transparent 50%);
}
body.theme-green .hero{background:linear-gradient(135deg,#1fa86a,#38f9d7)}
body.theme-green .sw-btn.on{color:#1fa86a}
body.theme-green .sn-pill.act{color:#1fa86a}
body.theme-green .stage-badge{background:linear-gradient(135deg,#1fa86a,#38f9d7)}
body.theme-green .c-btn.on{background:linear-gradient(135deg,#1fa86a,#38f9d7)}
body.theme-green .prog-fill{background:linear-gradient(90deg,#43e97b,#38f9d7)}
body.theme-green .btn-primary{background:linear-gradient(135deg,#1fa86a,#38f9d7);box-shadow:0 8px 20px rgba(31,168,106,.3)}
body.theme-green .card-head{border-color:#d8fff0}
body.theme-green .card-head h2{color:#0d4a2e}
body.theme-green .goal-pill{background:#e0fff2;color:#1a7a50}
body.theme-green .tgt-box{background:linear-gradient(135deg,#f0fff8,#e0fff2);border-color:#b8f0d4}
body.theme-green .flbl{color:#0d4a2e}

body.theme-orange{
  background:#fff8f0;
  background-image:radial-gradient(circle at 10% 20%,rgba(255,154,58,.12) 0%,transparent 50%),
    radial-gradient(circle at 90% 80%,rgba(255,200,100,.1) 0%,transparent 50%);
}
body.theme-orange .hero{background:linear-gradient(135deg,#ff6b35,#f9c74f)}
body.theme-orange .sw-btn.on{color:#e05a00}
body.theme-orange .sn-pill.act{color:#e05a00}
body.theme-orange .stage-badge{background:linear-gradient(135deg,#ff6b35,#f9c74f)}
body.theme-orange .c-btn.on{background:linear-gradient(135deg,#ff6b35,#f9c74f)}
body.theme-orange .prog-fill{background:linear-gradient(90deg,#ff6b35,#f9c74f)}
body.theme-orange .btn-primary{background:linear-gradient(135deg,#ff6b35,#f9c74f);color:#fff;box-shadow:0 8px 20px rgba(255,107,53,.3)}
body.theme-orange .card-head{border-color:#ffe8d6}
body.theme-orange .card-head h2{color:#7a2e00}
body.theme-orange .goal-pill{background:#fff0e8;color:#c04a00}
body.theme-orange .tgt-box{background:linear-gradient(135deg,#fff8f0,#fff0e0);border-color:#ffd0a0}
body.theme-orange .flbl{color:#7a2e00}
</style>
</head>
<body class="theme-blue">

<div class="app">

  <!-- ── HERO TOPBAR ── -->
  <header class="hero no-print">
    <div class="hero-top">
      <div class="hero-title">
        <h1>🖊️ 中文記敍文互動闖關遊戲</h1>
        <div class="hero-school">勵志會梁李秀娛紀念小學</div>
        <div class="hero-tags">
          <span class="htag">📖 三段式記敍文</span>
          <span class="htag">🏆 7 關完成作文</span>
          <span class="htag">🛟 高支援句框</span>
          <span class="htag">👁️ 即時作文預覽</span>
        </div>
      </div>
      <div class="switches">
        <div class="sw-row">

function renderS6(){ const pk = getPack(); const box = document.getElementById('stageContent'); box.innerHTML = ` <div class="tgt"> <h3>這一關要做甚麼？</h3> <p>把事情收束，交代結果，再寫你的感受和原因。</p> </div> <div class="frame"> <div class="frame-ttl">句框提示</div> <div class="frame-ln">最後，＿＿。</div> <div class="frame-ln">我感到很＿＿，因為＿＿。</div> </div> ${choiceGroup('結果','s6.result',pk.results,'事情最後怎樣了？')} ${choiceGroup('感受','s6.feeling',FEEL6,'選出結尾心情。')} ${textField('因為＿＿','s6.reason',phReason(),pk.reasonHints,'3 至 10 字即可。')} ${actionBar()} `; bindStage(); }
function renderS7(){ const pk = getPack(); const box = document.getElementById('stageContent'); box.innerHTML = ` <div class="tgt"> <h3>這一關要做甚麼？</h3> <p>這一關最重要：要做到首尾呼應，並寫出你明白到甚麼。這一關未完成，不可過關。</p> </div> <div class="frame"> <div class="frame-ttl">句框提示</div> <div class="frame-ln">現在回想起來，我仍然覺得＿＿。</div> <div class="frame-ln">經過這件事，我明白到＿＿。</div> <div class="frame-ln">這次經歷讓我學會了＿＿。</div> </div> ${echoChoiceGroup()} ${choiceGroup('立意句選項','s7.idea',pk.meanings,'選一句最合適的立意句。')} ${textField('最後關鍵內容','s7.echoContent',phEcho(),pk.echoHints,helpEcho())} <div class="mini-note">小提示：開頭寫了甚麼心情或場景，結尾可以再回想一次，這就是「首尾呼應」。</div> ${actionBar(true)} `; bindStage(); }
function actionBar(last=false){ const prevDis = ST.currentStage===1 ? 'disabled' : ''; const nextTxt = (ST.currentStage===7 || last) ? '完成本關 ✓' : '下一關 →'; return ` <div class="act-bar"> <span class="s-txt">可自由返回前面修改，資料不會消失。</span> <div class="s-btns"> <button class="btn btn-sec" type="button" id="prevBtn" ${prevDis}>← 上一關</button> <button class="btn btn-primary" type="button" id="nextBtn">${nextTxt}</button> </div> </div> `; }
function choiceGroup(label,path,opts,help=''){ const cur = getByPath(path); return ` <div class="fg"> <label class="flbl">${label}</label> <div class="choices"> ${opts.map(o=>` <button class="c-btn ${cur===o?'on':''}" type="button" data-path="${escAttr(path)}" data-val="${escAttr(o)}">${escHtml(o)}</button> `).join('')} </div> ${help ? <div class="fhelp">${help}</div> : ''} </div> `; }
function echoChoiceGroup(){ const cur = ST.s7.echoTpl; return ` <div class="fg"> <label class="flbl">呼應句型</label> <div class="choices"> ${ECHO_TPLS.map((tpl,i)=>` <button class="c-btn ${cur===tpl?'on':''}" type="button" data-path="s7.echoTpl" data-val="${escAttr(tpl)}">${escHtml(ECHO_LABELS[i])}</button> `).join('')} </div> <div class="fhelp">選一個和開頭呼應的句型。</div> </div> `; }
function textField(label,path,ph,hints,help=''){ const val = getByPath(path) || ''; return ` <div class="fg"> <label class="flbl">${label}</label> <input class="t-in j-in" type="text" data-path="${escAttr(path)}" value="${escAttr(val)}" placeholder="${escAttr(ph)}" /> <div class="h-chips"> ${hints.slice(0,6).map(h=>` <button class="h-chip" type="button" data-ipath="${escAttr(path)}" data-ival="${escAttr(h)}">${escHtml(h)}</button> `).join('')} </div> ${help ? <div class="fhelp">${help}</div> : ''} </div> `; }
function bindStage(){ const box = document.getElementById('stageContent');
box.querySelectorAll('.c-btn[data-path][data-val]').forEach(btn=>{ btn.addEventListener('click', ()=>{ setByPath(btn.dataset.path, btn.dataset.val);
if(btn.dataset.path === 'category'){ const pk = PACKS[btn.dataset.val]; if(pk){ if(!pk.scenes.includes(ST.s2.place)) ST.s2.place = ''; if(!pk.people.includes(ST.s2.people)) ST.s2.people = ''; if(!pk.actions.includes(ST.s3.action1)) ST.s3.action1 = ''; if(!pk.actions.includes(ST.s4.action2)) ST.s4.action2 = ''; if(!pk.actions.includes(ST.s4.action3)) ST.s4.action3 = ''; if(!pk.climaxes.includes(ST.s5.climax)) ST.s5.climax = ''; if(!pk.results.includes(ST.s6.result)) ST.s6.result = ''; if(!pk.meanings.includes(ST.s7.idea)) ST.s7.idea = ''; } }
renderAll(); saveState(); }); });
box.querySelectorAll('.j-in').forEach(inp=>{ inp.addEventListener('input', ()=>{ setByPath(inp.dataset.path, inp.value); renderPreview(); renderChecklist(); updateTop(); saveState(); }); });
box.querySelectorAll('.h-chip[data-ipath]').forEach(btn=>{ btn.addEventListener('click', ()=>{ setByPath(btn.dataset.ipath, btn.dataset.ival); renderAll(); saveState(); }); });
const prevBtn = document.getElementById('prevBtn'); const nextBtn = document.getElementById('nextBtn');
if(prevBtn){ prevBtn.addEventListener('click', ()=>{ if(ST.currentStage > 1){ ST.currentStage--; renderAll(); saveState(); } }); }
if(nextBtn){ nextBtn.addEventListener('click', ()=>{ if(!validate(ST.currentStage,true)) return; if(ST.currentStage < 7){ ST.currentStage++; renderAll(); saveState(); }else{ showToast('🎉 恭喜你！7 關全部完成，作文大功告成！'); renderAll(); saveState(); } }); } }
function renderPreview(){ const pk = getPack(); document.getElementById('essayTitle').textContent = pk ? pk.topic : '未選擇題目'; document.getElementById('essayMeta').textContent = '模式：' + DIFF_TXT[ST.difficulty] + '　｜　類別：' + (pk ? pk.short : '未選擇'); document.getElementById('topicTag').textContent = '題目：' + (pk ? pk.topic : '未選擇');
const paras = buildParas(); const ec = document.getElementById('essayContent');
if(!paras.length){ ec.innerHTML = '<div class="placeholder">你的作文會在這裏一步一步完成。先到左邊開始闖關吧！</div>'; }else{ ec.innerHTML = paras.map(p=>'<p class="e-para">'+p+'</p>').join(''); }
document.getElementById('wcTag').textContent = '字數：' + wordCount(stripHtml(paras.join(''))); }
function buildParas(){ const pk = getPack(); if(!pk) return []; const out = []; if(hasAny(ST.s2)) out.push(buildP1(pk)); if(hasAny(ST.s3) || hasAny(ST.s4) || hasAny(ST.s5)) out.push(buildP2(pk)); if(hasAny(ST.s6) || hasAny(ST.s7)) out.push(buildP3(pk)); return out.filter(Boolean); }
function buildP1(pk){ const s = ST.s2; const t = esc(s.time), pe = esc(s.people), pl = esc(s.place), ac = esc(s.activity), mo = esc(s.mood); const tpls = [ 上星期${t||'＿＿'}，我和${pe||'＿＿'}到${pl||'＿＿'}，準備${ac||'＿＿'}。那天，我感到很${mo||'＿＿'}。, 上星期${t||'＿＿'}，我跟${pe||'＿＿'}一起去了${pl||'＿＿'}，想去${ac||'＿＿'}。開始的時候，我的心情很${mo||'＿＿'}。, 上星期${t||'＿＿'}，我和${pe||'＿＿'}來到${pl||'＿＿'}，打算${ac||'＿＿'}。那一天，我覺得十分${mo||'＿＿'}。 ]; return pickTemplate(tpls, pk.key); }
function buildP2(pk){ const s3 = ST.s3, s4 = ST.s4, s5 = ST.s5; const t1 = highlight(esc(s3.transition||'首先')); const t2 = highlight(esc(s4.transition||'接着')); const t3 = highlight('然後'); const t4 = highlight('最後'); const a1 = esc(s3.action1)||'＿＿'; const ex = esc(s3.extra)||'＿＿'; const a2 = esc(s4.action2)||'＿＿'; const a3 = esc(s4.action3)||'＿＿'; const dt = esc(s4.detail)||'＿＿'; const cl = esc(s5.climax)||'＿＿'; const fl = esc(s5.feeling)||'＿＿'; const th = esc(s5.thought)||'＿＿';
const sentA = ST.difficulty==='basic' ? ${t1}，我們${a1}，然後${ex}。 : ${t1}，我先${a1}，準備${ex}。;
const tpls = [ ${sentA}${t2}，我${a2}。${t3}，我看見${dt}。${t4}，我們${a3}。最令我難忘的是${cl}。當時，我感到十分${fl}。我心想：「${th}。」, ${sentA}${t2}，我們繼續${a2}。${t3}，我看見${dt}。${t4}，大家一起${a3}。其中，最令我難忘的是${cl}。那一刻，我感到十分${fl}，心裏想：「${th}。」, ${sentA}${t2}，我接着${a2}。${t3}，耳邊傳來${dt}。${t4}，我們便${a3}。最深刻的一刻是${cl}。當時，我十分${fl}，我心想：「${th}。」 ]; return pickTemplate(tpls, pk.key + ST.difficulty); }
function buildP3(pk){ const s6 = ST.s6, s7 = ST.s7; const rs = esc(s6.result)||'＿＿'; const fl = esc(s6.feeling)||'＿＿'; const re = esc(s6.reason)||'＿＿'; const echoRaw = (s7.echoTpl || ECHO_TPLS[0]).replace('[ECHO]', s7.echoContent || '＿＿'); const echoSent = esc(echoRaw); const idea = esc(s7.idea)||'＿＿';
const tpls = [ 最後，${rs}。我感到很${fl}，因為${re}。${echoSent}${idea}, 事情結束後，${rs}。我覺得很${fl}，因為${re}。${echoSent}${idea}, 到了最後，${rs}。我心裏感到很${fl}，因為${re}。${echoSent}${idea} ]; return pickTemplate(tpls, pk.key + 'end'); }
function renderChecklist(){ const paras = buildParas(); const count = wordCount(stripHtml(paras.join(''))); const goal = wordGoal(); const items = [ {t:'我有選擇題目。', d:!!ST.category}, {t:'我有交代時間、地點、人物。', d:!!(ST.s2.time&&ST.s2.place&&ST.s2.people)}, {t:'我有按次序寫事情經過。', d:!!(ST.s3.action1&&ST.s4.action2&&ST.s4.action3)}, {t:'我有使用過渡詞。', d:!!(ST.s3.transition&&ST.s4.transition)}, {t:'我有寫最難忘的一刻。', d:!!(ST.s5.climax&&ST.s5.thought)}, {t:'我有寫結果和感受。', d:!!(ST.s6.result&&ST.s6.feeling&&ST.s6.reason)}, {t:'我有做到首尾呼應。', d:!!(ST.s7.echoTpl&&ST.s7.echoContent)}, {t:'我有寫出立意。', d:!!ST.s7.idea}, {t:我的文章已有一定字數。（目標：約 ${goal} 字）, d:count>=goal} ]; document.getElementById('checklist').innerHTML = items.map(item=>` <li class="ci ${item.d?'dn':''}"> <span class="ci-ico">${item.d?'✓':'○'}</span> <span>${item.t}</span> </li> `).join(''); }
function updateTop(){ const done =.filter(isComplete).length;tutorialspoint+6 document.getElementById('progFill').style.width = Math.round(done / 7 * 100) + '%'; document.getElementById('stageLabel').textContent = 第 ${ST.currentStage} 關 / 共 7 關; document.getElementById('saveStatus').textContent = ST.savedAt ? 已自動儲存 ${ST.savedAt} : '草稿未儲存'; }
function isComplete(n){ return validate(n,false); }
function validate(n, showMsg){ const msg = { 1: !ST.category ? '請先選擇一個題型。' : '', 2: (!(ST.s2.time&&ST.s2.place&&ST.s2.people&&ST.s2.activity&&ST.s2.mood)) ? '請完成時間、地點、人物、活動和心情。' : '', 3: (!(ST.s3.transition&&ST.s3.action1&&ST.s3.extra)) ? '請選起首過渡詞、第一個大動作，並輸入補充短語。' : '', 4: (!(ST.s4.transition&&ST.s4.action2&&ST.s4.action3&&ST.s4.detail)) ? '請完成過渡詞、動作和細節。' : '', 5: (!(ST.s5.climax&&ST.s5.feeling&&ST.s5.thought)) ? '請完成最難忘的一刻、感受詞和內心想法。' : '', 6: (!(ST.s6.result&&ST.s6.feeling&&ST.s6.reason)) ? '請完成結果、感受和原因。' : '', 7: (!(ST.s7.echoTpl&&ST.s7.idea&&ST.s7.echoContent)) ? '第 7 關必須完成首尾呼應和立意內容。' : '' }[n] || '';
if(msg && showMsg) showToast(msg); return !msg; }
function resetStage(){ if(!confirm(要重設第 ${ST.currentStage} 關的內容嗎？)) return; const d = defState(); const map = { 1:()=>{ ST.category=''; }, 2:()=>{ ST.s2={...d.s2}; }, 3:()=>{ ST.s3={...d.s3}; }, 4:()=>{ ST.s4={...d.s4}; }, 5:()=>{ ST.s5={...d.s5}; }, 6:()=>{ ST.s6={...d.s6}; }, 7:()=>{ ST.s7={...d.s7}; } }; mapST.currentStage; renderAll(); saveState(); showToast(第 ${ST.currentStage} 關已重設。); }
function resetAll(){ if(!confirm('要重設全文嗎？所有關卡內容都會清除。')) return; ST = defState(); applyTheme(ST.theme); syncToggle('themeSwitch','data-theme',ST.theme); syncToggle('modeSwitch','data-mode',ST.difficulty); renderAll(); localStorage.removeItem(STORAGE_KEY); saveState(); showToast('全文已重設。'); }
async function copyEssay(){ const paras = buildParas(); if(!paras.length){ showToast('請先完成一些內容，才可以複製全文。'); return; } const text = document.getElementById('essayTitle').textContent + '\n\n' + paras.map(stripHtml).join('\n\n'); try{ await navigator.clipboard.writeText(text); showToast('作文全文已複製。'); }catch(e){ const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); showToast('作文全文已複製。'); }catch(err){ showToast('未能複製，請手動選取文字。'); } ta.remove(); } }
function saveState(){ ST.savedAt = formatTime(new Date()); localStorage.setItem(STORAGE_KEY, JSON.stringify(ST)); updateTop(); }
function loadState(){ try{ const raw = localStorage.getItem(STORAGE_KEY); if(!raw) return defState(); const p = JSON.parse(raw); const d = defState(); return { ...d,...p, s2:{...d.s2,...(p.s2||{})}, s3:{...d.s3,...(p.s3||{})}, s4:{...d.s4,...(p.s4||{})}, s5:{...d.s5,...(p.s5||{})}, s6:{...d.s6,...(p.s6||{})}, s7:{...d.s7,...(p.s7||{})} }; }catch(e){ return defState(); } }
function getPack(){ return PACKS[ST.category] || null; }
function getByPath(path){ return path.split('.').reduce((obj,key)=>obj!=null?obj[key]:undefined, ST); }
function setByPath(path, value){ const keys = path.split('.'); let obj = ST; for(let i=0;i<keys.length-1;i++) obj = obj[keys[i]]; obj[keys[keys.length-1]] = value; }
function pickTemplate(arr, seed){ return arr[Math.abs(hashCode(seed)) % arr.length]; }
function hashCode(str){ let h = 0; for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; } return h; }
function hasAny(obj){ return Object.values(obj).some(v => String(v||'').trim() !== ''); }
function stripHtml(html){ const div = document.createElement('div'); div.innerHTML = html; return div.textContent || ''; }
function wordCount(text){ return (text || '').replace(/\s+/g,'').length; }
function esc(str){ return escHtml(String(str || '').trim()); }
function escHtml(str){ return String(str) .replace(/&/g,'&amp;') .replace(/</g,'&lt;') .replace(/>/g,'&gt;') .replace(/"/g,'&quot;') .replace(/'/g,'&#39;'); }
function escAttr(str){ return escHtml(String(str || '')); }
function highlight(str){ return <span class="hl">${str}</span>; }
function applyTheme(theme){ document.body.classList.remove('theme-sky','theme-forest','theme-sunset'); document.body.classList.add('theme-' + theme); }
function syncToggle(id, attr, val){ document.getElementById(id).querySelectorAll('['+attr+']').forEach(btn=>{ btn.classList.toggle('on', btn.getAttribute(attr) === val); }); }
function wordGoal(){ return {basic:60,standard:80,challenge:100}[ST.difficulty] || 60; }
function formatTime(d){ return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function showToast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(window._toastTimer); window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600); }
function phActivity(){ return {basic:'例如：野餐',standard:'輸入活動名稱，1 至 4 字',challenge:'輸入事情名稱，盡量準確'}[ST.difficulty]; } function phExtra(){ return {basic:'例如：準備野餐',standard:'例如：找位置坐下',challenge:'請寫較完整短語，例如：準備開始活動'}[ST.difficulty]; } function phDetail(){ return {basic:'例如：很多人歡笑',standard:'例如：藍藍的天空',challenge:'請寫 3 至 8 字細節，例如：同學大聲為我打氣'}[ST.difficulty]; } function phThought(){ return {basic:'例如：我要加油',standard:'例如：原來我做得到',challenge:'請輸入完整短句，例如：只要再試一次，我一定做得到'}[ST.difficulty]; } function phReason(){ return {basic:'例如：大家都很照顧我',standard:'例如：我學會了合作',challenge:'請寫清楚原因，例如：我終於克服了原本害怕的事情'}[ST.difficulty]; } function phEcho(){ return {basic:'例如：很開心',standard:'例如：這天很難忘',challenge:'請輸入完整短句，例如：那份溫暖一直留在我心中'}[ST.difficulty]; } function helpThought(){ return ST.difficulty==='challenge' ? '挑戰版：請盡量輸入完整短句。' : '可按提示帶入，也可自己輸入。'; } function helpEcho(){ return ST.difficulty==='challenge' ? '挑戰版：這裏建議輸入完整短句，讓結尾更完整。' : '可先寫心情或回想，也可按提示字詞。'; } 
</script>
