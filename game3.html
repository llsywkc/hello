<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因為所以 - 課堂挑戰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #E8F5E9; 
            color: #000000; 
            font-family: 'Comic Sans MS', '微軟正黑體', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        #game-container {
            background-color: #C8E6C9; 
            border: 8px solid #81C784; 
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative;
        }
        
        h1 {
            color: #1B5E20; 
            font-size: 2.6em;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }
        
        p {
            font-size: 1.4em;
            color: #000000;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .btn {
            background-color: #4CAF50; 
            color: white; 
            border: none;
            border-radius: 15px;
            padding: 15px 25px;
            font-size: 1.4em;
            margin: 10px auto; 
            cursor: pointer;
            box-shadow: 0 5px 0 #388E3C;
            transition: all 0.2s;
            font-family: inherit;
            font-weight: bold;
            width: 80%; 
            max-width: 500px;
            display: block; 
        }
        
        .btn:hover {
            background-color: #45A049;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #2E7D32;
        }
        
        .btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        
        .option-btn {
            display: block;
            width: 100%; 
            background-color: #A5D6A7; 
            color: #000000; 
            box-shadow: 0 5px 0 #66BB6A;
            margin: 15px 0;
            border: 4px solid transparent;
            font-size: 1.5em;
            transition: transform 0.1s;
            border-radius: 15px;
            padding: 15px 20px;
        }
        
        .option-btn:hover {
            background-color: #81C784;
            transform: scale(1.02);
        }
        
        .option-btn:active {
            transform: scale(0.98);
        }
        
        .option-btn.selected {
            border: 4px solid #1B5E20;
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 5px 0 #1B5E20;
        }
        
        .option-btn.wrong-anim {
            background-color: #BDBDBD !important;
            box-shadow: 0 5px 0 #9E9E9E !important;
            cursor: not-allowed;
            color: #424242 !important;
            transform: none !important;
            border: 4px solid transparent;
        }
        
        .option-btn.correct-anim {
            background-color: #FFEB3B !important; 
            color: #000000 !important;
            box-shadow: 0 5px 0 #FBC02D !important;
            border: 4px solid #F57F17 !important;
            transform: none !important;
        }
        
        #question-text {
            font-size: 2em;
            font-weight: bold;
            color: #000000;
            margin: 20px 0;
            background: #FFFFFF;
            padding: 30px 20px;
            border-radius: 15px;
            border: 4px dashed #4CAF50;
            line-height: 1.4;
        }
        
        #timer-container {
            width: 100%;
            background-color: #FFFFFF;
            border: 2px solid #388E3C;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            overflow: hidden;
        }
        
        #timer-bar {
            width: 100%;
            height: 25px;
            background-color: #4CAF50;
            transition: width 0.1s linear, background-color 0.2s;
        }
        
        #controls-container {
            min-height: 80px;
            margin-top: 25px;
        }
        
        #feedback-msg {
            font-size: 1.8em;
            font-weight: bold;
            margin: 15px 0;
            display: none;
        }
        
        .screen { display: none; }
        .active { display: block; }

        #submit-btn, #next-btn {
            width: 50%;
            min-width: 200px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>🔍 因為所以 邏輯大挑戰 🔍</h1>
        <p>請選擇課堂挑戰模式：</p>
        <button class="btn" onclick="startGame('findSo')">▶️ 活動一：尋找「所以」(結果)</button>
        <button class="btn" onclick="startGame('findBecause')">▶️ 活動二：尋找「因為」(原因)</button>
        <button class="btn" style="background-color: #D32F2F; box-shadow: 0 5px 0 #B71C1C; margin-top: 30px;" onclick="startGame('challenge')">👑 活動四：終極挑戰 (限時)</button>
    </div>

    <div id="play-screen" class="screen">
        <h2 id="level-title" style="color: #1B5E20; font-size: 2em; margin-bottom: 10px;"></h2>
        <p>✅ 分數: <span id="score">0</span> / <span id="total-q">0</span></p>
        
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div id="question-text"></div>
        <div id="options-container"></div>
        
        <div id="controls-container">
            <button id="submit-btn" class="btn" style="display:none; background-color: #1976D2; box-shadow: 0 5px 0 #0D47A1;" onclick="submitAnswer()">📝 提交答案</button>
            <div id="feedback-msg"></div>
            <button id="next-btn" class="btn" style="display:none; background-color: #F57C00; box-shadow: 0 5px 0 #E65100;" onclick="nextQuestion()">➡️ 下一題</button>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1 style="font-size: 3em;">🎉 挑戰結束 🎉</h1>
        <p id="final-score-text" style="font-size: 2em; margin: 30px 0;"></p>
        <button class="btn" style="width: 50%;" onclick="playSound('click'); setTimeout(() => location.reload(), 200);">🏠 回到主選單</button>
    </div>
</div>

<script>
    // --- 音效系統 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    
    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return; 
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;

        switch(type) {
            case 'click': 
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, now);
                oscillator.frequency.exponentialRampToValueAtTime(400, now + 0.05);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                oscillator.start(now);
                oscillator.stop(now + 0.05);
                break;
                
            case 'start': 
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, now); 
                oscillator.frequency.setValueAtTime(554, now + 0.1); 
                oscillator.frequency.setValueAtTime(659, now + 0.2); 
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                oscillator.start(now);
                oscillator.stop(now + 0.4);
                break;
                
            case 'next': 
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(400, now);
                oscillator.frequency.linearRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
                oscillator.start(now);
                oscillator.stop(now + 0.1);
                break;

            case 'correct': 
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, now); 
                oscillator.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                oscillator.start(now);
                oscillator.stop(now + 0.3);
                break;
                
            case 'wrong': 
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(250, now); 
                oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                oscillator.start(now);
                oscillator.stop(now + 0.3);
                break;
                
            case 'tick': 
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(1000, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                oscillator.start(now);
                oscillator.stop(now + 0.05);
                break;

            case 'win': 
                oscillator.type = 'sine';
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                notes.forEach((freq, i) => {
                    oscillator.frequency.setValueAtTime(freq, now + i * 0.1);
                });
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                oscillator.start(now);
                oscillator.stop(now + 0.5);
                break;
        }
    }

    // --- 題目數據庫 (已加入工作紙情境) ---
    const questionBank = {
        findSo: [
            // 原有題目
            { q: "因為外面下大雨，________。", options: ["所以我撐起雨傘", "所以我去操場跑步", "所以今天天氣很好"], ans: 0 },
            { q: "因為弟弟肚子很餓，________。", options: ["所以我給他蓋被子", "所以他吃了一個大漢堡", "所以他把水喝光了"], ans: 1 },
            { q: "因為我昨天很晚才睡覺，________。", options: ["所以我今天精神很好", "所以我今天覺得很疲倦", "所以鬧鐘壞了"], ans: 1 },
            { q: "因為他不小心跌倒，________。", options: ["所以他很高興", "所以他的腳受傷流血了", "所以他跑得更快"], ans: 1 },
            { q: "因為今天天氣很冷，________。", options: ["所以我多穿了一件厚外套", "所以我打開冷氣", "所以我去游泳"], ans: 0 },
            // 工作紙新題目 (5條)
            { q: "因為外面正在下雨，________。", options: ["所以我不能去遊樂場玩耍", "所以我去操場打球", "所以今天天氣很炎熱"], ans: 0 },
            { q: "因為弟弟吃了變壞的食物，________。", options: ["所以他覺得很肚餓", "所以他的肚子很痛", "所以他很高興"], ans: 1 },
            { q: "因為我主動幫忙做家務，________。", options: ["所以媽媽稱讚我", "所以媽媽責備我", "所以我遲到了"], ans: 0 },
            { q: "因為哥哥每天都努力温習，________。", options: ["所以他忘記帶書包", "所以他常常生病", "所以他考到了好成績"], ans: 2 },
            { q: "因為他昨晚玩遊戲機到深夜，________。", options: ["所以他今天精神很好", "所以他今天上學遲到了", "所以他考了一百分"], ans: 1 }
        ],
        findBecause: [
            // 原有題目
            { q: "________，所以我們不用上學。", options: ["因為我忘記帶書包", "因為今天打颱風", "因為今天是星期一"], ans: 1 },
            { q: "________，所以我把冷氣打開。", options: ["因為天氣很熱", "因為天氣很冷", "因為外面下雨"], ans: 0 },
            { q: "________，所以我今天遲到了。", options: ["因為我今天很早起床", "因為我不喜歡上學", "因為弟弟昨晚玩遊戲機到深夜，"], ans: 2 },
            { q: "________，所以我去看醫生。", options: ["因為我生病發燒了", "因為我肚子很餓", "因為醫生是我的朋友"], ans: 0 },
            { q: "________，所以小狗高興地搖尾巴。", options: ["因為牠找不到玩具", "因為主人給了牠一根骨頭", "因為牠在睡覺"], ans: 1 },
            // 工作紙新題目 (5條)
            { q: "________，所以鄰座同學把文具借給我。", options: ["因為我忘記帶文具", "因為我不喜歡寫字", "因為我有很多鉛筆"], ans: 0 },
            { q: "________，所以我們不能去遊樂場玩耍。", options: ["因為外面正在下大雨", "因為天氣十分晴朗", "因為今天不用做功課"], ans: 0 },
            { q: "________，所以妹妹考到了好成績。", options: ["因為她上課不專心", "因為她每天努力温習", "因為她愛看電視"], ans: 1 },
            { q: "________，所以媽媽稱讚我是一個好孩子。", options: ["因為我在課室裡大叫", "因為我打破了花瓶", "因為我主動做家務"], ans: 2 },
            { q: "________，所以小明要去看醫生。", options: ["因為他吃了變壞的食物", "因為他想買新玩具", "因為他吃了很多蔬菜"], ans: 0 }
        ],
        challenge: [
            // 原有題目 (15條)
            { type: "邏輯", q: "因為我十分口渴，________。", options: ["所以我喝了一大杯水", "所以我去睡覺", "所以我不吃飯"], ans: 0 },
            { type: "邏輯", q: "________，所以弟弟大哭起來。", options: ["因為他的玩具壞了", "因為他吃了一顆糖果", "因為他在看電視"], ans: 0 },
            { type: "標點", q: "哪一句的標點符號用得最正確？", options: ["因為天冷，所以我穿外套。", "因為天冷。所以我穿外套，", "因為天冷，所以我穿外套，"], ans: 0 },
            { type: "邏輯", q: "________，所以小明去看牙醫。", options: ["因為他肚子痛", "因為他牙齒痛", "因為他頭痛"], ans: 1 },
            { type: "邏輯", q: "因為妹妹每天做運動，________。", options: ["所以她的身體很健康", "所以她每天都會遲到", "所以她很容易生病"], ans: 0 },
            { type: "重組", q: "排排看：所以 地上濕了 外面下雨 因為", options: ["因為外面下雨，所以地上濕了。", "因為地上濕了，所以外面下雨。", "外面下雨因為，地上濕了所以。"], ans: 0 },
            { type: "邏輯", q: "因為小貓肚子餓了，________。", options: ["所以牠在唱歌", "所以我給牠吃魚", "所以牠去洗澡"], ans: 1 },
            { type: "邏輯", q: "________，所以我們穿上雨衣。", options: ["因為外面出大太陽", "因為外面下大雨", "因為外面有大風"], ans: 1 },
            { type: "填充", q: "（　　）太陽下山了，（　　）天黑了。", options: ["如果……就", "雖然……但是", "因為……所以"], ans: 2 },
            { type: "邏輯", q: "因為我每天準時起床，________。", options: ["所以我上學沒有遲到", "所以我的功課做完了", "所以我忘記帶書包"], ans: 0 },
            { type: "邏輯", q: "________，所以大家都很開心。", options: ["因為今天默書不合格", "因為今天是學校旅行", "因為下雨不能去公園"], ans: 1 },
            { type: "邏輯", q: "因為我不小心打破了水杯，________。", options: ["所以我向媽媽道歉", "所以我很高興", "所以媽媽稱讚我"], ans: 0 },
            { type: "邏輯", q: "因為天氣實在太熱了，________。", options: ["所以我穿上厚外套", "所以我打開了風扇", "所以我蓋上厚被子"], ans: 1 },
            { type: "找錯", q: "「因為蘋果很甜，因為我喜歡吃。」哪裡錯了？", options: ["句子沒有錯", "第一個「因為」改成「所以」", "第二個「因為」改成「所以」"], ans: 2 },
            { type: "邏輯", q: "________，所以我的雙手很乾淨。", options: ["因為我剛剛洗了手", "因為我剛剛玩了泥沙", "因為我剛剛畫了水彩畫"], ans: 0 },
            // 工作紙新題目 (5條)
            { type: "邏輯", q: "因為小強玩遊戲機到深夜，________。", options: ["所以他今天精神飽滿", "所以他今天上學遲到了", "所以老師稱讚他"], ans: 1 },
            { type: "重組", q: "排排看：所以 忘記帶文具 鄰座把文具借給我 因為 我", options: ["因為鄰座把文具借給我，所以我忘記帶文具。", "因為我忘記帶文具，鄰座把文具借給我所以。", "因為我忘記帶文具，所以鄰座把文具借給我。"], ans: 2 },
            { type: "標點", q: "哪一句的標點符號用得最正確？", options: ["因為我做家務，所以媽媽稱讚我。", "因為我做家務。所以媽媽稱讚我，", "因為我做家務，所以媽媽稱讚我，"], ans: 0 },
            { type: "找錯", q: "「因為弟弟吃了變壞的食物，因為他肚子痛。」哪裡錯了？", options: ["句子沒有錯", "第一個「因為」應該改成「所以」", "第二個「因為」應該改成「所以」"], ans: 2 },
            { type: "填充", q: "（　　）姐姐努力温習，（　　）她考到了好成績。", options: ["如果……就", "因為……所以", "雖然……但是"], ans: 1 }
        ]
    };

    let currentLevel = '';
    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;
    let selectedOptionIndex = -1;
    let isFirstAttempt = true; 
    
    let timerInterval;
    let timeLeft = 15;
    const maxTime = 15;
    let lastTickTime = 4;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startGame(level) {
        initAudio(); 
        playSound('start'); 
        
        currentLevel = level;
        
        // 打亂題庫順序
        let shuffledQuestions = [...questionBank[level]].sort(() => Math.random() - 0.5);
        
        // 不論哪一個關卡，一律隨機抽出 5 題，確保課堂時間容易掌控
        currentQuestions = shuffledQuestions.slice(0, 5);

        currentQIndex = 0;
        score = 0;
        
        document.getElementById('total-q').innerText = currentQuestions.length;
        
        let titleObj = {
            'findSo': '▶️ 活動一：尋找「所以」',
            'findBecause': '▶️ 活動二：尋找「因為」',
            'challenge': '👑 活動四：終極挑戰'
        };
        document.getElementById('level-title').innerText = titleObj[level];
        
        if (level === 'challenge') {
            document.getElementById('timer-container').style.display = 'block';
        } else {
            document.getElementById('timer-container').style.display = 'none';
        }

        setTimeout(() => {
            showScreen('play-screen');
            loadQuestion();
        }, 400); 
    }

    function loadQuestion() {
        if (currentQIndex >= currentQuestions.length) {
            endGame();
            return;
        }

        selectedOptionIndex = -1;
        isFirstAttempt = true;
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        let feedbackMsg = document.getElementById('feedback-msg');
        feedbackMsg.style.display = 'none';
        feedbackMsg.innerText = '';
        
        document.getElementById('score').innerText = score;
        const qData = currentQuestions[currentQIndex];
        
        let typeLabel = qData.type ? `<span style="font-size: 0.7em; color: #1B5E20; background: #C8E6C9; padding: 5px 10px; border-radius: 8px; display:inline-block; margin-bottom:10px;">[${qData.type}題]</span><br>` : "";
        document.getElementById('question-text').innerHTML = typeLabel + qData.q;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn option-btn';
            btn.innerHTML = opt;
            btn.onclick = () => selectOption(index, btn);
            optionsContainer.appendChild(btn);
        });

        if (currentLevel === 'challenge') {
            startTimer();
        }
    }

    function selectOption(index, btnElement) {
        if (document.getElementById('next-btn').style.display === 'inline-block') return;
        if (btnElement.classList.contains('wrong-anim')) return;

        playSound('click'); 

        selectedOptionIndex = index;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btnElement.classList.add('selected');
        
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('feedback-msg').style.display = 'none'; 
    }

    function submitAnswer() {
        if (selectedOptionIndex === -1) return;

        const qData = currentQuestions[currentQIndex];
        let feedbackMsg = document.getElementById('feedback-msg');
        let options = document.querySelectorAll('.option-btn');

        if (selectedOptionIndex === qData.ans) {
            playSound('correct'); 
            if (currentLevel === 'challenge') clearInterval(timerInterval);
            
            if (isFirstAttempt) {
                score++;
                document.getElementById('score').innerText = score;
            }

            options.forEach(b => {
                b.disabled = true;
                b.classList.remove('selected');
            });
            options[selectedOptionIndex].classList.add('correct-anim');

            feedbackMsg.innerHTML = "🎉 答對了！做得好！";
            feedbackMsg.style.color = "#1B5E20";
            feedbackMsg.style.display = "block";
            
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';

        } else {
            playSound('wrong'); 
            isFirstAttempt = false; 
            
            let wrongBtn = options[selectedOptionIndex];
            wrongBtn.classList.remove('selected');
            wrongBtn.classList.add('wrong-anim');
            wrongBtn.disabled = true;
            
            document.getElementById('submit-btn').style.display = 'none';
            selectedOptionIndex = -1;

            feedbackMsg.innerHTML = "❌ 答錯了，請重新選擇！";
            feedbackMsg.style.color = "#D32F2F";
            feedbackMsg.style.display = "block";
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = maxTime;
        lastTickTime = 4; 
        const timerBar = document.getElementById('timer-bar');
        timerBar.style.width = '100%';
        timerBar.style.backgroundColor = '#4CAF50';

        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            let percentage = (timeLeft / maxTime) * 100;
            timerBar.style.width = percentage + '%';

            if (timeLeft <= 3.0 && timeLeft > 0) {
                timerBar.style.backgroundColor = '#D32F2F';
                let currentSec = Math.ceil(timeLeft);
                if (currentSec !== lastTickTime) {
                    playSound('tick');
                    lastTickTime = currentSec;
                }
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                playSound('wrong');
                
                let options = document.querySelectorAll('.option-btn');
                options.forEach(b => b.disabled = true);
                options[currentQuestions[currentQIndex].ans].classList.add('correct-anim');

                let feedbackMsg = document.getElementById('feedback-msg');
                feedbackMsg.innerHTML = "⏰ 時間到！";
                feedbackMsg.style.color = "#D32F2F";
                feedbackMsg.style.display = "block";
                
                document.getElementById('submit-btn').style.display = 'none';
                document.getElementById('next-btn').style.display = 'inline-block';
            }
        }, 100);
    }

    function nextQuestion() {
        playSound('next'); 
        currentQIndex++;
        loadQuestion();
    }

    function endGame() {
        playSound('win'); 
        showScreen('end-screen');
        document.getElementById('final-score-text').innerText = 
            `你得到了 ${score} / ${currentQuestions.length} 分！\n` + 
            (score === currentQuestions.length ? "太棒了！全對！" : "繼續努力！");
    }
</script>

</body>
</html>
