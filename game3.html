<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識科大冒險 - 打怪獸溫習篇</title>
    <style>
        /* --- 卡通 RPG 風格 CSS 設計 --- */
        body { background-color: #2c3e50; background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%); background-size: 60px 60px; background-position: 0 0, 30px 30px; font-family: 'Comic Sans MS', 'Chalkboard SE', '微軟正黑體', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: #333; }
        #game-container { background-color: #ecf0f1; width: 95%; max-width: 650px; border: 6px solid #2c3e50; border-radius: 20px; box-shadow: 10px 10px 0px #1a252f; padding: 20px; text-align: center; position: relative; max-height: 95vh; overflow-y: auto; }
        h1 { color: #e74c3c; text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 4px 4px 0px #c0392b; font-size: 2.2em; margin: 10px 0 20px 0; }
        
        /* 按鈕設計 */
        .btn { background-color: #3498db; color: white; font-size: 1.2em; font-weight: bold; padding: 12px; margin: 8px 0; border: 4px solid #2980b9; border-radius: 12px; cursor: pointer; box-shadow: 0px 5px 0px #1f618d; transition: all 0.1s ease; width: 100%; font-family: inherit;}
        .btn:hover { transform: translateY(-2px); box-shadow: 0px 7px 0px #1f618d; }
        .btn:active { transform: translateY(3px); box-shadow: 0px 2px 0px #1f618d; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: 0px 5px 0px #1f618d; }
        
        .btn-start { background-color: #e67e22; border-color: #d35400; box-shadow: 0px 5px 0px #a04000; font-size: 1.5em; margin-top: 20px;}
        .btn-option { background-color: #f1c40f; border-color: #f39c12; color: #333; box-shadow: 0px 5px 0px #d68910; min-height: 60px; display: flex; align-items: center; justify-content: center;}
        .btn-hint { background-color: #9b59b6; border-color: #8e44ad; box-shadow: 0px 5px 0px #71368a; width: auto; padding: 10px 20px;}

        /* --- 戰鬥區域 UI --- */
        #battle-arena { display: flex; justify-content: space-between; align-items: flex-end; background-color: #a2d9ce; border: 4px solid #1abc9c; border-radius: 15px; padding: 15px; margin-bottom: 20px; height: 110px; position: relative; overflow: hidden; }
        .character-box { text-align: center; z-index: 2; width: 40%;}
        .emoji { font-size: 60px; display: inline-block; transition: transform 0.2s; text-shadow: 2px 2px 0px #333;}
        
        /* 血條設計 */
        .status-text { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; background: rgba(255,255,255,0.7); border-radius: 10px; padding: 2px;}
        .hearts { color: #e74c3c; font-size: 1.2em; text-shadow: 1px 1px 0px #333;}
        .hp-bar-bg { background-color: #bdc3c7; border: 3px solid #7f8c8d; border-radius: 10px; height: 15px; width: 100%; overflow: hidden; margin: 0 auto;}
        .hp-bar-fill { background-color: #e74c3c; height: 100%; width: 100%; transition: width 0.3s ease; }

        /* --- 動畫 --- */
        .attack-right { animation: dashRight 0.3s ease-in-out; }
        .attack-left { animation: dashLeft 0.3s ease-in-out; }
        .shake { animation: shakeHurt 0.4s; }
        @keyframes dashRight { 0% { transform: translateX(0); } 50% { transform: translateX(60px) scale(1.2); } 100% { transform: translateX(0); } }
        @keyframes dashLeft { 0% { transform: translateX(0); } 50% { transform: translateX(-60px) scale(1.2); } 100% { transform: translateX(0); } }
        @keyframes shakeHurt { 0%, 100% { transform: translateX(0); filter: brightness(1); } 25%, 75% { transform: translateX(-10px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); } 50% { transform: translateX(10px); } }
        .fade-in { animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- 問題與回饋 --- */
        .question-text { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; line-height: 1.4; text-align: left; background: #fff; padding: 15px; border-radius: 10px; border: 3px dashed #bdc3c7;}
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }
        
        #feedback { font-size: 1.1em; font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 10px; display: none; text-align: left;}
        .correct-text { background-color: #d5f5e3; color: #1e8449; border: 3px solid #2ecc71; }
        .wrong-text { background-color: #fadbd8; color: #b03a2e; border: 3px solid #e74c3c; }

        /* 畫面切換 */
        .screen { display: none; }
        .active-screen { display: block; }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="start-screen" class="screen active-screen fade-in">
        <h1>🌟 魔法常識大冒險 🌟</h1>
        <p style="font-size: 1.2em; line-height: 1.5;">常識王國受到了怪獸的襲擊！<br>身為魔法師的你，請用你的「常識力量」打敗牠們！</p>
        <div style="font-size: 60px; margin: 20px 0;">🧙‍♂️ VS 🐉</div>
        <button class="btn btn-start" onclick="initAudio(); switchScreen('level-screen');">進入遊戲</button>
    </div>

    <div id="level-screen" class="screen fade-in">
        <h1>挑選你的對手</h1>
        <p style="margin-bottom: 20px; font-weight:bold; color:#2c3e50;">答對發動攻擊 💥 答錯被扣愛心 💔</p>
        <button class="btn" style="background-color: #2ecc71; border-color: #27ae60; box-shadow: 0px 5px 0px #1e8449;" onclick="startGame('easy')">🟢 簡單 (史萊姆小怪 👾)</button>
        <button class="btn" style="background-color: #f1c40f; border-color: #f39c12; box-shadow: 0px 5px 0px #d68910; color: #333;" onclick="startGame('medium')">🟡 中等 (裝甲暴龍 🦖)</button>
        <button class="btn" style="background-color: #e74c3c; border-color: #c0392b; box-shadow: 0px 5px 0px #922b21;" onclick="startGame('hard')">🔴 困難 (烈焰魔王 🐉)</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="battle-arena">
            <div class="character-box">
                <div class="status-text">魔法師 🧙‍♂️</div>
                <div class="hearts" id="player-hearts">❤️❤️❤️</div>
                <div id="player-emoji" class="emoji">🧙‍♂️</div>
            </div>
            <div style="font-size: 1.5em; font-weight: bold; color: #e74c3c; padding-bottom: 15px;">VS</div>
            <div class="character-box">
                <div class="status-text" id="monster-name">怪獸 🐉</div>
                <div class="hp-bar-bg"><div id="monster-hp-fill" class="hp-bar-fill"></div></div>
                <div id="monster-emoji" class="emoji">🐉</div>
            </div>
        </div>

        <div style="text-align: right; font-weight: bold; color: #7f8c8d; margin-bottom: 5px;">題目: <span id="q-progress">1/10</span></div>
        <div class="question-text" id="question-text">問題載入中...</div>
        
        <div class="options-grid" id="options-container">
            </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <button class="btn btn-hint" onclick="showHint()">💡 提示</button>
            <button id="next-btn" class="btn" style="display: none; width: 60%; background-color: #e67e22; border-color:#d35400; box-shadow:0px 5px 0px #a04000;" onclick="nextQuestion()">繼續戰鬥 ➔</button>
        </div>
        
        <div id="feedback"></div>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="end-title">🎉 戰鬥結束 🎉</h1>
        <div id="end-emoji" style="font-size: 80px; margin: 10px;">🏆</div>
        <p id="end-message" style="font-size: 1.3em; line-height: 1.5; font-weight: bold;"></p>
        <button class="btn btn-start" onclick="location.reload()">🔄 回到主畫面</button>
    </div>

</div>

<script>
    // --- 題庫資料 ---
    // q=題目, o=選項陣列(t=文字, c=是否正確), h=提示, r=解釋
    const quizDatabase = {
        "easy": {
            icon: "👾", name: "史萊姆小怪",
            qList: [
                { q: "以下哪一項為地球帶來温暖？", o: [{t:"太陽", c:true}, {t:"月亮", c:false}, {t:"星星", c:false}, {t:"街燈", c:false}], h: "白天天上最光的星體。", r:"太陽是地球最主要的熱源。" },
                { q: "以下哪種物質是優良的導熱體？", o: [{t:"木材", c:false}, {t:"金屬", c:true}, {t:"塑膠", c:false}, {t:"玻璃", c:false}], h: "煮食鍋的底部通常是用這材料製成。", r:"金屬能快速傳導熱能。" },
                { q: "空氣受熱時會產生甚麼變化？", o: [{t:"膨脹", c:true}, {t:"收縮", c:false}, {t:"結冰", c:false}, {t:"變重", c:false}], h: "熱氣球升空的原理。", r:"根據熱脹冷縮原理，空氣受熱體積會變大。" },
                { q: "當水遇冷時，温度會有甚麼變化？", o: [{t:"上升", c:false}, {t:"下降", c:true}, {t:"不變", c:false}, {t:"沸騰", c:false}], h: "放進雪櫃會怎樣？", r:"失去熱能，溫度就會下降。" },
                { q: "中國的首都位於哪個城市？", o: [{t:"上海", c:false}, {t:"廣州", c:false}, {t:"北京", c:true}, {t:"香港", c:false}], h: "有天安門廣場的地方。", r:"北京是中國的政治和文化中心。" },
                { q: "中國總共有多少個民族？", o: [{t:"50個", c:false}, {t:"55個", c:false}, {t:"56個", c:true}, {t:"60個", c:false}], h: "五十六個星座，五十六枝花。", r:"中國由漢族和55個少數民族組成。" },
                { q: "中國哪一個民族的人口最多？", o: [{t:"壯族", c:false}, {t:"漢族", c:true}, {t:"滿族", c:false}, {t:"苗族", c:false}], h: "我們平時寫的中文字也叫__字。", r:"漢族佔全國人口絕大多數。" },
                { q: "洗衣店主要為顧客提供甚麼？", o: [{t:"售賣貨品", c:false}, {t:"提供服務", c:true}, {t:"免費衣服", c:false}, {t:"賣文具", c:false}], h: "幫你完成一項工作。", r:"洗衣店提供清洗衣物服務，不賣實體貨品。" },
                { q: "以下哪一項是香港常用的電子貨幣？", o: [{t:"人民幣", c:false}, {t:"支票", c:false}, {t:"八達通", c:true}, {t:"黃金", c:false}], h: "搭車常用的「嘟嘟」卡。", r:"八達通是最普及的電子支付工具。" },
                { q: "乘搭公共交通工具時，我們應該遵守甚麼安全規則？", o: [{t:"車內奔跑", c:false}, {t:"緊握扶手", c:true}, {t:"大聲播音樂", c:false}, {t:"車廂飲食", c:false}], h: "防止車輛搖晃時跌倒。", r:"緊握扶手能保障自身安全。" }
            ]
        },
        "medium": {
            icon: "🦖", name: "裝甲暴龍",
            qList: [
                { q: "把烤盤從高溫焗爐拿出來，必須使用甚麼？", o: [{t:"保鮮紙", c:false}, {t:"隔熱手套", c:true}, {t:"金屬夾子", c:false}, {t:"濕毛巾", c:false}], h: "需要不良導熱體保護雙手。", r:"隔熱手套能阻擋熱力傳到手上。" },
                { q: "把凹陷的乒乓球放進熱水會回復原狀，為甚麼？", o: [{t:"球內空氣受熱膨脹", c:true}, {t:"膠殼遇熱收縮", c:false}, {t:"熱水進入球內", c:false}, {t:"水壓把球擠平", c:false}], h: "與空氣的特性有關。", r:"熱水令球內空氣膨脹，撐起凹陷處。" },
                { q: "把温度計放進冰水中，液柱頂端會怎樣？", o: [{t:"快速上升", c:false}, {t:"漸漸下降", c:true}, {t:"保持不變", c:false}, {t:"液體結冰", c:false}], h: "遇冷會發生甚麼事？", r:"溫度計內液體遇冷收縮，液柱下降。" },
                { q: "來回搓着雙手是通過哪種方式產生熱？", o: [{t:"燃燒", c:false}, {t:"電力", c:false}, {t:"摩擦", c:true}, {t:"吸收太陽能", c:false}], h: "兩個表面互相磨刷。", r:"摩擦會將動能轉化為熱能。" },
                { q: "上海的簡稱是甚麼？", o: [{t:"京", c:false}, {t:"粵", c:false}, {t:"深", c:false}, {t:"滬", c:true}], h: "一個有水字部的字。", r:"上海簡稱為「滬」。" },
                { q: "廣州位於哪條河流的入海口？", o: [{t:"長江", c:false}, {t:"黃河", c:false}, {t:"珠江", c:true}, {t:"湄公河", c:false}], h: "與香港和澳門形成著名的三角洲。", r:"廣州是珠江三角洲的重要城市。" },
                { q: "購買預先包裝食品前，精明消費者最應留意甚麼？", o: [{t:"包裝圖案", c:false}, {t:"有效期限", c:true}, {t:"廣告代言人", c:false}, {t:"特價標語", c:false}], h: "確保食物安全不變質的資訊。", r:"留意有效期限能避免買到過期食品。" },
                { q: "在超市買了破損的罐頭，正確處理方法是？", o: [{t:"直接丟掉", c:false}, {t:"照常打開吃", c:false}, {t:"帶收據要求更換", c:true}, {t:"立刻報警", c:false}], h: "你需要消費憑證。", r:"保留收據並要求退換是保障消費者權益。" },
                { q: "哪種交通工具可直接往返香港和澳門？", o: [{t:"港鐵", c:false}, {t:"電車", c:false}, {t:"噴射船", c:true}, {t:"天星小輪", c:false}], h: "在海上高速航行的交通工具。", r:"噴射船是往返港澳的主要水路交通。" },
                { q: "小巴司機提醒乘客扣好「安全設備」，是指甚麼？", o: [{t:"扶手", c:false}, {t:"車窗", c:false}, {t:"八達通機", c:false}, {t:"安全帶", c:true}], h: "綁在座位上的帶子。", r:"法例規定小巴乘客必須扣上安全帶保命。" }
            ]
        },
        "hard": {
            icon: "🐉", name: "烈焰魔王",
            qList: [
                { q: "溫度單位「°F」代表甚麼？", o: [{t:"攝氏", c:false}, {t:"華氏", c:true}, {t:"體積", c:false}, {t:"風速", c:false}], h: "外國常用的溫度單位。", r:"°F是華氏（Fahrenheit）的符號。" },
                { q: "以下哪個不屬於大館（前中區警署）的法定古蹟？", o: [{t:"前域多利監獄", c:false}, {t:"前中區警署", c:false}, {t:"舊最高法院大樓", c:true}, {t:"前中央裁判司署", c:false}], h: "現為終審法院的建築。", r:"舊最高法院大樓不屬於大館建築群。" },
                { q: "米埔自然保護區的哪種植物為動植物提供棲息地？", o: [{t:"松樹林", c:false}, {t:"紅樹林", c:true}, {t:"仙人掌", c:false}, {t:"玫瑰花", c:false}], h: "生長在鹹淡水交界的植物。", r:"紅樹林為候鳥和濕地生物提供棲息地。" },
                { q: "「望夫石」位於以下哪個郊野公園內？", o: [{t:"大潭郊野公園", c:false}, {t:"西貢郊野公園", c:false}, {t:"城門郊野公園", c:false}, {t:"獅子山郊野公園", c:true}], h: "公園名字與貓科猛獸有關。", r:"望夫石是獅子山郊野公園內的著名岩石。" },
                { q: "香港的東平洲屬於哪種類型的景點？", o: [{t:"歷史古蹟", c:false}, {t:"主題樂園", c:false}, {t:"自然風景", c:true}, {t:"購物中心", c:false}], h: "看沉積岩和海洋生態的地方。", r:"東平洲以奇特的地貌聞名，屬自然風景。" },
                { q: "「象鼻山」位於中國哪個地方？", o: [{t:"北京", c:false}, {t:"上海", c:false}, {t:"雲南", c:false}, {t:"桂林", c:true}], h: "廣西的著名地標。", r:"象鼻山是桂林的著名自然景觀。" },
                { q: "福建以甚麼特色建築聞名？", o: [{t:"四合院", c:false}, {t:"蒙古包", c:false}, {t:"土樓", c:true}, {t:"窯洞", c:false}], h: "客家人防禦用的巨大建築。", r:"土樓是福建獨特的傳統民居。" },
                { q: "2026年（丙午年）的生肖是甚麼？", o: [{t:"蛇", c:false}, {t:"馬", c:true}, {t:"羊", c:false}, {t:"猴", c:false}], h: "地支「午」對應善於奔跑的動物。", r:"2025是蛇年，2026年是馬年。" },
                { q: "「粵車南下」的車輛可以經哪條跨海大橋進入香港？", o: [{t:"青馬大橋", c:false}, {t:"紅磡海底隧道", c:false}, {t:"港珠澳大橋", c:true}, {t:"昂船洲大橋", c:false}], h: "連接香港、珠海和澳門的大橋。", r:"港珠澳大橋是內地車輛南下的重要通道。" },
                { q: "2026年1月1日起，香港公立醫院急症室費用增加至多少？", o: [{t:"120元", c:false}, {t:"180元", c:false}, {t:"280元", c:true}, {t:"400元", c:false}], h: "接近三百元。", r:"根據資料，急症室費用將增至280元。" }
            ]
        }
    };

    // --- 遊戲變數 ---
    let currentQuestions = [];
    let currentQIndex = 0;
    let playerLives = 3;
    let monsterHP = 100;
    let hasAnswered = false;

    // --- 洗牌演算法 (Fisher-Yates) ---
    function shuffleArray(array) {
        let arr = [...array]; // 複製陣列避免修改原資料
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // --- 畫面切換 ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        const screen = document.getElementById(screenId);
        screen.classList.add('active-screen');
        if(screenId === 'battle-screen') screen.classList.add('fade-in');
    }

    // --- 遊戲流程 ---
    function startGame(levelStr) {
        const levelData = quizDatabase[levelStr];
        
        // **重要：每次開始遊戲時，隨機打亂題目的次序**
        currentQuestions = shuffleArray(levelData.qList);
        
        currentQIndex = 0;
        playerLives = 3;
        monsterHP = 100;
        
        // 更新 UI
        document.getElementById('monster-emoji').innerText = levelData.icon;
        document.getElementById('monster-name').innerText = levelData.name;
        updateStatus();
        
        switchScreen('battle-screen');
        loadQuestion();
    }

    function loadQuestion() {
        hasAnswered = false;
        
        // 隱藏回饋與下一題按鈕
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'none';
        feedback.className = '';
        document.getElementById('next-btn').style.display = 'none';
        
        // 載入題目
        const qData = currentQuestions[currentQIndex];
        document.getElementById('q-progress').innerText = `${currentQIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        // **重要：每次載入題目時，隨機打亂 ABCD 選項的次序**
        const shuffledOptions = shuffleArray(qData.o);
        
        // 生成選項按鈕
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            btn.innerText = opt.t;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(opt, selectedBtn) {
        if (hasAnswered) return;
        hasAnswered = true;
        
        // 鎖定所有按鈕並標示顏色
        const allBtns = document.getElementById('options-container').getElementsByTagName('button');
        const currentQ = currentQuestions[currentQIndex];
        
        for (let btn of allBtns) {
            btn.disabled = true;
            // 找出正確答案按鈕變綠色
            const thisOptData = currentQ.o.find(o => o.t === btn.innerText);
            if (thisOptData && thisOptData.c) {
                btn.style.backgroundColor = '#2ecc71';
                btn.style.color = '#fff';
            }
        }

        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';

        if (opt.c) {
            // 答對邏輯：攻擊怪獸
            playSound('correct');
            setTimeout(() => playSound('attack'), 200);
            
            // 動畫
            const pEmoji = document.getElementById('player-emoji');
            pEmoji.classList.add('attack-right');
            setTimeout(() => pEmoji.classList.remove('attack-right'), 300);
            
            setTimeout(() => {
                const mEmoji = document.getElementById('monster-emoji');
                mEmoji.classList.add('shake');
                setTimeout(() => mEmoji.classList.remove('shake'), 400);
                
                // 扣血 (10題打死怪獸，每題扣10%)
                monsterHP -= 10;
                updateStatus();
            }, 150);

            feedback.className = 'correct-text fade-in';
            feedback.innerHTML = `✅ <b>魔法命中！</b><br>${currentQ.r}`;
        } else {
            // 答錯邏輯：怪獸反擊
            playSound('wrong');
            setTimeout(() => playSound('hurt'), 200);
            selectedBtn.style.backgroundColor = '#e74c3c';
            selectedBtn.style.color = '#fff';
            
            // 動畫
            const mEmoji = document.getElementById('monster-emoji');
            mEmoji.classList.add('attack-left');
            setTimeout(() => mEmoji.classList.remove('attack-left'), 300);
            
            setTimeout(() => {
                const pEmoji = document.getElementById('player-emoji');
                pEmoji.classList.add('shake');
                setTimeout(() => pEmoji.classList.remove('shake'), 400);
                
                // 扣愛心
                playerLives -= 1;
                updateStatus();
            }, 150);

            feedback.className = 'wrong-text fade-in';
            feedback.innerHTML = `❌ <b>怪獸反擊！</b><br>${currentQ.r}`;
        }

        // 檢查勝負或顯示下一題
        setTimeout(() => {
            if (playerLives <= 0) {
                endGame(false);
            } else if (currentQIndex === currentQuestions.length - 1 || monsterHP <= 0) {
                endGame(true);
            } else {
                document.getElementById('next-btn').style.display = 'block';
                document.getElementById('next-btn').classList.add('fade-in');
            }
        }, 800);
    }

    function updateStatus() {
        // 更新愛心
        let heartsStr = "";
        for(let i=0; i<playerLives; i++) heartsStr += "❤️";
        for(let i=playerLives; i<3; i++) heartsStr += "🖤";
        document.getElementById('player-hearts').innerText = heartsStr;
        
        // 更新血條
        document.getElementById('monster-hp-fill').style.width = `${Math.max(0, monsterHP)}%`;
    }

    function showHint() {
        if(hasAnswered) return;
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';
        feedback.className = 'hint-text fade-in';
        feedback.innerHTML = `💡 <b>小提示：</b> ${currentQuestions[currentQIndex].h}`;
        playSound('hint');
    }

    function nextQuestion() {
        currentQIndex++;
        loadQuestion();
    }

    function endGame(isWin) {
        switchScreen('end-screen');
        const title = document.getElementById('end-title');
        const emoji = document.getElementById('end-emoji');
        const msg = document.getElementById('end-message');

        if(isWin) {
            playSound('win');
            title.innerText = "🎉 戰鬥勝利 🎉";
            title.style.color = "#2ecc71";
            emoji.innerText = "🏆🧙‍♂️";
            msg.innerText = `太棒了！你用豐富的常識知識打敗了怪獸，成功保衛了王國！\n\n剩餘生命：${playerLives} ❤️`;
        } else {
            playSound('lose');
            title.innerText = "☠️ 戰鬥失敗 ☠️";
            title.style.color = "#e74c3c";
            emoji.innerText = "💀🐉";
            msg.innerText = "哎呀！魔法師的生命值歸零了，怪獸太強大了。\n請再多溫習一下常識，重新挑戰吧！";
        }
    }

    // --- Web Audio API 音效生成器 (無須下載聲音檔) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
            // iOS 解鎖音效
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.value = 0; osc.start(); osc.stop(audioCtx.currentTime + 0.001);
        }
    }

    function playSound(type) {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') { // 叮鈴
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.setValueAtTime(1108.73, now + 0.1);
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'wrong') { // 錯誤砵聲
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'attack') { // 魔法揮擊
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'hurt') { // 受傷悶哼
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'hint') { // 提示音
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') { // 勝利旋律
            osc.type = 'sine';
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'sine'; o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = freq;
                g.gain.setValueAtTime(0, now + i*0.15);
                g.gain.linearRampToValueAtTime(0.5, now + i*0.15 + 0.05);
                g.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.4);
                o.start(now + i*0.15); o.stop(now + i*0.15 + 0.4);
            });
        } else if (type === 'lose') { // 失敗低音
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(50, now + 1);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 1);
            osc.start(now); osc.stop(now + 1);
        }
    }
</script>
