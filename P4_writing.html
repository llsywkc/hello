<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">

    <title>Roblox：森林大冒險</title>
    <style>
        /* 核心 Roblox 方塊風格 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap');
        
        body {
            font-family: 'Nunito', "Microsoft JhengHei", sans-serif;
            background: #4CAE50; /* 草地綠 */
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%, rgba(255,255,255,0.1)), 
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%, rgba(255,255,255,0.1));
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: #333;
        }
        
        h1 {
            color: #FFF; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 4px 4px 0 #2E7D32, -2px -2px 0 #2E7D32, 2px -2px 0 #2E7D32, -2px 2px 0 #2E7D32;
            font-size: 2.8em; text-align: center; margin: 10px 0;
        }

        /* 頂部背包資源欄 */
        .inventory-bar {
            background-color: #333; color: white;
            border: 4px solid #222; border-radius: 8px;
            padding: 10px 20px; font-size: 1.5em; font-weight: bold;
            display: flex; gap: 20px; margin-bottom: 15px;
            box-shadow: 0 6px 0 #111; flex-wrap: wrap; justify-content: center;
        }
        .gem-text { color: #E040FB; text-shadow: 1px 1px 2px #000; }

        .container {
            background-color: #E0F7FA;
            border: 8px solid #006064; border-radius: 12px;
            padding: 20px; width: 95%; max-width: 800px;
            box-shadow: 0 12px 0 #00363A; text-align: center;
        }

        /* Roblox 立體按鈕 */
        button {
            font-family: inherit; font-size: 1.3em; font-weight: bold;
            padding: 12px 20px; margin: 10px; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; transition: all 0.1s;
            border: 4px solid rgba(0,0,0,0.2);
        }
        button:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0px 0 transparent !important; }
        button:disabled { cursor: not-allowed; opacity: 0.6; filter: grayscale(100%); }
        
        .btn-green { background-color: #4CAF50; color: white; box-shadow: 0 6px 0 #2E7D32; }
        .btn-blue { background-color: #2196F3; color: white; box-shadow: 0 6px 0 #1565C0; }
        .btn-orange { background-color: #FF9800; color: white; box-shadow: 0 6px 0 #E65100; }
        .btn-grey { background-color: #9E9E9E; color: white; box-shadow: 0 6px 0 #616161; }
        .btn-red { background-color: #f44336; color: white; box-shadow: 0 6px 0 #b71c1c; }
        .btn-purple { background-color: #9C27B0; color: white; box-shadow: 0 6px 0 #6A1B9A; border: 4px solid #EA80FC; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 128, 252, 0.7), 0 6px 0 #6A1B9A; } 70% { box-shadow: 0 0 0 15px rgba(234, 128, 252, 0), 0 6px 0 #6A1B9A; } 100% { box-shadow: 0 0 0 0 rgba(234, 128, 252, 0), 0 6px 0 #6A1B9A; } }

        .hidden { display: none !important; }
        .screen { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        /* 轉盤樣式 */
        .scenario-box { font-size: 1.5em; font-weight: bold; color: #FFF; background: #8D6E63; padding: 15px; border-radius: 8px; border: 4px solid #5D4037; width: 85%; }
        .spinner-box { background: #FFF9C4; border: 6px dashed #FBC02D; border-radius: 10px; padding: 20px; font-size: 1.8em; font-weight: bold; color: #E65100; min-height: 60px; display: flex; align-items: center; justify-content: center; width: 85%; }

        /* 重組與礦洞遊戲樣式 */
        .word-bank, .answer-area { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; min-height: 80px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 10px; border: 4px inset rgba(0,0,0,0.1); }
        .word-chunk { background-color: #FFEB3B; border: 4px solid #FBC02D; box-shadow: 0 6px 0 #F57F17; padding: 12px 18px; border-radius: 6px; font-weight: bold; font-size: 1.3em; cursor: pointer; user-select: none; color: #333; }
        .word-chunk:active { transform: translateY(4px); box-shadow: 0 2px 0 #F57F17; }
        
        .stone-chunk { background-color: #9E9E9E; border: 4px solid #757575; box-shadow: 0 6px 0 #424242; padding: 12px 18px; border-radius: 6px; font-weight: bold; font-size: 1.3em; cursor: pointer; user-select: none; color: #FFF; }
        .stone-chunk:active { transform: translateY(4px); box-shadow: 0 2px 0 #424242; }

        .question-text { font-size: 1.6em; font-weight: bold; background: #FFF; padding: 15px; border: 4px solid #B0BEC5; border-radius: 8px; line-height: 1.5; }
        .status-msg { font-size: 1.5em; font-weight: bold; min-height: 35px; margin-bottom: 5px; }
        .boss-progress { background: #333; color: #FFF; padding: 8px 15px; border-radius: 20px; font-size: 1.2em; font-weight: bold; border: 3px solid #FFC107; }

        /* 建築世界 */
        .world-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; background: #8BC34A; padding: 20px; border: 6px solid #558B2F; border-radius: 10px; min-height: 150px; width: 90%; font-size: 3.5em; align-content: flex-start; }
    </style>
</head>

        // --- 音效系統 ---
        let audioCtx;
        function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'epic') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);

            { type: 'reorder', target: ["那隻", "受傷的小狗", "在角落裏", "瑟瑟發抖，", "看起來", "十分可憐。"] },
            { type: 'mining', q: "面對突如其來的意外，大家都顯得 [？]。", ans: "不知所措", options: ["不知所措", "理直氣壯", "得意忘形", "從容不迫"] },
            { type: 'mining', q: "他為了準備這次的比賽，每天都練習到 [？] 才肯休息。", ans: "筋疲力盡", options: ["精神百倍", "筋疲力盡", "神采飛揚", "生龍活虎"] },
            { type: 'mining', q: "原本 [？] 的天空，突然烏雲密佈，下起大雨。", ans: "晴空萬里", options: ["愁雲慘霧", "晴空萬里", "風雨交加", "月黑風高"] },
            { type: 'mining', q: "同學們在遊樂場裡玩得 [？]，連回家的時候都忘記了。", ans: "樂而忘返", options: ["樂而忘返", "依依不捨", "唉聲嘆氣", "怒氣沖沖"] },
            { type: 'mining', q: "這道數學題實在太難了，我想了半天還是 [？]。", ans: "百思不解", options: ["恍然大悟", "百思不解", "迎刃而解", "胸有成竹"] },
            { type: 'mining', q: "她聽到自己獲獎的消息，立刻 [？] 地跑去告訴媽媽。", ans: "喜出望外", options: ["垂頭喪氣", "喜出望外", "提心吊膽", "火冒三丈"] },
            { type: 'mining', q: "大家 [？] 地合作，很快就把課室打掃得乾乾淨淨。", ans: "同心協力", options: ["各懷鬼胎", "同心協力", "袖手旁觀", "孤軍奮戰"] },
            { type: 'mining', q: "他做事總是 [？]，經常犯下一些低級錯誤。", ans: "粗心大意", options: ["一絲不苟", "粗心大意", "聚精會神", "深思熟慮"] },
            { type: 'mining', q: "這篇文章寫得 [？]，讓人讀起來十分感動。", ans: "情真意切", options: ["枯燥無味", "情真意切", "不知所云", "胡言亂語"] },
            { type: 'mining', q: "看着這張舊照片，小時候的美好回憶立刻 [？]。", ans: "浮現腦海", options: ["煙消雲散", "浮現腦海", "拋諸腦後", "不翼而飛"] }
        ];

        // 隨機題庫與索引
        let currentReorderTasks = [];
        let currentMiningTasks = [];
        let currentReorderIdx = 0;
        let currentMiningIdx = 0;
        let currentTargetSentence = [];
        let currentAnswer = [];

        // 洗牌演算法 (Fisher-Yates Shuffle)
        function shuffle(array) { 
            let arr = array.slice();
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr; 
        }

        // 初始化題庫
        function initPlayableTasks() {
            currentReorderTasks = shuffle(allReorderTasks);
            currentMiningTasks = shuffle(allMiningTasks);
            currentReorderIdx = 0;
            currentMiningIdx = 0;
        }
        window.onload = initPlayableTasks;

        // --- 介面控制 ---
        function updateUI() {
            document.getElementById('inv-wood').textContent = inventory.wood;
            document.getElementById('inv-stone').textContent = inventory.stone;
            document.getElementById('inv-gem').textContent = inventory.gem;
            document.getElementById('castle-count').textContent = inventory.castles;

            const bossBtn = document.getElementById('btn-boss');
            if (inventory.castles >= 3) {
                bossBtn.classList.remove('btn-grey');
                bossBtn.classList.add('btn-purple');
                bossBtn.innerHTML = '🗺️ 隱藏寶藏挑戰 (已解鎖)';
                bossBtn.disabled = false;
                document.getElementById('div-flying').classList.remove('hidden');
            }
        }

        function startGame(gameType) {
            initAudio(); playSound('click');
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            
            if (gameType === 'spinner') { document.getElementById('game-spinner').classList.remove('hidden'); }
            else if (gameType === 'reorder') { document.getElementById('game-reorder').classList.remove('hidden'); loadReorder(); }
            else if (gameType === 'mining') { document.getElementById('game-mining').classList.remove('hidden'); loadMining(); }
            else if (gameType === 'boss') { startBoss(); }
        }

        function openBuildZone() {
            initAudio(); playSound('click'); updateUI();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('build-zone').classList.remove('hidden');
        }

        function goHome() {
            playSound('click'); updateUI();
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- 遊戲 1: 轉盤 ---
        let spinInterval;
        function spin() {
            playSound('click'); let count = 0; clearInterval(spinInterval);
            spinInterval = setInterval(() => {
                document.getElementById('scenario-display').innerHTML = scenarios[Math.floor(Math.random() * scenarios.length)];
                let tempText = [];
                for (let i = 0; i < 3; i++) tempText.push(words[Math.floor(Math.random() * words.length)]);
                document.getElementById('spinner-display').innerHTML = tempText.join(" + ");
                count++;
                if (count > 15) { clearInterval(spinInterval); playSound('win'); }
            }, 100);
        }

        // --- 遊戲 2: 重組 ---
        function loadReorder() {
            if (currentReorderIdx >= currentReorderTasks.length) { currentReorderTasks = shuffle(allReorderTasks); currentReorderIdx = 0; }
            currentTargetSentence = currentReorderTasks[currentReorderIdx];
            currentAnswer = [];
            renderReorderUI(shuffle(currentTargetSentence));
            document.getElementById('reorder-msg').textContent = "";
            document.getElementById('btn-next-reorder').classList.add('hidden');
        }

        function renderReorderUI(bankWords) {
            document.getElementById('word-bank').innerHTML = ''; document.getElementById('answer-area').innerHTML = '';
            currentAnswer.forEach((w, i) => { let c = document.createElement('div'); c.className = 'word-chunk'; c.textContent = w; c.onclick = () => { playSound('click'); currentAnswer.splice(i, 1); bankWords.push(w); renderReorderUI(bankWords); document.getElementById('reorder-msg').textContent = ""; }; document.getElementById('answer-area').appendChild(c); });
            bankWords.forEach((w, i) => { let c = document.createElement('div'); c.className = 'word-chunk'; c.textContent = w; c.onclick = () => { playSound('click'); bankWords.splice(i, 1); currentAnswer.push(w); renderReorderUI(bankWords); checkReorderWin(); }; document.getElementById('word-bank').appendChild(c); });
        }

        function checkReorderWin() {
            if (currentAnswer.length === currentTargetSentence.length) {
                if (currentAnswer.join("") === currentTargetSentence.join("")) {
                    document.getElementById('reorder-msg').innerHTML = "✨ 成功搭橋！獲得 🪵 木材 x 1 ✨";
                    document.getElementById('reorder-msg').style.color = "#2E7D32"; playSound('win');
                    inventory.wood++; updateUI(); document.getElementById('btn-next-reorder').classList.remove('hidden');
                } else {
                    document.getElementById('reorder-msg').textContent = "❌ 橋樑不穩固！請點擊退回重排。";
                    document.getElementById('reorder-msg').style.color = "#b71c1c"; playSound('error');
                }
            }
        }
        function resetReorder() { playSound('click'); loadReorder(); }
        function nextReorder() { playSound('click'); currentReorderIdx++; loadReorder(); }

        // --- 遊戲 3: 礦洞 ---
        function loadMining() {
            if (currentMiningIdx >= currentMiningTasks.length) { currentMiningTasks = shuffle(allMiningTasks); currentMiningIdx = 0; }
            const t = currentMiningTasks[currentMiningIdx];
            document.getElementById('mining-question').textContent = t.q;
            document.getElementById('mining-msg').textContent = "";
            document.getElementById('btn-next-mining').classList.add('hidden');
            document.getElementById('mining-options').innerHTML = '';
            
            shuffle(t.options).forEach(opt => {
                let c = document.createElement('div'); c.className = 'stone-chunk'; c.textContent = opt;
                c.onclick = () => {
                    if (!document.getElementById('btn-next-mining').classList.contains('hidden')) return;
                    if (opt === t.ans) {
                        c.style.backgroundColor = "#4CAF50";
                        document.getElementById('mining-question').innerHTML = t.q.replace("[？]", `<span style="color:#4CAF50;">[${t.ans}]</span>`);
                        document.getElementById('mining-msg').innerHTML = "✨ 挖到寶了！獲得 🧱 石頭 x 1 ✨";
                        document.getElementById('mining-msg').style.color = "#2E7D32"; playSound('win');
                        inventory.stone++; updateUI(); document.getElementById('btn-next-mining').classList.remove('hidden');
                    } else {
                        c.style.backgroundColor = "#f44336";
                        document.getElementById('mining-msg').textContent = "❌ 敲錯礦石了！再試一次。";
                        document.getElementById('mining-msg').style.color = "#b71c1c"; playSound('error');
                    }
                };
                document.getElementById('mining-options').appendChild(c);
            });
        }
        function nextMining() { playSound('click'); currentMiningIdx++; loadMining(); }

        // --- 隱藏寶藏挑戰 (Boss戰) ---
        let bossQuestions = [], bossCurrentIdx = 0, bossCorrectCount = 0, bossAnswered = false, bossTarget = [], bossAnswer = [];
        function startBoss() { document.getElementById('game-boss').classList.remove('hidden'); bossQuestions = shuffle(hardTasks); bossCurrentIdx = 0; bossCorrectCount = 0; loadBossTask(); }
        function loadBossTask() {
            bossAnswered = false;
            document.getElementById('boss-progress').innerHTML = `進度：${bossCurrentIdx + 1} / 20 &nbsp;|&nbsp; 累積答對：${bossCorrectCount}`;
            document.getElementById('boss-msg').innerHTML = "請完成以下挑戰！"; document.getElementById('boss-msg').style.color = "#333";
            document.getElementById('btn-next-boss').classList.add('hidden'); document.getElementById('boss-reorder-area').classList.add('hidden'); document.getElementById('boss-mining-area').classList.add('hidden');
            const task = bossQuestions[bossCurrentIdx];
            if (task.type === 'reorder') {
                document.getElementById('boss-reorder-area').classList.remove('hidden'); document.getElementById('btn-boss-submit-reorder').classList.remove('hidden');
                bossTarget = task.target; bossAnswer = []; renderBossReorder(shuffle(bossTarget));
            } else {
                document.getElementById('boss-mining-area').classList.remove('hidden'); document.getElementById('boss-mining-q').textContent = task.q; document.getElementById('boss-mining-options').innerHTML = '';
                shuffle(task.options).forEach(opt => { let c = document.createElement('div'); c.className = 'stone-chunk'; c.textContent = opt; c.onclick = () => selectBossMining(opt, task.ans, c, task.q); document.getElementById('boss-mining-options').appendChild(c); });
            }
        }
        function renderBossReorder(bankWords) {
            if (bossAnswered) return;
            document.getElementById('boss-bank-area').innerHTML = ''; document.getElementById('boss-ans-area').innerHTML = '';
            bossAnswer.forEach((w, i) => { let c = document.createElement('div'); c.className = 'word-chunk'; c.textContent = w; c.onclick = () => { playSound('click'); bossAnswer.splice(i, 1); bankWords.push(w); renderBossReorder(bankWords); }; document.getElementById('boss-ans-area').appendChild(c); });
            bankWords.forEach((w, i) => { let c = document.createElement('div'); c.className = 'word-chunk'; c.textContent = w; c.onclick = () => { playSound('click'); bankWords.splice(i, 1); bossAnswer.push(w); renderBossReorder(bankWords); }; document.getElementById('boss-bank-area').appendChild(c); });
        }
        function submitBossReorder() {
            if (bossAnswer.length !== bossTarget.length) { alert("⚠️ 請將所有詞語都排上去才能提交！"); return; }
            bossAnswered = true; document.getElementById('btn-boss-submit-reorder').classList.add('hidden');
            if (bossAnswer.join("") === bossTarget.join("")) {
                playSound('win'); bossCorrectCount++; inventory.wood++; inventory.stone++; updateUI();
                document.getElementById('boss-msg').innerHTML = "✨ 完美解答！獲得 1 木 1 石 ✨"; document.getElementById('boss-msg').style.color = "#2E7D32";
            } else {
                playSound('error'); document.getElementById('boss-msg').innerHTML = `❌ 答錯了！<br><span style='font-size:0.8em; color:#333;'>正確答案應為：${bossTarget.join("")}</span>`; document.getElementById('boss-msg').style.color = "#b71c1c";
            }
            document.getElementById('boss-progress').innerHTML = `進度：${bossCurrentIdx + 1} / 20 &nbsp;|&nbsp; 累積答對：${bossCorrectCount}`; document.getElementById('btn-next-boss').classList.remove('hidden');
        }
        function selectBossMining(selected, correct, element, qText) {
            if (bossAnswered) return; bossAnswered = true;
            if (selected === correct) {
                playSound('win'); element.style.backgroundColor = "#4CAF50"; document.getElementById('boss-mining-q').innerHTML = qText.replace("[？]", `<span style="color:#4CAF50;">[${correct}]</span>`);
                bossCorrectCount++; inventory.wood++; inventory.stone++; updateUI();
                document.getElementById('boss-msg').innerHTML = "✨ 精準眼光！獲得 1 木 1 石 ✨"; document.getElementById('boss-msg').style.color = "#2E7D32";
            } else {
                playSound('error'); element.style.backgroundColor = "#f44336"; document.getElementById('boss-msg').innerHTML = `❌ 答錯了！<br><span style='font-size:0.8em; color:#333;'>正確詞語應為：${correct}</span>`; document.getElementById('boss-msg').style.color = "#b71c1c";
            }
            document.getElementById('boss-progress').innerHTML = `進度：${bossCurrentIdx + 1} / 20 &nbsp;|&nbsp; 累積答對：${bossCorrectCount}`; document.getElementById('btn-next-boss').classList.remove('hidden');
        }
        function nextBoss() { playSound('click'); bossCurrentIdx++; if (bossCurrentIdx < bossQuestions.length) loadBossTask(); else showBossResult(); }
        function showBossResult() {
            document.getElementById('game-boss').classList.add('hidden'); document.getElementById('game-boss-result').classList.remove('hidden');
            const resultBox = document.getElementById('boss-result-text');
            if (bossCorrectCount >= 15) {
                playSound('epic'); inventory.gem++; updateUI();
                resultBox.innerHTML = `太不可思議了！你在傳說級挑戰中答對了 <b style='color:#E65100; font-size:1.5em;'>${bossCorrectCount}</b> 題！<br><br><span style='font-size:1.5em;'>🎉 獲得【💎 稀有寶石】x 1 🎉</span><br><br>快去建築工坊建造飛天城堡吧！`;
            } else {
                playSound('error');
                resultBox.innerHTML = `你答對了 <b style='color:#b71c1c; font-size:1.5em;'>${bossCorrectCount}</b> 題。<br><br>哎呀，距離獲得寶石還差一點！<br>（需要答對 15 題以上）<br><br>不要灰心，隨時可以再次挑戰！`;
            }
        }

        // --- 建築工坊 ---
        function buildItem(type) {
            let costWood = 0, costStone = 0, costGem = 0, emoji = "";
            if (type === 'hut') { costWood = 2; emoji = "🪵"; }
            if (type === 'tower') { costStone = 2; emoji = "🗼"; }
            if (type === 'castle') { costWood = 3; costStone = 3; emoji = "🏰"; }
            if (type === 'flying') { costGem = 1; costWood = 5; costStone = 5; emoji = "☁️🏰☁️"; }

            if (inventory.wood >= costWood && inventory.stone >= costStone && inventory.gem >= costGem) {
                inventory.wood -= costWood; inventory.stone -= costStone; inventory.gem -= costGem;
                if (type === 'castle') { inventory.castles++; }
                updateUI(); playSound(type === 'flying' ? 'epic' : 'win');
                document.getElementById('world-grid').innerHTML += `<span style="animation: pulse 1s;">${emoji}</span>`;
            } else {
                playSound('error'); alert("❌ 資源不足！快去玩遊戲收集材料吧！\n(飛天城堡需要：1寶石 + 5木材 + 5石頭)");
            }
        }
    </script>
</body>
</html>
