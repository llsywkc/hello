                        feedback: "「一目了然」用得很精準！這是一個非常實用的功用說明。",
                        rewriteTip: "<h4>💡 創意改寫錦囊：</h4><ul><li>替換溫習材料：<strong>「閱讀英文故事書時，畫下優美的句子」</strong> 或 <strong>「整理繁複的科學筆記」</strong>。</li><li>加入感受：<strong>「大大節省了我溫習的時間」</strong>。</li></ul>"
                    },
                    { 
                        text: "例如，我會用橙色畫出重點標題，用綠色間出不懂的詞語。有了它，我的筆記就像一幅色彩豐富的地圖，溫習時事半功倍。", 
                        isCorrect: true, 
                        feedback: "用「地圖」來比喻筆記非常出色！「事半功倍」也是很棒的高級詞彙！",
                        rewriteTip: "<h4>💡 創意改寫錦囊：</h4><ul><li>改變顏色組合：<strong>「用紫色畫出標題，藍色標示日期」</strong>。</li><li>改變比喻：<strong>「筆記就像一道美麗的彩虹」</strong>。</li></ul>"
                    }
                ]
            },
            // ================= 段落 5：結尾 =================
            {
                step: "第五段：結尾 (總結全文)",
                question: "最後一段，我們要呼應開頭，總結全文並表達期望：",
                paragraph: 4,
                options: [
                    { 
                        text: "總括而言，這支文具特工隊是我學習路上不可缺少的好夥伴。今後，我會好好愛護這些文具，讓它們繼續發揮所長，陪伴我進步。", 
                        isCorrect: true, 
                        feedback: "恭喜你！成功使用了「總括而言」作總結，並帶出愛護文具的期望，首尾呼應！",
                        rewriteTip: "<h4>💡 創意改寫錦囊：</h4><ul><li>具體的愛護行動：<strong>「我會定期替它們清潔筆盒」</strong> 或 <strong>「用完後必定把它們整齊地放回原位」</strong>。</li></ul>"
                    },
                    { 
                        text: "總而言之，每一件文具特工都有它獨特的本領。我非常感謝它們每天的協助，承諾以後絕不會亂丟文具，會珍惜這班小戰友。", 
                        isCorrect: true, 
                        feedback: "這句帶出了「感謝」的情感，把文具當成「小戰友」，非常擬人化！",
                        rewriteTip: "<h4>💡 創意改寫錦囊：</h4><ul><li>向讀者發出呼籲：<strong>「大家也一起好好愛護自己的文具特工隊吧！」</strong></li><li>承諾部分改寫：<strong>「我不會再讓它們無故失蹤或受傷了」</strong>。</li></ul>"
                    },
                    { 
                        text: "總的來說，沒有了這支文具特工隊，我的學習一定會大受影響。我承諾會成為一個稱職的「特工隊長」，好好指揮並珍惜它們。", 
                        isCorrect: true, 
                        feedback: "自稱「特工隊長」非常有代入感，讓整篇特工主題的文章完美落幕！",
                        rewriteTip: "<h4>💡 創意改寫錦囊：</h4><ul><li>加入未來期望：<strong>「希望我們能一起努力，在期末考打勝仗！」</strong>。</li><li>總結感受：<strong>「雖然它們只是一件件死物，但在我心中卻是有生命的戰友」</strong>。</li></ul>"
                    },
                    { 
                        text: "這就是我的文具特工隊，希望大家喜歡我的介紹。拜拜！", 
                        isCorrect: false, 
                        feedback: "這比較像口頭演講的結尾，說明文結尾應該重申文章主題（特工的重要）和表達感受喔。" 
                    }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let essayParagraphs = ["", "", "", "", ""]; 

        const stepIndicator = document.getElementById('step-indicator');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackText = document.getElementById('feedback-text');
        const rewriteTipBox = document.getElementById('rewrite-tip');
        const nextBtn = document.getElementById('next-btn');
        const essayContent = document.getElementById('essay-content');

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            stepIndicator.textContent = q.step;
            questionText.textContent = q.question;
            optionsContainer.innerHTML = '';
            
            feedbackText.textContent = '';
            rewriteTipBox.style.display = 'none';
            nextBtn.style.display = 'none';

            // Shuffle options
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(btn, opt, q.paragraph);
                optionsContainer.appendChild(btn);
            });
            
            updateEssayDisplay();
        }

        function selectOption(clickedBtn, optionData, pIndex) {
            // Disable all buttons to prevent multiple clicks
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.6';
            });
            clickedBtn.style.opacity = '1';

            if (optionData.isCorrect) {
                clickedBtn.classList.add('correct');
                feedbackText.textContent = "✅ " + optionData.feedback;
                feedbackText.style.color = "#28a745";
                
                // Show rewrite tip if available
                if (optionData.rewriteTip) {
                    rewriteTipBox.innerHTML = optionData.rewriteTip;
                    rewriteTipBox.style.display = 'block';
                }
                
                // Add text to the current paragraph
                essayParagraphs[pIndex] += optionData.text;
                
                // Show next button or finish
                if (currentQuestionIndex < questions.length - 1) {
                    nextBtn.style.display = 'inline-block';
                } else {
                    feedbackText.innerHTML += "<br><br>🎉 <strong>大功告成！你已經拼砌出一篇五個段落的完整文章！</strong><br>現在，請看着下方的「草稿區」，試着根據黃色框的「改寫錦囊」，發揮創意，把文章改寫成你的專屬版本吧！";
                    nextBtn.style.display = 'none';
                    updateEssayDisplay(true); 
                }
            } else {
                clickedBtn.classList.add('wrong');
                feedbackText.textContent = "❌ " + optionData.feedback + " 請嘗試另一個答案！";
                feedbackText.style.color = "#dc3545";
                
                // Re-enable after delay
                setTimeout(() => {
                    allBtns.forEach(btn => {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        btn.classList.remove('wrong');
                    });
                    feedbackText.textContent = "";
                }, 2500);
            }
            
            if (optionData.isCorrect) {
                updateEssayDisplay();
            }
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            loadQuestion();
        };

        function updateEssayDisplay(isComplete = false) {
            let formattedEssay = "";
            essayParagraphs.forEach((p, index) => {
                if (p.trim() !== "") {
                    if (!isComplete && index === questions[currentQuestionIndex]?.paragraph) {
                         // Show typing indicator for current paragraph
                         formattedEssay += "　　" + p + "<span class='highlight'>... (撰寫中)</span>\n\n";
                    } else {
                         formattedEssay += "　　" + p + "\n\n";
                    }
                }
            });
            
            if (formattedEssay === "") {
                essayContent.innerHTML = "<span style='color:#bdc3c7;'>你的文章草稿會在這裏出現... 試着選出正確句子吧！</span>";
            } else {
                essayContent.innerHTML = formattedEssay;
            }
        }

        // Start Game
        loadQuestion();
    </script>
</body>
