<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文具特工隊：寫作訓練基地</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
            text-align: center;
        }
        #game-container {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            margin-bottom: 20px;
        }
        #question-box {
            margin-bottom: 20px;
        }
        .step-badge {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2980b9;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background-color: #f8f9fa;
            border: 2px solid #bdc3c7;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option-btn:hover {
            background-color: #e8f4fd;
            border-color: #3498db;
            transform: translateX(5px);
        }
        .option-btn.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        #feedback {
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 24px;
        }
        #essay-container {
            background-color: #fffaf0;
            border: 2px dashed #f39c12;
            border-radius: 15px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }
        #essay-container h2 {
            color: #e67e22;
            margin-top: 0;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 10px;
        }
        #essay-content {
            font-size: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .highlight {
            background-color: #fff3cd;
            font-weight: bold;
        }
        .hidden {
            display: none;
        }
        #next-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            display: none;
        }
        #next-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>📝 文具特工隊：寫作訓練基地</h1>
    <div class="subtitle">請選出最適合的句子，一步步組裝出滿分文章！</div>

    <div id="game-container">
        <div id="question-box">
            <div id="step-indicator" class="step-badge">第一段：開頭</div>
            <div id="question-text">載入中...</div>
            <div id="options-container"></div>
            <div id="feedback"></div>
            <button id="next-btn">下一題 ➡️</button>
        </div>
    </div>

    <div id="essay-container">
        <h2>📄 我的特工任務報告書 (文章預覽)</h2>
        <div id="essay-content"></div>
    </div>

    <script>
        const questions = [
            {
                step: "第一段：文章開頭 (總)",
                question: "要介紹文具特工隊出場，並預告下文，哪一句最適合做文章的開頭？",
                options: [
                    { text: "在文具王國裏，有一支特別的文具特工隊，各有所長。下文將介紹幾位重要的文具成員和它們的特色與功用。", isCorrect: true, feedback: "答對了！這句清楚「點題」並「預告」了下文。" },
                    { text: "我有很多文具，有鉛筆、橡皮擦和直尺，它們都很漂亮，我每天都帶它們上學。", isCorrect: false, feedback: "這句比較像流水帳，沒有扣緊「特工隊」和說明文的「預告」結構喔！" }
                ],
                paragraph: 0
            },
            {
                step: "第二段：鉛筆 (中心句)",
                question: "現在要介紹第一位特工「鉛筆」。請選出合適的「中心句」放在段落開頭：",
                options: [
                    { text: "鉛筆是黑色的，可以寫字。", isCorrect: false, feedback: "太簡單了！沒有運用到「標示語」和「特工名稱」。" },
                    { text: "首先，鉛筆是特工隊裏負責書寫的「記錄專家」。", isCorrect: true, feedback: "答對了！運用了標示語「首先」，並清楚點出鉛筆的特工身分。" }
                ],
                paragraph: 1
            },
            {
                step: "第二段：鉛筆 (特色句)",
                question: "接着，我們要說明這位「記錄專家」的外形特色：",
                options: [
                    { text: "這枝鉛筆外形纖幼，筆芯硬度適中，寫出來的字深淺剛好。", isCorrect: true, feedback: "很棒！清楚描寫了外形和筆芯的特點。" },
                    { text: "這枝鉛筆是我昨天在文具店買的，花了我十元。", isCorrect: false, feedback: "這是記敘文的寫法，說明文應該集中描寫事物的「客觀特點」喔！" }
                ],
                paragraph: 1
            },
            {
                step: "第二段：鉛筆 (功用句)",
                question: "它有甚麼功用呢？請選出一個帶有「舉例說明」的句子：",
                options: [
                    { text: "例如，在做中文作業時，我用鉛筆工整地寫下生字；又譬如計算數學題時，我也會用它寫草稿，方便修改。", isCorrect: true, feedback: "完美！正確運用了「例如」和「譬如」來舉例說明功用。" },
                    { text: "它可以寫字，也可以畫畫，非常有用。", isCorrect: false, feedback: "雖然正確，但缺乏具體的情境和標示語（例如）。" }
                ],
                paragraph: 1
            },
            {
                step: "第二段：鉛筆 (小結)",
                question: "最後，為鉛筆這段加上一個小總結：",
                options: [
                    { text: "有了這位記錄專家，我在學習時能清楚寫下重點，不易遺漏內容。", isCorrect: true, feedback: "答對了！完美總結了鉛筆帶給你的幫助。" },
                    { text: "我非常喜歡這枝鉛筆。", isCorrect: false, feedback: "這句太過口語，未能總結出文具的「功用價值」。" }
                ],
                paragraph: 1
            },
            {
                step: "第三段：橡皮擦 (中心句)",
                question: "現在介紹第二位特工「橡皮擦」。請選出正確的中心句：",
                options: [
                    { text: "橡皮擦可以把錯字擦掉。", isCorrect: false, feedback: "忘記使用標示語（如：其次、接着）來連接段落了！" },
                    { text: "其次，橡皮擦是特工隊裏負責修正錯誤的「細心修改師」。", isCorrect: true, feedback: "正確！「其次」能很好地承接上一段。" }
                ],
                paragraph: 2
            },
            {
                step: "第三段：橡皮擦 (特色 + 功用)",
                question: "試着把橡皮擦的特色和功用連在一起選出來：",
                options: [
                    { text: "這塊橡皮體積雖小，但質地柔軟。例如，當我把筆劃寫錯時，它可以輕輕把錯字擦掉，不弄破紙張。", isCorrect: true, feedback: "很好！包含了特色（體積小、柔軟）和舉例（擦錯字）。" },
                    { text: "它白白的，十分柔軟。我每次寫錯字都會用到它。", isCorrect: false, feedback: "缺少了「例如」等標示語來引導具體情境。" }
                ],
                paragraph: 2
            },
            {
                step: "第三段：橡皮擦 (數字說明 + 小結)",
                question: "為橡皮擦加入「數字說明」並作小結：",
                options: [
                    { text: "一塊橡皮擦大概可以幫我改正幾百個錯誤。有了這位修改師，我就不再害怕犯錯，敢於多寫、多試。", isCorrect: true, feedback: "太棒了！運用了「幾百個」作數字說明，小結也很有意思。" },
                    { text: "它可以用很久。有了它我很高興。", isCorrect: false, feedback: "內容過於空泛，缺乏具體數字和深刻的總結。" }
                ],
                paragraph: 2
            },
            {
                step: "第四段：結尾 (總結全文)",
                question: "最後一段，我們要呼應開頭，總結全文並表達期望：",
                options: [
                    { text: "總括而言，這支文具特工隊是我學習路上不可缺少的好夥伴。今後，我會好好愛護這些文具，讓它們繼續發揮所長，陪伴我努力學習。", isCorrect: true, feedback: "恭喜你！成功使用了「總括而言」作總結，並帶出愛護文具的期望，首尾呼應！" },
                    { text: "這就是我的文具特工隊，希望大家喜歡我的介紹。拜拜！", isCorrect: false, feedback: "這比較像演講的結尾，說明文結尾應該重申文章主題和表達感受/期望。" }
                ],
                paragraph: 3
            }
        ];

        let currentQuestionIndex = 0;
        let essayParagraphs = ["", "", "", ""]; 
        let currentSpan = null;

        const stepIndicator = document.getElementById('step-indicator');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackDisplay = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const essayContent = document.getElementById('essay-content');

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            stepIndicator.textContent = q.step;
            questionText.textContent = q.question;
            optionsContainer.innerHTML = '';
            feedbackDisplay.textContent = '';
            feedbackDisplay.style.color = '#333';
            nextBtn.style.display = 'none';

            // Shuffle options for fun
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(btn, opt, q.paragraph);
                optionsContainer.appendChild(btn);
            });
            
            updateEssayDisplay();
        }

        function selectOption(clickedBtn, optionData, pIndex) {
            // Disable all buttons
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            if (optionData.isCorrect) {
                clickedBtn.classList.add('correct');
                feedbackDisplay.textContent = "✅ " + optionData.feedback;
                feedbackDisplay.style.color = "#28a745";
                
                // Add text to paragraph
                essayParagraphs[pIndex] += optionData.text;
                
                // Show next button or finish game
                if (currentQuestionIndex < questions.length - 1) {
                    nextBtn.style.display = 'block';
                } else {
                    feedbackDisplay.innerHTML += "<br>🎉 恭喜你！你已經完成了一篇結構完整的說明文！";
                    updateEssayDisplay(true); // Final render
                }
            } else {
                clickedBtn.classList.add('wrong');
                feedbackDisplay.textContent = "❌ " + optionData.feedback + " 請再試一次！";
                feedbackDisplay.style.color = "#dc3545";
                
                // Re-enable buttons after a short delay so they can try again
                setTimeout(() => {
                    allBtns.forEach(btn => {
                        btn.disabled = false;
                        btn.classList.remove('wrong');
                    });
                    feedbackDisplay.textContent = "";
                }, 2000);
            }
            updateEssayDisplay();
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            loadQuestion();
        };

        function updateEssayDisplay(isComplete = false) {
            // Format paragraphs with indents
            let formattedEssay = "";
            essayParagraphs.forEach((p, index) => {
                if (p.trim() !== "") {
                    // Highlight the newly added part if not complete
                    if (!isComplete && index === questions[currentQuestionIndex]?.paragraph) {
                         formattedEssay += "　　" + p + "<span class='highlight'>... (寫作中)</span>\n\n";
                    } else {
                         formattedEssay += "　　" + p + "\n\n";
                    }
                }
            });
            
            if (formattedEssay === "") {
                essayContent.innerHTML = "<span style='color:#bdc3c7;'>請回答上方問題，你的文章會在這裏慢慢成形...</span>";
            } else {
                essayContent.innerHTML = formattedEssay;
            }
        }

        // Start Game
        loadQuestion();
    </script>
</body>
</html>
